    function eraAxes(era) {
      return [
        { key: 'power', label: 'Power Unit', val: era.powerBias },
        { key: 'aero', label: 'Aerodynamics', val: era.aeroBias },
        { key: 'reliability', label: 'Reliability', val: era.reliabilityBias },
        { key: 'strategy', label: 'Strategy', val: era.strategyBias },
      ];
    }

    function eraSpikeHole(era) {
      const axes = eraAxes(era).slice().sort((a, b) => b.val - a.val);
      return { spike: axes[0], hole: axes[axes.length - 1], axes };
    }

    function tierInfo(era) {
      return TIER_META[era?.tier] || TIER_META.strong;
    }

    function mulberry32(a) {
      return function () {
        a |= 0; a = (a + 0x6D2B79F5) | 0;
        let t = Math.imul(a ^ (a >>> 15), 1 | a);
        t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;

      }

      if (state.lobbying === 'aggressive') {
        fit.push({ tone: 'warn', text: 'Aggressive lobby: ~7% exclusion risk per race, harsh for 24–0.' });
      } else if (state.lobbying === 'passive') {
        fit.push({ tone: 'ok', text: 'Passive lobby: no exclusion risk.' });
      }

      if (state.sponsor === 'title') {
        fit.push({ tone: 'ok', text: 'Title sponsor: lower DNF risk, slight pace tax.' });
      } else if (state.sponsor === 'tech' && (cal.powerTracks + cal.aeroTracks) >= 8) {
        fit.push({ tone: 'ok', text: 'Tech partners: stronger on power/aero venues this calendar.' });
      } else if (state.sponsor === 'regional' && (cal.wetRisk >= 5 || cal.weatherBlocks >= 1)) {
        fit.push({ tone: 'ok', text: 'Regional mix: coherent for wet-risk / weather blocks.' });
      } else if (state.sponsor === 'tech') {
        fit.push({ tone: 'warn', text: 'Tech partners trade DNF cover for dry peak pace.' });
      }

      if (state.primary && state.primary.wet < 90 && (cal.weatherBlocks >= 1 || cal.wetRisk >= 6)) {
        fit.push({ tone: 'bad', text: `Primary wet ${state.primary.wet} is soft for this weather load.` });
      }
      if (era?.tier === 'underdog' && state.lobbying === 'aggressive') {
        fit.push({ tone: 'bad', text: 'Underdog + Aggressive lobby: exclusion risk is how folklore runs die.' });
      }
      if (era?.tier === 'underdog' && state.sponsor === 'tech' && era.reliabilityBias < 0.85) {
        fit.push({ tone: 'warn', text: 'Underdog with a Reli hole on Tech sponsors: Title is the usual survival trade.' });
      }

      return { cal, steps, recs, fit, pathLines, era };
    }

    function renderSeasonOutlook() {
      const brief = setupDecisionBrief();
      const toneCls = { ok: 'text-emerald-400', warn: 'text-amber-400', bad: 'text-f1-red' };
      if (!state.seasonDraw?.locked) {
        return `
        <section class="bg-zinc-800 p-5">
          ${sectionTitle('Package Fit', 'outlook')}
          <p class="text-[11px] text-zinc-400 leading-relaxed">Spin the season hand first. Fit notes appear once the draw is locked.</p>
        </section>`;
      }
      return `
        <section class="bg-zinc-800 p-5">
          ${sectionTitle('Package Fit', 'signals')}
          <div class="space-y-1.5">
            ${brief.fit.map(f => `
              <div class="text-[11px] leading-relaxed ${toneCls[f.tone] || 'text-zinc-300'}">· ${f.text}</div>
            `).join('')}
          </div>
        </section>
      `;
    }

    // Smart weekend defaults: what most players would pick, so simulate is not a 24-click chore.
    function raceSmartDefaults({ tire, sc, predRain }) {
      let strategy = '2-stop';
      if (tire === 'Low' && sc < 24) strategy = '1-stop';
      if (tire === 'High' || sc >= 28) strategy = '2-stop';

      let tirePlan = 'standard';
      if (tire === 'High' || predRain >= 38) tirePlan = 'manage';
      else if (tire === 'Low' && predRain < 22) tirePlan = 'push';

      let pitWindow = 'standard';
      if (sc >= 30) pitWindow = 'overcut';
      else if (sc < 14 && tire === 'High') pitWindow = 'undercut';

      // Balanced engine is almost always the non-chore default
      return { strategy, tirePlan, engineMode: 'balanced', pitWindow };
    }

    function prepareRaces() {
      const draw = getSeasonDraw();
      const scBoost = SC_CLIMATES.find(x => x.id === (draw?.sc || 'normal')).scBoost;
      const wxExtra = WEATHER_CLIMATES.find(x => x.id === (draw?.weather || 'normal')).weatherMod;
      // Daily challenge: race conditions come from a dedicated seed stream so
      // every player faces the identical calendar regardless of setup order.
      const condRng = state.seed != null ? mulberry32(state.seed ^ 0x9E3779B9) : null;
      const cRand = condRng ? () => condRng() : rand;
      const cInt = (a, b) => Math.floor(cRand() * (b - a + 1)) + a;
      state.races = RACES.map(r => {
        const mods = phaseMods(r.n);
        const tire = applyWearBias(r.tire, draw?.wear || 'mixed');
        const sc = clamp(r.sc + scBoost + (tire === 'High' ? 2 : 0), 4, 55);
        const predRain = clamp(r.baseRain + cInt(-8, 8) + Math.floor(mods.weatherMod * 0.35) + Math.floor(wxExtra * 0.5), 0, 92);
        // Weekend calls start UNSET: the player actively chooses each one.
        // The sim applies a neutral fallback for any call left blank (see simulateRace / neutralCall).
        return {
          ...r,
          tire,
          sc,
          predRain,
          actualRain: null,
          airTemp: cInt(18, 34),
          trackTemp: cInt(28, 52),
          strategy: null,
          tirePlan: null,
          engineMode: null,
          pitWindow: null,
          quali: null,
          wetCall: null,
          lead: null,
          isSprint: SPRINT_ROUNDS.includes(r.n),
          sprintWin: null,
          result: null,
          margin: null,
          notes: [],
          locked: false,
          phaseType: mods.id,
        };
      });
    }

    // Auto-balance budget: always totals 100
    function setBudget(key, rawVal) {
      const others = BUDGET_KEYS.filter(k => k !== key);
      const minOthers = BUDGET_MIN * others.length;
      let val = clamp(parseInt(rawVal, 10) || BUDGET_MIN, BUDGET_MIN, 100 - minOthers);
      state.budget[key] = val;

      let rest = 100 - val;
      // Keep relative proportions of the other three
      const otherSum = others.reduce((s, k) => s + state.budget[k], 0) || others.length;
      const shares = others.map(k => state.budget[k] / otherSum);
      let allocated = 0;
      others.forEach((k, i) => {
        if (i === others.length - 1) {
          state.budget[k] = rest - allocated;
        } else {
          const share = Math.max(BUDGET_MIN, Math.round(rest * shares[i]));
          state.budget[k] = share;
          allocated += share;
        }
      });
      // Fix any underflow/overflow from rounding
      let total = budgetTotal();
      if (total !== 100) {
        const last = others[others.length - 1];
        state.budget[last] = clamp(state.budget[last] + (100 - total), BUDGET_MIN, 100 - minOthers);
        // If still off, nudge key
        total = budgetTotal();
        if (total !== 100) state.budget[key] = clamp(state.budget[key] + (100 - total), BUDGET_MIN, 100 - minOthers);
      }
      updateBudgetUI();
    }

    function updateBudgetUI() {
      BUDGET_KEYS.forEach(k => {
        const valEl = document.getElementById(`budget-val-${k}`);
        const slider = document.getElementById(`budget-slider-${k}`);
        const fill = document.getElementById(`budget-fill-${k}`);
        if (valEl) valEl.textContent = state.budget[k];
        if (slider && document.activeElement !== slider) slider.value = state.budget[k];
        // Always sync non-active sliders; active one is being dragged
        if (slider && document.activeElement === slider) {
          // update others only
        } else if (slider) {
          slider.value = state.budget[k];
        }
        if (fill) fill.style.width = state.budget[k] + '%';
      });
      // Force-sync sibling sliders when one is dragged
      const active = document.activeElement;
      BUDGET_KEYS.forEach(k => {
        const slider = document.getElementById(`budget-slider-${k}`);
        if (slider && slider !== active) slider.value = state.budget[k];
      });
      const totalEl = document.getElementById('budget-total');
      if (totalEl) {
        const t = budgetTotal();
        totalEl.textContent = t + ' / 100';
        totalEl.className = 'font-display text-sm ' + (t === 100 ? 'text-emerald-400': 'text-red-500');
      }
    }

    function teamStrength() {
      const era = state.era;
      const b = state.budget;
      const principal = state.principal;

      // Average phase mods as baseline package lean
      const draw = getSeasonDraw();
      const phaseIds = draw ? [draw.opening, draw.mid, draw.close] : ['balanced', 'balanced', 'balanced'];
      const phases = phaseIds.map(id => PHASE_TYPES.find(t => t.id === id));
      const avgPower = phases.reduce((s, p) => s + p.powerMod, 0) / 3;
      const avgAero = phases.reduce((s, p) => s + p.aeroMod, 0) / 3;

      const pb = principal.bonus || {};
      // Sponsors reshape departments (not free global pace)
      const sponPower = state.sponsor === 'tech' ? 3: 0;
      const sponAero = state.sponsor === 'tech' ? 3: 0;
      const sponReli = state.sponsor === 'title' ? 6: 0;

      const up = state.upgrades || { power: 0, aero: 0 };
      const power = clamp((b.power + (pb.power || 0) + up.power) * era.powerBias * 2.1 + avgPower + sponPower, 0, 100);
      const aero = clamp((b.aero + (pb.aero || 0) + up.aero) * era.aeroBias * 2.1 + avgAero + sponAero, 0, 100);
      const reliability = clamp((b.reliability + (pb.reliability || 0)) * era.reliabilityBias * 2.1 + sponReli, 0, 100);
      const strategy = clamp((b.strategy + (pb.strategy || 0)) * era.strategyBias * 2.1, 0, 100);
      const driver = state.primary.rating * 0.70 + state.teammate.rating * 0.15 + state.primary.consistency * 0.15;
      const packageScore = power * 0.22 + aero * 0.24 + reliability * 0.14 + strategy * 0.12 + driver * 0.28;

      // Ops effects apply per-race (see simulateRace): not flat free pace here
      return {
        power, aero, reliability, strategy, driver,
        pace: packageScore,
        consist: reliability,
        tirePhil: state.tirePhil,
        devCutoff: state.devCutoff,
        lobbying: state.lobbying,
        sponsor: state.sponsor,
      };
    }

    function raceCallFingerprint(race) {
      return [race.tirePlan || 'standard', race.strategy, race.engineMode, race.pitWindow, race.quali || 'safe', race.wetCall || 'auto', race.lead || 'primary'].join('|');
    }

    function simulateRace(race, strength, opts = {}) {
      const notes = [];
      const mods = phaseMods(race.n);
      const isRedo = !!opts.isRedo;
      const sameCallRedo = !!opts.sameCallRedo;
      const redoNumber = opts.redoNumber || 1; // 1st / 2nd / 3rd charge this season
      const lossMargin = opts.lossMargin; // original attempt margin (-99 = DNF)
      const phase = phaseForRace(race.n);
      const powerTracks = [1, 2, 16, 17, 22];
      const aeroTracks = [8, 9, 13, 15, 19];
      // Long-haul / flyaway-style weekends (regional sponsor payoff)
      const flyaways = [1, 2, 3, 4, 5, 6, 17, 18, 19, 20, 21, 22, 23, 24];

      const rainRoll = rand() * 100;
      let actualRain = 0;
      if (rainRoll < race.predRain) actualRain = clamp(race.predRain + randInt(-10, 25), 10, 100);
      else if (rainRoll < race.predRain + 8) actualRain = randInt(5, 20);
      race.actualRain = actualRain;
      const isWet = actualRain >= 25;
      const isDamp = actualRain >= 10 && actualRain < 25;

      let scChance = race.sc + (isWet ? 18: 0) + (race.tire === 'High' ? 3: 0);
      const safetyCar = rand() * 100 < scChance;

      // ── Tires: light season car bias + main weekend compound plan ──
      let opsMod = 0;
      // Neutral fallback for any weekend call the player left unset (nothing is pre-picked in the UI)
      if (!race.tirePlan) race.tirePlan = 'standard';
      if (!race.strategy) race.strategy = '2-stop';
      if (!race.engineMode) race.engineMode = 'balanced';
      if (!race.pitWindow) race.pitWindow = 'standard';
      if (!race.quali) race.quali = 'safe';
      if (!race.wetCall) race.wetCall = 'auto';
      if (!race.lead) race.lead = 'primary';

      // Season car/org bias (small)
      if (state.tirePhil === 'aggressive') {
        if (race.tire === 'Low') opsMod += 1.2;
        else if (race.tire === 'High') opsMod -= 1.4;
        if (isWet || isDamp) opsMod -= 0.9;
      } else if (state.tirePhil === 'conservative') {
        if (race.tire === 'High') opsMod += 1.1;
        else if (race.tire === 'Low') opsMod -= 0.9;
        if (isWet || isDamp) opsMod += 0.8;
      }

      // Weekend compound plan (main lever)
      if (race.tirePlan === 'push') {
        if (race.tire === 'Low') { opsMod += 3.4; notes.push('Push compound plan: pace on low-wear circuit.'); }
        else if (race.tire === 'High') { opsMod -= 4.0; notes.push('Push compound plan cliffed on high wear.'); }
        else { opsMod += 1.2; notes.push('Push compound plan.'); }
        if (isWet || isDamp) { opsMod -= 2.6; notes.push('Push plan unstable in wet/damp.'); }
      } else if (race.tirePlan === 'manage') {
        if (race.tire === 'High') { opsMod += 3.2; notes.push('Manage compound plan: held on high wear.'); }
        else if (race.tire === 'Low') { opsMod -= 2.4; notes.push('Manage plan left pace on low wear.'); }
        else { opsMod += 0.6; notes.push('Manage compound plan.'); }
        if (isWet || isDamp) { opsMod += 2.0; notes.push('Manage plan stable in wet/damp.'); }
      } else {
        notes.push('Standard compound plan (weekend default).');
      }

      // ── Operations: development cut-off (phase-conditioned) ──
      if (state.devCutoff === 'early') {
        if (phase === 'opening') { opsMod += 3.4; notes.push('Early freeze: concept locked, Opening pace clean.'); }
        else if (phase === 'close') { opsMod -= 3.6; notes.push('Early freeze: Close field developed past the package.'); }
        else { opsMod += 0.4; }
      } else if (state.devCutoff === 'late') {
        if (phase === 'opening') { opsMod -= 3.4; notes.push('Late push: Opening car still immature.'); }
        else if (phase === 'close') { opsMod += 3.8; notes.push('Late push: Close upgrades landed.'); }
        else { opsMod += 0.6; }
      }

      // ── Operations: lobbying (edge vs exclusion risk) ──
      const regScale = REG_CLIMATES.find(x => x.id === (getSeasonDraw()?.reg || 'normal')).lobbyRiskScale;
      if (state.lobbying === 'active') {
        opsMod += 1.6;
        if (rand() < 0.03 * regScale) {
          opsMod -= 11;
          notes.push('Regulatory protest: setup compromised for this event.');
        }
      } else if (state.lobbying === 'aggressive') {
        opsMod += 3.4;
        if (rand() < 0.07 * regScale) {
          race.result = 'loss';
          race.margin = -99;
          race.notes = [...notes, 'Technical infringement: car excluded.'];
          return race;
        }
      }

      // ── Operations: sponsors (different win conditions) ──
      if (state.sponsor === 'tech') {
        opsMod += 1.2;
        if (powerTracks.includes(race.n) || aeroTracks.includes(race.n)) {
          opsMod += 1.8;
          notes.push('Tech partners: correlation edge at this venue.');
        }
      } else if (state.sponsor === 'title') {
        opsMod -= 0.9; // slight peak pace tax
      } else if (state.sponsor === 'regional') {
        if (isWet || isDamp) { opsMod += 2.8; notes.push('Regional program: wet-ops activation.'); }
        const flyBoost = TRAVEL_CLIMATES.find(x => x.id === (getSeasonDraw()?.travel || 'compact')).flyawayBoost;
        if (flyaways.includes(race.n)) opsMod += 1.1 + flyBoost;
      }

      let stratFit = 0;
      if (race.strategy === '1-stop') {
        if (race.tire === 'Low') stratFit += 3.5;
        if (race.tire === 'High') stratFit -= 4.5;
        if (safetyCar) stratFit -= 2;
        notes.push(race.tire === 'High' ? '1-stop under pressure on high-wear circuit.': '1-stop committed.');
      } else {
        if (race.tire === 'High') stratFit += 2.5;
        if (race.tire === 'Low') stratFit -= 1.5;
        if (safetyCar) stratFit += 2.5;
        notes.push('2-stop selected for flexible windows.');
      }

      let engMod = 0;
      if (race.engineMode === 'attack') {
        engMod += 2.5;
        if (rand() < clamp(0.10 - strength.reliability / 900, 0.03, 0.12)) {
          engMod -= 18;
          notes.push('PU stress event: mode too aggressive.');
        } else notes.push('Attack mode deployed.');
      } else if (race.engineMode === 'conserve') {
        engMod -= 1.5;
        notes.push('Conserve mode: reliability prioritized.');
      }

      let pitMod = 0;
      if (race.pitWindow === 'undercut') {
        pitMod += safetyCar ? -1.5: 2;
        notes.push('Undercut attempt.');
      } else if (race.pitWindow === 'overcut') {
        pitMod += safetyCar ? 2.5: 0.5;
        notes.push(safetyCar ? 'Overcut paid off around SC.': 'Overcut executed.');
      }

      // Team orders: hand the lead car to Driver 2 (usually for a wet specialist)
      const leadDriver = (race.lead === 'teammate' && state.teammate) ? state.teammate : state.primary;
      let ordersMod = 0;
      if (leadDriver !== state.primary) {
        ordersMod = (leadDriver.rating - state.primary.rating) * 0.10;
        notes.push(`Team orders: ${leadDriver.name} leads this weekend.`);
      }

      let wetMod = 0;
      if (isWet) {
        wetMod = (leadDriver.wet - 88) * 0.22;
        notes.push(`Wet race: lead car wet rating ${leadDriver.wet}.`);
      } else if (isDamp) {
        wetMod = (leadDriver.wet - 88) * 0.1;
        notes.push('Damp conditions. Grip windows unstable.');
      }

      // Qualifying gamble: pole push banks track position but risks a shunt
      let qualiMod = 0;
      if (race.quali === 'pole') {
        if (rand() < 0.08) {
          qualiMod = -5.5;
          notes.push('Quali shunt: pole push overcooked, compromised grid slot.');
        } else {
          qualiMod = 1.8;
          notes.push('Pole push landed: track position banked.');
        }
      }

      // Crossover call: pre-commit to slicks or inters against the forecast
      let wetCallMod = 0;
      if (race.wetCall === 'slicks') {
        if (isWet) { wetCallMod = -6; notes.push('Slicks gamble drowned: full wet race.'); }
        else if (isDamp) { wetCallMod = 2.6; notes.push('Slicks gamble paid: track dried under you.'); }
        else { wetCallMod = 0.4; }
      } else if (race.wetCall === 'inters') {
        if (isWet) { wetCallMod = 2.8; notes.push('Inters call ready when the rain came.'); }
        else if (isDamp) { wetCallMod = 0.6; }
        else { wetCallMod = -4; notes.push('Inters call on a dry track: pace given away.'); }
      }

      // Sprint weekend: Saturday result carries into Sunday (extra jeopardy, not a season loss)
      let sprintMod = 0;
      if (race.isSprint) {
        const sScore = strength.pace + opsMod * 0.6 + (rand() - 0.5) * 10;
        const sField = FIELD_ANCHOR + strength.pace * FIELD_CARRY + 1.0 + (rand() - 0.5) * 10;
        race.sprintWin = sScore >= sField;
        if (race.sprintWin) { sprintMod = 0.8; notes.push('Sprint win: momentum into Sunday.'); }
        else { sprintMod = -2.0; notes.push('Sprint setback: grid and confidence dented.'); }
      }

      let trackMod = mods.powerMod * 0.15 + mods.aeroMod * 0.15;
      if (powerTracks.includes(race.n)) trackMod += (strength.power - 55) * 0.06;
      if (aeroTracks.includes(race.n)) trackMod += (strength.aero - 55) * 0.06;

      let forecastMod = 0;
      if (Math.abs(actualRain - race.predRain) > 30) {
        forecastMod = -2;
        notes.push('Forecast miss complicated tyre calls.');
      }

      // Package pace is typically ~58–75 (even split) to ~72–88 (strong build).
      // Field must sit in that band or every race is a structural loss.
      const execScale = strength.pace < 62 ? 1.25 : strength.pace < 70 ? 1.1 : 1.0;
      let score = strength.pace + opsMod + (stratFit + engMod + pitMod) * execScale + wetMod + trackMod + forecastMod
        + ordersMod + qualiMod + wetCallMod + sprintMod;
      const noiseScale = clamp(1.05 - strength.consist / 180, 0.45, 1.05);
      const glass = strength.reliability < 50 ? 1.1 : 1.0;
      score += (rand() - 0.5) * 11 * noiseScale * glass;

      // DNF: present but not season-wiping by default
      let dnfRisk = 0.028 - strength.reliability / 2800;
      if (race.engineMode === 'attack') dnfRisk += 0.02;
      if (state.tirePhil === 'aggressive') dnfRisk += 0.003;
      if (state.tirePhil === 'conservative') dnfRisk -= 0.002;
      if (race.tirePlan === 'push') dnfRisk += 0.008;
      if (race.tirePlan === 'manage') dnfRisk -= 0.005;
      if (state.sponsor === 'title') dnfRisk -= 0.012;
      // Redoing a DNF does not wipe mechanical risk; slight hangover
      if (isRedo && lossMargin === -99) dnfRisk += 0.018;
      dnfRisk = clamp(dnfRisk, 0.006, 0.09);

      if (rand() < dnfRisk) {
        race.result = 'loss';
        race.margin = -99;
        race.notes = [...notes, isRedo ? 'Retirement on redo: mechanical or incident.' : 'Retirement: mechanical or incident.'];
        return race;
      }

      // Absolute field: a real grid your package can genuinely out-run.
      // Redos always pay a tax — not free re-rolls of close losses.
      // Title pressure: a small, visible late-sweep lift — drama, not a rubber band
      // (the old +2.0 at 18 wins punished streaks exactly when they mattered).
      const pressure = state.wins >= 20 ? 0.8 : 0;
      let redoTax = 0;
      if (isRedo) {
        // Escalating season cost: later charges are harder (fixes 1–2 maybe, not 4)
        redoTax = 3.4 + (redoNumber - 1) * 1.9; // ~3.4 / 5.3 / 7.2 / 9.1 (emergency)
        if (redoNumber >= 4) { redoTax += 1.5; notes.push('Emergency charge: the heaviest tax in the book.'); }
        if (sameCallRedo) {
          redoTax += 4.5;
          notes.push('Same weekend call as the loss: field already had your number.');
        } else {
          notes.push('Redo tax: prior result still shapes the field.');
        }
        if (lossMargin != null && lossMargin !== -99) {
          if (lossMargin <= -7) {
            redoTax += 4.2;
            notes.push('Structural deficit from the first attempt still shows.');
          } else if (lossMargin <= -4) {
            redoTax += 2.4;
            notes.push('Clear first-attempt deficit carries into the redo.');
          } else if (lossMargin <= -2.5) {
            redoTax += 1.1;
          }
        }
        if (lossMargin === -99) {
          redoTax += 1.6;
          notes.push('DNF redo: recovery is possible, not free.');
        }
        if (redoNumber >= 2) notes.push(`Season redo #${redoNumber}: field hardens with each charge.`);
      }
      // Slightly less lottery on redos (compress free coin-flip variance)
      const fieldNoise = isRedo ? (rand() - 0.5) * 9 : (rand() - 0.5) * 12;
      const field = FIELD_ANCHOR + strength.pace * FIELD_CARRY + fieldNoise + pressure + redoTax;
      const won = score >= field;
      race.result = won ? 'win' : 'loss';
      race.margin = Math.round((score - field) * 10) / 10;

      if (safetyCar) notes.push('Safety car deployed.');
      if (won && race.margin < 1.5) notes.push('Narrow victory. Margins thin.');
      if (!won && race.margin > -2.5) notes.push('Lost in the details: pace was close.');
      if (!won && race.margin <= -7) notes.push('Pace deficit was structural today.');
      if (pressure > 0 && !won) notes.push('Title pressure: the field lifts late in a sweep.');
      if (isRedo && sameCallRedo && !won) notes.push('Unchanged call failed the redo.');
      if (isRedo && sameCallRedo && won) notes.push('Same call converted despite the tax.');
      if (isRedo && !sameCallRedo && won) notes.push('Changed call cleared the redo tax.');
      if (isRedo && !sameCallRedo && !won) notes.push('Changed call still lost under redo pressure.');
      race.notes = notes;
      return race;
    }

    /** Deterministic pre-race win estimate — mirrors simulateRace without rolls. */
    function estimateWin(race, strength) {
      const s = strength || teamStrength();
      const mods = phaseMods(race.n);
      const phase = phaseForRace(race.n);
      const pWet = clamp(race.predRain / 100, 0, 0.92);
      let m = 0;
      // tire plan expectation
      const plan = race.tirePlan || 'standard';
      if (plan === 'push') m += race.tire === 'Low' ? 3.4 : race.tire === 'High' ? -4.0 : 1.2, m -= 2.6 * pWet;
      else if (plan === 'manage') m += race.tire === 'High' ? 3.2 : race.tire === 'Low' ? -2.4 : 0.6, m += 2.0 * pWet;
      if (state.tirePhil === 'aggressive') m += (race.tire === 'Low' ? 1.2 : race.tire === 'High' ? -1.4 : 0) - 0.9 * pWet;
      else if (state.tirePhil === 'conservative') m += (race.tire === 'High' ? 1.1 : race.tire === 'Low' ? -0.9 : 0) + 0.8 * pWet;
      if (state.devCutoff === 'early') m += phase === 'opening' ? 3.4 : phase === 'close' ? -3.6 : 0.4;
      else if (state.devCutoff === 'late') m += phase === 'opening' ? -3.4 : phase === 'close' ? 3.8 : 0.6;
      if (state.lobbying === 'active') m += 1.6 - 0.33;
      else if (state.lobbying === 'aggressive') m += 3.4 - 1.4;
      if (state.sponsor === 'tech') m += 1.2 + ((POWER_TRACK_NS.includes(race.n) || AERO_TRACK_NS.includes(race.n)) ? 1.8 : 0);
      else if (state.sponsor === 'title') m -= 0.9;
      else if (state.sponsor === 'regional') m += 2.8 * pWet + 0.8;
      const scP = clamp(race.sc / 100, 0, 0.6);
      if (race.strategy === '1-stop') m += (race.tire === 'Low' ? 3.5 : 0) + (race.tire === 'High' ? -4.5 : 0) - 2 * scP;
      else m += (race.tire === 'High' ? 2.5 : 0) + (race.tire === 'Low' ? -1.5 : 0) + 2.5 * scP;
      if (race.engineMode === 'attack') m += 2.5 - 18 * clamp(0.10 - s.reliability / 900, 0.03, 0.12);
      else if (race.engineMode === 'conserve') m -= 1.5;
      if (race.pitWindow === 'undercut') m += 2 * (1 - scP) - 1.5 * scP;
      else if (race.pitWindow === 'overcut') m += 0.5 * (1 - scP) + 2.5 * scP;
      const lead = (race.lead === 'teammate' && state.teammate) ? state.teammate : state.primary;
      if (lead !== state.primary) m += (lead.rating - state.primary.rating) * 0.10;
      m += (lead.wet - 88) * 0.22 * pWet;
      if (race.quali === 'pole') m += 1.8 * 0.92 - 5.5 * 0.08;
      if (race.wetCall === 'slicks') m += -6 * pWet + 0.4 * (1 - pWet);
      else if (race.wetCall === 'inters') m += 2.8 * pWet - 4 * (1 - pWet) * 0.7;
      if (race.isSprint) m -= 0.6; // sprint jeopardy expectation
      let t = mods.powerMod * 0.15 + mods.aeroMod * 0.15;
      if (POWER_TRACK_NS.includes(race.n)) t += (s.power - 55) * 0.06;
      if (AERO_TRACK_NS.includes(race.n)) t += (s.aero - 55) * 0.06;
      const execScale = s.pace < 62 ? 1.25 : s.pace < 70 ? 1.1 : 1.0;
      const pressure = state.wins >= 20 ? 0.8 : 0;
      const margin = s.pace + m * execScale + t - (FIELD_ANCHOR + s.pace * FIELD_CARRY) - pressure;
      const noiseScale = clamp(1.05 - s.consist / 180, 0.45, 1.05);
      const sd = Math.sqrt(Math.pow(12, 2) / 12 + Math.pow(11 * noiseScale, 2) / 12);
      const p = 1 / (1 + Math.exp(-margin / (sd * 0.62)));
      let dnf = 0.028 - s.reliability / 2800;
      if (race.engineMode === 'attack') dnf += 0.02;
      if (state.sponsor === 'title') dnf -= 0.012;
      dnf = clamp(dnf, 0.006, 0.09);
      return clamp(p * (1 - dnf), 0.02, 0.985);
    }

    function debriefText(item) {
      if (!item) return '';
      return typeof item === 'string' ? item : (item.text || '');
    }

    function debriefTone(item) {
      if (!item || typeof item === 'string') return 'neutral';
      return item.tone || 'neutral';
    }

    function buildDebrief() {
      const s = teamStrength();
      const observations = [];
      const push = (text, tone = 'neutral') => observations.push({ text, tone });
      const tier = tierInfo(state.era);
      // Gold: only rare top-end outcomes. Red: structural / season-killing fails.
      if (state.wins === 24) {
        if (state.era.tier === 'underdog') {
          push('Underdog 24–0. Perfect Fit, Perfect Execution, Survival. Same rules. Screenshot then delete app territory.', 'gold');
        } else {
          push(`Perfect season achieved (${tier.label}). Operational and sporting execution aligned across all 24 events.`, 'gold');
        }
      } else if (state.wins >= 22) {
        push('Elite near-sweep. A perfect season was one or two weekends away. Exceptional package control.', 'gold');
      } else if (state.wins >= 20) {
        push('Championship-dominant campaign. The losses were isolated, not structural.', 'neutral');
      } else if (state.wins >= 14) {
        push('Race-winning package, but consistency gaps prevented a clean sweep.', 'neutral');
      } else if (state.wins >= 8) {
        push('Competitive in windows. Package lacked multi-condition coverage for 24-0.', 'neutral');
      } else {
        push('Performance baseline sat below the field average on too many weekends.', 'red');
      }

      if (state.era.tier === 'underdog' && state.wins < 24) {
        const { spike, hole } = eraSpikeHole(state.era);
        push(`Underdog path check: spike ${spike.label}, hole ${hole.label}. Folklore 24–0 needs fit on both, then zero free risk.`, state.wins < 8 ? 'red' : 'neutral');
      }

      if (s.power < 50) push('Power unit allocation looked light on power-sensitive venues.', s.power < 40 ? 'red' : 'neutral');
      if (s.aero < 50) push('Aero/chassis budget limited performance at high-downforce circuits.', s.aero < 40 ? 'red' : 'neutral');
      if (s.reliability < 50) push('Reliability spend left residual DNF and mode risk.', 'red');
      if (s.strategy < 50) push('Strategy department under-resourced relative to SC-heavy races.', s.strategy < 40 ? 'red' : 'neutral');

      const highWearLosses = state.races.filter(r => r.tire === 'High' && r.result === 'loss').length;
      const lowWearLosses = state.races.filter(r => r.tire === 'Low' && r.result === 'loss').length;
      if (state.tirePhil === 'aggressive' && highWearLosses >= 3) {
        push('Aggressive tyre philosophy struggled on high-wear circuits: conservative or balanced may have held more.', 'red');
      }
      if (state.tirePhil === 'conservative' && lowWearLosses >= 3) {
        push('Conservative tyres left pace on low-wear weekends where aggression usually pays.', 'neutral');
      }
      if (state.devCutoff === 'late') {
        const openLoss = state.races.filter(r => r.n <= 8 && r.result === 'loss').length;
        const closeWin = state.races.filter(r => r.n >= 17 && r.result === 'win').length;
        if (openLoss >= 3) push('Late development push cost Opening weekends; Early Freeze or Mid may fit mixed schedules better.', 'red');
        if (closeWin >= 6 && state.wins >= 20) push('Late push showed in the Close: upgrades landed when it mattered.', 'gold');
        else if (closeWin >= 6) push('Late push showed in the Close: upgrades landed when it mattered.', 'neutral');
      }
      if (state.devCutoff === 'early') {
        const closeLoss = state.races.filter(r => r.n >= 17 && r.result === 'loss').length;
        if (closeLoss >= 3) push('Early freeze left the package soft in the Close as the field developed past you.', 'red');
      }
      const exclusions = state.races.filter(r => r.notes?.some(n => n.includes('excluded') || n.includes('protest'))).length;
      if (state.lobbying === 'aggressive' && exclusions > 0) {
        push('Aggressive lobbying bought pace but paid scrutiny costs: Passive is the 24–0 insurance play.', 'red');
      }
      if (state.sponsor === 'title') {
        const titleDnfs = state.races.filter(r => r.margin === -99).length;
        if (titleDnfs === 0 && state.wins >= 22) {
          push('Title sponsorship reliability cover held: no mechanical wipeouts on record.', 'gold');
        } else if (titleDnfs === 0) {
          push('Title sponsorship reliability cover held: no mechanical wipeouts on record.', 'neutral');
        }
      }
      if (state.primary.wet < 85 && state.races.filter(r => r.actualRain >= 25 && r.result === 'loss').length >= 2) {
        push('Wet-weather weekends exposed a gap in primary driver wet performance.', 'red');
      }
      const closeLosses = state.races.filter(r => r.result === 'loss' && r.margin > -4 && r.margin !== -99).length;
      if (closeLosses >= 3) push(`${closeLosses} defeats were decided inside a narrow performance band: redo targets.`, 'neutral');
      const dnfs = state.races.filter(r => r.margin === -99).length;
      if (dnfs > 0) push(`${dnfs} retirement(s) on record. Mechanical risk remains a perfect-season killer.`, 'red');
      if (state.redosLeft === 0 && state.wins < 24) {
        push('All redos exhausted. Final classification is locked.', state.wins < 14 ? 'red' : 'neutral');
      }
      if (state.rival && state.losses > 0) {
        push(`Rival watch: ${state.rival.driver} (${state.rival.team} ${state.rival.era}) took ${state.rival.wins} of your ${state.losses} defeats.`, state.rival.wins >= 4 ? 'red' : 'neutral');
      } else if (state.rival && state.wins === 24) {
        push(`${state.rival.driver} never got one. Rival shut out for the whole season.`, 'gold');
      }
      push(`Schedule profile: ${scheduleSummary()}.`, 'neutral');
      push(`Team reference: ${state.era.team} ${state.era.era} · ${state.primary.name} / ${state.teammate.name} · ${state.principal.name}.`, 'neutral');
      state.debrief = observations;
    }

    // ─────────────────────────────────────────────
    // ADS ENGINE (demo now · network later)
    // ─────────────────────────────────────────────
    let _adTimer = null;
    let _adProgressTimer = null;
    let _adBusy = false;

    function freeEraSpinsLeft() {
      return Math.max(0, ADS.freeEraSpins - state.eraSpinsUsed);
    }

    function ensureAdsenseScript() {
      if (!ADS.adsenseClient || document.getElementById('adsense-script')) return;
      const s = document.createElement('script');
      s.id = 'adsense-script';
      s.async = true;
      s.src = `https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=${encodeURIComponent(ADS.adsenseClient)}`;
      s.crossOrigin = 'anonymous';
      document.head.appendChild(s);
    }

    function updateAdBanner() {
      const slot = document.getElementById('ad-banner-slot');
      if (!slot) return;
      const show = ADS.enabled && (
        (state.phase === 'setup' && ADS.bannerOnSetup) ||
        (state.phase === 'season' && ADS.bannerOnSeason) ||
        (state.phase === 'result' && ADS.bannerOnResult)
      );
      slot.classList.toggle('is-on', !!show);
      const inner = document.getElementById('ad-banner-inner');
      const label = document.getElementById('ad-banner-label');

      // Live AdSense display unit when demo is off and slots are configured
      if (show && !ADS.demo && ADS.adsenseClient && ADS.adsenseSlots.banner && inner && !inner.dataset.adsenseMounted) {
        ensureAdsenseScript();
        inner.innerHTML = '';
        inner.className = 'w-full max-w-md flex justify-center';
        const ins = document.createElement('ins');
        ins.className = 'adsbygoogle';
        ins.style.display = 'inline-block';
        ins.style.width = '320px';
        ins.style.height = '50px';
        ins.setAttribute('data-ad-client', ADS.adsenseClient);
        ins.setAttribute('data-ad-slot', ADS.adsenseSlots.banner);
        inner.appendChild(ins);
        inner.dataset.adsenseMounted = '1';
        try { (window.adsbygoogle = window.adsbygoogle || []).push({}); } catch (_) { /* ignore */ }
      } else if (label && (ADS.demo || !ADS.adsenseSlots.banner)) {
        label.textContent = ADS.demo
          ? `Banner · ${state.phase} · demo`
          : 'Sponsored';
      }

      const h = show ? Math.ceil(slot.getBoundingClientRect().height) : 0;
      document.documentElement.style.setProperty('--ad-banner-h', `${h}px`);
      const app = document.getElementById('app');
      const foot = document.getElementById('site-footer');
      if (app) app.style.paddingBottom = show ? `${h + 72}px` : '';
      if (foot) foot.style.marginBottom = show ? `${h + 8}px` : '';
    }

    function closeAdModal() {
      if (_adTimer) { clearTimeout(_adTimer); _adTimer = null; }
      if (_adProgressTimer) { clearInterval(_adProgressTimer); _adProgressTimer = null; }
      _adBusy = false;
      clearModalAdUnit();
      document.getElementById('ad-modal')?.classList.add('hidden');
      if (document.getElementById('help-modal')?.classList.contains('hidden') &&
          document.getElementById('share-modal')?.classList.contains('hidden')) {
        document.body.style.overflow = '';
      }
    }

    function pickAdSlot(kind) {
      const slots = ADS.adsenseSlots || {};
      if (kind === 'rewarded') {
        return slots.rewarded || slots.interstitial || slots.banner || '';
      }
      return slots.interstitial || slots.banner || slots.rewarded || '';
    }

    function mountModalAdUnit(kind) {
      const host = document.getElementById('ad-modal-unit');
      if (!host) return false;
      host.innerHTML = '';
      host.classList.add('hidden');

      if (ADS.demo || !ADS.adsenseClient) return false;
      const slot = pickAdSlot(kind);
      if (!slot) return false;

      ensureAdsenseScript();
      host.classList.remove('hidden');
      const ins = document.createElement('ins');
      ins.className = 'adsbygoogle';
      ins.style.display = 'block';
      ins.style.width = '100%';
      ins.style.minHeight = '100px';
      ins.setAttribute('data-ad-client', ADS.adsenseClient);
      ins.setAttribute('data-ad-slot', slot);
      ins.setAttribute('data-ad-format', 'auto');
      ins.setAttribute('data-full-width-responsive', 'true');
      host.appendChild(ins);
      try {
        (window.adsbygoogle = window.adsbygoogle || []).push({});
      } catch (e) {
        console.warn('adsbygoogle push', e);
      }
      return true;
    }

    function clearModalAdUnit() {
      const host = document.getElementById('ad-modal-unit');
      if (host) {
        host.innerHTML = '';
        host.classList.add('hidden');
      }
    }

    /**
     * Interstitial / rewarded player.
     * demo: timed placeholder. Live: mounts AdSense display unit in modal for min view time, then grants reward.
     * @param {'interstitial'|'rewarded'} kind
     * @param {{ placement: string, title?: string, rewardText?: string }} opts
     * @returns {Promise<'completed'|'skipped'|'failed'>}
     */
    function playAd(kind, opts = {}) {
      if (!ADS.enabled) return Promise.resolve('completed');
      // Recover from a stuck previous ad so re-spin never hard-locks
      if (_adBusy) {
        closeAdModal();
      }

      // Live path: hand off to H5 Games Ads and let Google own the UI.
      if (!ADS.demo && ADS.adsenseClient) {
        h5Init();
        trackEvent(kind === 'rewarded' ? 'ad_rewarded_open' : 'ad_interstitial_open', { placement: opts.placement || kind, live: 1 });
        return new Promise((resolve) => {
          let settled = false;
          const done = (result) => {
            if (settled) return; settled = true;
            trackEvent(kind === 'rewarded' ? 'ad_rewarded_result' : 'ad_interstitial_result', { placement: opts.placement || kind, result, live: 1 });
            setTimeout(() => resolve(result), 0);
          };
          try {
            if (kind === 'rewarded') {
              window.adBreak({
                type: 'reward',
                name: opts.placement || 'reward',
                beforeReward: (showAdFn) => showAdFn(),
                adViewed: () => done('completed'),
                adDismissed: () => done('skipped'),
                adBreakDone: (info) => {
                  // No fill / not shown: grant anyway so the feature never hard-locks
                  if (!settled && info && info.breakStatus !== 'viewed') done('completed');
                },
              });
            } else {
              window.adBreak({
                type: 'next',
                name: opts.placement || 'interstitial',
                adBreakDone: () => done('completed'),
              });
            }
            // Safety valve: if the SDK never calls back (blocked, offline)
            setTimeout(() => done('completed'), 12000);
          } catch (err) {
            console.error('adBreak error', err);
            done('failed');
          }
        });
      }

      const live = false; // demo modal below — live traffic uses the H5 path above
      const duration = kind === 'rewarded' ? ADS.rewardedMs : ADS.interstitialMs;
      const modal = document.getElementById('ad-modal');
      const kindEl = document.getElementById('ad-modal-kind');
      const titleEl = document.getElementById('ad-modal-title');
      const copyEl = document.getElementById('ad-modal-copy');
      const rewardEl = document.getElementById('ad-modal-reward');
      const progress = document.getElementById('ad-progress');
      const btnSkip = document.getElementById('ad-btn-skip');
      const btnGo = document.getElementById('ad-btn-continue');
      if (!modal || !btnGo || !btnSkip) return Promise.resolve('failed');

      _adBusy = true;
      trackEvent(kind === 'rewarded' ? 'ad_rewarded_open' : 'ad_interstitial_open', {
        placement: opts.placement || kind,
        live: live ? 1 : 0,
      });

      return new Promise((resolve) => {
        let settled = false;
        const finish = (result) => {
          if (settled) return;
          settled = true;
          clearModalAdUnit();
          closeAdModal();
          trackEvent(kind === 'rewarded' ? 'ad_rewarded_result' : 'ad_interstitial_result', {
            placement: opts.placement || kind,
            result,
            live: live ? 1 : 0,
          });
          // Next tick so click handlers / busy flag fully clear before callers run spin
          setTimeout(() => resolve(result), 0);
        };

        try {
          kindEl.textContent = kind === 'rewarded' ? 'Rewarded ad' : 'Interstitial';
          titleEl.textContent = opts.title || (kind === 'rewarded' ? 'Watch for reward' : 'Short break');
          if (opts.rewardText) {
            rewardEl.textContent = opts.rewardText;
            rewardEl.classList.remove('hidden');
          } else {
            rewardEl.classList.add('hidden');
          }

          progress.style.width = '0%';
          btnSkip.disabled = true;
          btnGo.disabled = true;
          btnSkip.textContent = kind === 'rewarded' ? 'No thanks' : 'Skip';
          btnGo.textContent = 'Continue';

          btnSkip.onclick = (e) => {
            e.preventDefault();
            e.stopPropagation();
            finish('skipped');
          };
          btnGo.onclick = (e) => {
            e.preventDefault();
            e.stopPropagation();
            finish('completed');
          };
          document.getElementById('ad-modal-backdrop').onclick = (e) => {
            e.preventDefault();
            /* block dismiss by backdrop during play */
          };

          modal.classList.remove('hidden');
          document.body.style.overflow = 'hidden';

          const mounted = live && mountModalAdUnit(kind);
          if (ADS.demo) {
            copyEl.textContent = kind === 'rewarded'
              ? 'Demo rewarded unit. Finish to unlock re-spin. No effect on race win rate.'
              : 'Demo interstitial. Soft break after the season, never mid-race.';
          } else if (mounted) {
            copyEl.textContent = kind === 'rewarded'
              ? 'Watch the ad to unlock your reward. Does not change race odds.'
              : 'Short sponsored break, then back to your season.';
          } else {
            copyEl.textContent = 'Ad unit not configured yet. Continuing shortly.';
          }

          const t0 = Date.now();
          _adProgressTimer = setInterval(() => {
            const p = Math.min(100, ((Date.now() - t0) / duration) * 100);
            progress.style.width = `${p}%`;
          }, 50);

          _adTimer = setTimeout(() => {
            if (_adProgressTimer) { clearInterval(_adProgressTimer); _adProgressTimer = null; }
            progress.style.width = '100%';
            btnGo.disabled = false;
            btnSkip.disabled = false;
            if (kind === 'rewarded') {
              copyEl.textContent = ADS.demo ? 'Reward unlocked. Spinning era…' : 'Reward ready.';
              btnGo.textContent = 'Claim';
              // Auto-claim so re-spin always fires after a completed watch
              _adTimer = setTimeout(() => finish('completed'), live ? 700 : 450);
            } else {
              copyEl.textContent = 'Ad complete.';
              btnGo.textContent = 'Continue';
              _adTimer = setTimeout(() => finish('completed'), live ? 800 : 600);
            }
          }, duration);
        } catch (err) {
          console.error('playAd error', err);
          finish('failed');
        }
      });
    }

    async function showSeasonCompleteInterstitial() {
      if (!ADS.enabled || !ADS.interstitialOnSeasonComplete) return;
      if (state.ads.seasonInterstitialShown) return;
      state.ads.seasonInterstitialShown = true;
      try {
        await playAd('interstitial', {
          placement: 'season_complete',
          title: 'Season complete',
        });
      } catch (_) {
        closeAdModal();
      }
    }

    async function requestEraSpin() {
      if (state.spinning) return;
      try {
        // Free quota still available
        if (freeEraSpinsLeft() > 0) {
          runEraSpin();
          return;
        }
        // Ads off or rewarded disabled: still allow re-spin
        if (!ADS.enabled || !ADS.rewardedEraRespin) {
          runEraSpin();
          return;
        }
        const result = await playAd('rewarded', {
          placement: 'era_respin',
          title: 'Re-spin constructor era',
          rewardText: 'Reward: one era re-spin · does not change win odds',
        });
        if (result === 'completed') {
          runEraSpin();
        }
      } catch (err) {
        console.error('requestEraSpin', err);
        closeAdModal();
      }
    }

    async function requestShareClean() {
      if (state.ads.shareClean) return true;
      if (!ADS.enabled || !ADS.rewardedShareClean) {
        state.ads.shareClean = true;
        return true;
      }
      try {
        const result = await playAd('rewarded', {
          placement: 'share_clean',
          title: 'Clean share caption',
          rewardText: 'Reward: share without sponsor line this session',
        });
        if (result === 'completed') {
          state.ads.shareClean = true;
          return true;
        }
      } catch (_) {
        closeAdModal();
      }
      return false;
    }

    // ─────────────────────────────────────────────
    // ACTIONS
    // ─────────────────────────────────────────────
    function runEraSpin() {
      if (state.spinning) return;
      state.spinning = true;
      state.eraSpinsUsed++;
      // Disable spin button immediately if present
      const spinBtn = document.getElementById('spin-btn');
      if (spinBtn) spinBtn.disabled = true;

      let ticks = 0;
      const maxTicks = 18 + randInt(0, 8);
      const iv = setInterval(() => {
        state.spinIndex = (state.spinIndex + 1) % ERAS.length;
        state.era = ERAS[state.spinIndex];
        const card = document.getElementById('era-card');
        if (card) {
          card.classList.add('spin-active');
          card.innerHTML = eraCardInner(state.era);
        }
        ticks++;
        if (ticks >= maxTicks) {
          clearInterval(iv);
          state.era = pick(ERAS);
          state.primary = null;
          state.teammate = null;
          state.principal = null;
          state.lineupOpen = 'primary';
          state.spinning = false;
          trackEvent('era_spin', {
            era_id: state.era?.id || '',
            team: state.era?.team || '',
            tier: state.era?.tier || '',
            spin_n: state.eraSpinsUsed,
          });
          render();
        }
      }, 70);
    }

    function spinEra() {
      // Fire-and-forget async; errors handled inside
      void requestEraSpin();
    }

    function setLineupOpen(section) {
      // Toggle: same section again collapses; other section opens (closes previous)
      state.lineupOpen = state.lineupOpen === section ? null : section;
      render();
    }

    // Portraits: Wikimedia thumbs keyed by display name (built offline; initials if missing)
    // Local avatars under /avatars/ (downloaded; no hotlink)
    // Real-person photos removed: likeness/right-of-publicity risk under ads.
    // Stylized initials only (see personAvatarHtml).

    function personInitials(name) {
      if (!name) return '?';
      const parts = String(name).replace(/[().]/g, ' ').trim().split(/\s+/).filter(Boolean);
      if (!parts.length) return '?';
      if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
      return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
    }

    function personAvatarHtml(name) {
      const ini = personInitials(name);
      const safe = String(name || '').replace(/"/g, '&quot;');
      return `<span class="person-av no-src" title="${safe}"><span class="person-av-fb" aria-hidden="true">${ini}</span></span>`;
    }

    function personRowHtml(name, line1Html, line2Html) {
      return `<div class="person-row">${personAvatarHtml(name)}<div class="person-text">${line1Html}${line2Html || ''}</div></div>`;
    }

    function lineupDriverSummary(d) {
      if (!d) return '<span class="acc-summary-block">Not selected</span>';
      return personRowHtml(
        d.name,
        `<div class="acc-pick-name">${d.name}</div>`,
        `<div class="acc-pick-stats">R${d.rating} · C${d.consistency} · W${d.wet}</div>`

    }

    function lineupPrincipalSummary(p) {
      if (!p) return '<span class="acc-summary-block">Not selected</span>';
      const bonus = Object.entries(p.bonus).map(([k, v]) => `${k} +${v}`).join(' · ');
      return personRowHtml(
        p.name,
        `<div class="acc-pick-name">${p.name}</div>`,
        `<div class="acc-pick-stats">${p.role} · ${bonus}</div>`
      );
    }

    function nextLineupOpen() {
      if (!state.primary) return 'primary';
      if (!state.teammate) return 'teammate';
      if (!state.principal) return 'principal';

    function selectDriver(role, idx) {
      if (!state.era) return;
      const d = state.era.drivers[idx];
      if (!d) return;
      onDriverChange(role, d.name);
      // Collapse current panel; open next empty seat if any
      state.lineupOpen = nextLineupOpen();
      render();
    }

    function selectPrincipal(idx) {
      if (!state.era) return;
      const p = state.era.principals[idx];
      if (!p) return;
      onPrincipalChange(p.name);
      state.lineupOpen = nextLineupOpen();
      render();
    }

    // Inline UI icons (currentColor, sized to match button text) — replace emoji glyphs.
    const ICON_PLAY = '<svg viewBox="0 0 24 24" width="13" height="13" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>';
    const ICON_FFWD = '<svg viewBox="0 0 24 24" width="13" height="13" fill="currentColor" aria-hidden="true"><path d="M4 18l8.5-6L4 6v12zm9-12v12l8.5-6L13 6z"/></svg>';

    function weatherIconSvg(kind) {
      // kind: sun | cloud | rain — 12×12, currentColor
      if (kind === 'sun') {
        return `<svg class="wx-icon" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><circle cx="6" cy="6" r="2.2" fill="currentColor"/><path d="M6 1v1.4M6 9.6V11M1 6h1.4M9.6 6H11M2.4 2.4l1 1M8.6 8.6l1 1M2.4 9.6l1-1M8.6 3.4l1-1" stroke="currentColor" stroke-width="1" stroke-linecap="round"/></svg>`;

    }

    function weatherKindForRace(race) {
      const rain = race.actualRain != null ? race.actualRain : race.predRain;
      if (rain >= 35 || (race.actualRain != null && race.actualRain >= 25)) return 'rain';
      if (rain >= 15) return 'cloud';
      return 'sun';
    }

    function onDriverChange(role, name) {
      if (!state.era || !name) {
        if (role === 'primary') state.primary = null;
        else state.teammate = null;
        return;
      }
      const d = state.era.drivers.find(x => x.name === name);
      if (!d) return;
      if (role === 'primary') {
        state.primary = d;
        if (state.teammate?.name === d.name) state.teammate = null;
      } else {
        state.teammate = d;
        if (state.primary?.name === d.name) state.primary = null;
      }
    }

    function onPrincipalChange(name) {
      if (!state.era || !name) {
        state.principal = null;
        return;
      }
      state.principal = state.era.principals.find(p => p.name === name) || null;
    }

    function setMod(key, val) {
      state[key] = val;
      render(); // refresh Season Outlook fit + tips
    }

    function setPhase() { /* season arc is spun, not edited */ }

    function updateStartButton() {
      const btn = document.getElementById('start-btn');
      if (!btn) return;
      const ok = !!(state.era && state.primary && state.teammate && state.principal && budgetTotal() === 100 && state.seasonDraw?.locked);
      btn.disabled = !ok;
      btn.className = ok
        ? 'w-full py-4 bg-f1-red text-white font-display text-sm tracking-widest uppercase hover:bg-red-700 transition': 'w-full py-4 bg-zinc-800 text-zinc-600 font-display text-sm tracking-widest uppercase cursor-not-allowed';
    }

    function startSeason() {
      if (!state.era || !state.primary || !state.teammate || !state.principal) return;
      if (budgetTotal() !== 100) return;
      if (!state.seasonDraw?.locked) return;
      // Seed the season: daily gets the date seed (set in startDaily); free play
      // gets a random recorded seed so runs are verifiable later.
      if (state.mode !== 'daily') {
        state.seed = (Math.random() * 0x7fffffff) | 0;
      }
      state._rng = mulberry32(state.seed);
      prepareRaces();
      pickRival();
      state.phase = 'season';
      state.wins = 0;
      state.losses = 0;
      state.redosLeft = SEASON_REDOS;
      state.seasonComplete = false;
      state.debrief = [];
      state.redoFeedback = null;
      state.lbSubmitted = false;
      state.tokens = 0;
      state.tokensGranted = 0;
      state.upgrades = { power: 0, aero: 0 };
      state.redosUsedCount = 0;
      state.extraRedoUsed = false;
      state.recorded = false;
      state.flashReason = null;
      state.ads.seasonInterstitialShown = false;
      if (state.mode === 'daily') markDailyUsed();
      saveGame();
      trackEvent('season_start', {
        era_id: state.era?.id || '',
        team: state.era?.team || '',
        tier: state.era?.tier || '',
      });
      render();
      window.scrollTo(0, 0);
    }

    function nextUnresolved() {
      return state.races.find(r => !r.result) || null;
    }

    function recountRecord() {
      state.wins = state.races.filter(r => r.result === 'win').length;
      state.losses = state.races.filter(r => r.result === 'loss').length;
    }

    /** Resolve one race + all season side-effects (rival, tokens). */
    function resolveRace(race) {
      simulateRace(race, teamStrength());
      recountRecord();
      // Named rival hoovers up most of your defeats
      if (race.result === 'loss' && state.rival) {
        if (rand() < 0.65) { state.rival.wins++; race.wonBy = 'rival'; race.notes.push(`${state.rival.driver} took the win.`); }
        else race.wonBy = 'field';
      }
      // Upgrade tokens at 6 / 12 / 18 wins
      const marks = [6, 12, 18];
      for (const m of marks) {
        if (state.wins >= m && state.tokensGranted < marks.indexOf(m) + 1) {
          state.tokensGranted = marks.indexOf(m) + 1;
          state.tokens++;
          race.notes.push('Upgrade token earned: spend it from the season header.');
        }
      }
    }

    /** Should the auto-runner pause before this race for a human call? */
    function flashpointReason(race) {
      if (!race) return null;
      const p = Math.round(estimateWin(race) * 100);
      if (p < 78) return `Win estimate ${p}%: tough weekend, check the calls`;
      if (race.predRain >= 35) return `Rain ${race.predRain}%: crossover + lead-car call live`;
      if (race.sc >= 28) return `SC ${race.sc}%: pit window decides this one`;
      if (race.isSprint) return 'Sprint weekend: double jeopardy';
      if (race.n === 9 || race.n === 17) return `${phaseMeta(phaseForRace(race.n)).label} phase begins`;
      if (race.n === 24) return 'Season finale';
      return null;
    }

    async function finishSeason() {
      state.simulating = false;
      state.seasonComplete = true;
      buildDebrief();
      recordSeasonToHistory();
      clearSave();
      trackEvent('season_complete', {
        wins: state.wins,
        losses: state.losses,
        redos_used: SEASON_REDOS - state.redosLeft,
        era_id: state.era?.id || '',
        mode: state.mode,
        perfect: state.wins === 24 ? 1 : 0,
      });
      await showSeasonCompleteInterstitial();
      state.phase = 'result';
      render();
      window.scrollTo(0, 0);
    }

    async function runRaces({ count = Infinity, stopAtFlashpoints = false } = {}) {
      if (state.simulating) return;
      state.simulating = true;
      state.flashReason = null;
      render();
      let done = 0;
      while (done < count) {
        const race = nextUnresolved();
        if (!race) break;
        // Flashpoint mode: auto-run routine races, but PAUSE before any genuine decision
        // point (including the very next one) and hand the player the controls. The race
        // is left unresolved with its decision UI active — the player makes the weekend
        // calls, then runs it with "Race R##". If they don't intervene it's not a flashpoint.
        if (stopAtFlashpoints) {
          const reason = flashpointReason(race);
          if (reason) { state.flashReason = { n: race.n, reason }; break; }
        }
        resolveRace(race);
        done++;
        saveGame();
        render();
        const el = document.getElementById(`race-${race.n}`);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        await new Promise(r => setTimeout(r, count === 1 ? 60 : 150));
        // A loss is always a stopping point in flashpoint mode: redo decision is live
        if (stopAtFlashpoints && race.result === 'loss') {
          state.flashReason = { n: race.n, reason: race.margin === -99 ? 'Retirement: redo decision live' : 'Defeat: redo decision live' };
          break;
        }
      }
      state.simulating = false;
      if (!nextUnresolved()) {
        await finishSeason();
        return;
      }
      render();
      if (state.flashReason) {
        const el = document.getElementById(`race-${state.flashReason.n}`);
        if (el) setTimeout(() => el.scrollIntoView({ behavior: 'smooth', block: 'center' }), 60);
      }
    }

    function toggleHint(n) { state.hints = state.hints || {}; state.hints[n] = !state.hints[n]; render(); }
    function raceNext() { void runRaces({ count: 1 }); }
    function raceToFlashpoint() { void runRaces({ stopAtFlashpoints: true }); }
    async function simulateSeason() { await runRaces({}); }

    function dismissRedoFeedback() {
      state.redoFeedback = null;
      render();
    }

    function renderRedoFeedbackCard(fb) {
      if (!fb) return '';
      const isWin = fb.outcome === 'win';
      const isDnf = fb.outcome === 'dnf';
      const tone = isWin ? 'border-emerald-500/50 bg-emerald-500/10' : 'border-f1-red/50 bg-red-500/10';
      const label = isWin ? 'WIN' : isDnf ? 'DNF' : 'LOSS';
      const labelCls = isWin ? 'text-emerald-400' : 'text-f1-red';
      return `
        <div id="redo-feedback" class="border p-4 ${tone} fade-in">
          <div class="flex justify-between items-start gap-3 mb-2">
            <div>
              <div class="text-[10px] tracking-widest uppercase text-zinc-400">Redo result · R${String(fb.n).padStart(2, '0')}</div>
              <div class="font-display text-base text-white mt-0.5">${fb.name}</div>
            </div>
            <div class="text-right">
              <div class="font-display text-xl tracking-widest ${labelCls}">${label}</div>
              ${!isDnf && fb.margin != null ? `<div class="text-[11px] text-zinc-400 mt-0.5">Δ ${fb.margin > 0 ? '+' : ''}${fb.margin}</div>` : ''}
            </div>
          </div>
          <div class="text-[11px] text-zinc-300 mb-2">Season record now <span class="text-white font-display">${fb.record}</span> · Redos left <span class="text-white font-display">${fb.remaining}/${SEASON_REDOS}</span></div>
          ${fb.sameCall
            ? `<div class="text-[11px] text-amber-400/90 mb-2">Same weekend call · full redo tax.</div>`
            : `<div class="text-[11px] text-zinc-400 mb-2">Call changed · base redo tax still applies.</div>`}
          <div class="space-y-0.5 mb-3">
            ${(fb.notes || []).map(n => `<div class="text-[11px] text-zinc-400">· ${n}</div>`).join('')}
          </div>
          <div class="flex gap-2">
            <button type="button" onclick="dismissRedoFeedback()"
              class="flex-1 py-2 border border-zinc-600 text-[10px] tracking-widest uppercase text-zinc-300">
              Dismiss
            </button>
            ${state.seasonComplete ? `
              <button type="button" onclick="goDebrief()"
                class="flex-1 py-2 bg-zinc-100 text-zinc-900 text-[10px] tracking-widest uppercase font-display">
                View debrief
              </button>
            ` : ''}
          </div>
        </div>`;
    }

    function redoRace(n) {
      if (state.redosLeft <= 0) return;
      const race = state.races.find(r => r.n === n);
      if (!race || race.result !== 'loss') return;
      // One attempt per race — a failed redo locks that weekend
      if (race.redoAttempted) return;
      // One charge from the season pool when you open a redo re-plan
      state.redosLeft--;
      state.redosUsedCount++;
      race.lossCall = raceCallFingerprint(race);
      race.lossMargin = race.margin; // for structural redo tax
      race.redoNumber = state.redosUsedCount; // 1..3, 4 = emergency
      race.locked = false;
      race.result = null;
      race.notes = [];
      race.margin = null;
      race.actualRain = null;
      race.redoOpen = true;
      state.redoFeedback = null;
      state.wins = state.races.filter(r => r.result === 'win').length;
      state.losses = state.races.filter(r => r.result === 'loss').length;
      state.seasonComplete = false;
      state.phase = 'season';
      render();
      setTimeout(() => document.getElementById(`race-${n}`)?.scrollIntoView({ behavior: 'smooth', block: 'center' }), 50);
    }

    function applyRedoSim(n) {
      const race = state.races.find(r => r.n === n);
      if (!race || race.result || !race.redoOpen) return;
      const sameCall = race.lossCall && race.lossCall === raceCallFingerprint(race);
      simulateRace(race, teamStrength(), {
        isRedo: true,
        sameCallRedo: sameCall,
        redoNumber: race.redoNumber || state.redosUsedCount,
        lossMargin: race.lossMargin,
      });
      race.locked = true;
      race.redoOpen = false;
      race.redoAttempted = true;
      recountRecord();
      if (race.result === 'loss' && state.rival && race.wonBy !== 'rival') {
        if (rand() < 0.65) { state.rival.wins++; race.wonBy = 'rival'; }
      }
      if (race.result === 'win' && race.wonBy === 'rival') {
        state.rival.wins = Math.max(0, state.rival.wins - 1);
        race.wonBy = null;
      }
      saveGame();

      const outcome = race.margin === -99 ? 'dnf' : race.result;
      state.redoFeedback = {
        n: race.n,
        name: race.name,
        outcome, // win | loss | dnf
        margin: race.margin,
        sameCall,
        notes: (race.notes || []).slice(0, 5),
        remaining: state.redosLeft,
        record: `${state.wins}–${state.losses}`,
      };

      if (state.races.every(r => r.result)) {
        state.seasonComplete = true;
        buildDebrief();
        // Stay on season so redo feedback is visible; user opens debrief manually
      }
      render();
      setTimeout(() => {
        document.getElementById('redo-feedback')?.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 40);
    }

    function pickRival() {
      const pool = ERAS.filter(e => e.id !== state.era?.id && (
        state.era?.tier === 'god' ? e.tier === 'god' : e.tier !== 'underdog'
      ));
      const r = pick(pool.length ? pool : ERAS.filter(e => e.id !== state.era?.id));
      const drv = r.drivers.slice().sort((a, b) => b.rating - a.rating)[0];
      state.rival = { team: r.team, era: r.era, driver: drv.name, color: r.color, wins: 0 };
    }

    function spendToken(kind) {
      if (state.tokens <= 0) return;
      if (kind !== 'power' && kind !== 'aero') return;
      state.tokens--;
      state.upgrades[kind] = (state.upgrades[kind] || 0) + 2;
      saveGame();
      render();
    }

    async function requestExtraRedo() {
      if (state.extraRedoUsed || state.redosLeft > 0) return;
      if (!state.races.some(r => r.result === 'loss' && !r.redoAttempted)) return;
      const grant = () => {
        state.extraRedoUsed = true;
        state.redosLeft = 1;
        state.redosUsedCount = 3; // next charge is #4: the emergency tax
        if (state.phase === 'result') state.phase = 'season';
        saveGame();
        render();
      };
      if (!ADS.enabled || !ADS.rewardedExtraRedo) { grant(); return; }
      try {
        const result = await playAd('rewarded', {
          placement: 'extra_redo',
          title: 'Emergency redo',
          rewardText: 'Reward: one extra redo · heaviest tax in the book · once per season',
        });
        if (result === 'completed') grant();
      } catch (_) { closeAdModal(); }
    }

    // ── Daily challenge: same seed for everyone, one attempt per day ──
    function dailySeed() {
      const d = new Date();
      return d.getUTCFullYear() * 10000 + (d.getUTCMonth() + 1) * 100 + d.getUTCDate();
    }
    function dailyKey() { return `240_daily_${dailySeed()}`; }
    function dailyUsed() { try { return localStorage.getItem(dailyKey()) === '1'; } catch (_) { return false; } }
    function markDailyUsed() { try { localStorage.setItem(dailyKey(), '1'); } catch (_) {} }

    function startDaily() {
      if (dailyUsed()) {
        alert("Today's attempt is used. New seed at midnight UTC. See the Daily tab on the leaderboard.");
        return;
      }
      const seed = dailySeed();
      state.mode = 'daily';
      state.seed = seed;
      state._rng = mulberry32(seed);
      // Era + season draw locked from the seed: identical hand for every player
      const dr = mulberry32(seed ^ 0x51ed2701);
      state.era = ERAS[Math.floor(dr() * ERAS.length)];
      state.primary = null; state.teammate = null; state.principal = null;
      state.lineupOpen = 'primary';
      state.seasonDraw = {
        opening: PHASE_TYPES[Math.floor(dr() * PHASE_TYPES.length)].id,
        mid: PHASE_TYPES[Math.floor(dr() * PHASE_TYPES.length)].id,
        close: PHASE_TYPES[Math.floor(dr() * PHASE_TYPES.length)].id,
        wear: WEAR_CLIMATES[Math.floor(dr() * WEAR_CLIMATES.length)].id,
        sc: SC_CLIMATES[Math.floor(dr() * SC_CLIMATES.length)].id,
        weather: WEATHER_CLIMATES[Math.floor(dr() * WEATHER_CLIMATES.length)].id,
        travel: TRAVEL_CLIMATES[Math.floor(dr() * TRAVEL_CLIMATES.length)].id,
        reg: REG_CLIMATES[Math.floor(dr() * REG_CLIMATES.length)].id,
        locked: true,
      };
      trackEvent('daily_start', { seed, era_id: state.era.id });
      render();
      window.scrollTo(0, 0);
    }

    function exitDaily() {
      state.mode = 'free';
      state.seed = null;
      state._rng = null;
      state.era = null; state.primary = null; state.teammate = null; state.principal = null;
      state.seasonDraw = null;
      render();
    }

    // ── Persistence: refresh-proof in-progress season ──
    const SAVE_KEY = '240_save_v1';
    function saveGame() {
      if (state.phase !== 'season') return;
      try {
        localStorage.setItem(SAVE_KEY, JSON.stringify({
          v: 1,
          eraId: state.era?.id,
          primary: state.primary?.name,
          teammate: state.teammate?.name,
          principal: state.principal?.name,
          budget: state.budget,
          tirePhil: state.tirePhil, devCutoff: state.devCutoff,
          lobbying: state.lobbying, sponsor: state.sponsor,
          seasonDraw: state.seasonDraw,
          races: state.races,
          redosLeft: state.redosLeft, redosUsedCount: state.redosUsedCount,
          extraRedoUsed: state.extraRedoUsed,
          tokens: state.tokens, tokensGranted: state.tokensGranted, upgrades: state.upgrades,
          rival: state.rival, mode: state.mode, seed: state.seed,
          seasonComplete: state.seasonComplete,
        }));
      } catch (_) {}
    }
    function clearSave() { try { localStorage.removeItem(SAVE_KEY); } catch (_) {} }
    function restoreGame() {
      let s = null;
      try { s = JSON.parse(localStorage.getItem(SAVE_KEY) || 'null'); } catch (_) {}
      if (!s || s.v !== 1 || !s.eraId || !s.races?.length) return false;
      const era = ERAS.find(e => e.id === s.eraId);
      if (!era) return false;
      state.era = era;
      state.primary = era.drivers.find(d => d.name === s.primary) || era.drivers[0];
      state.teammate = era.drivers.find(d => d.name === s.teammate) || era.drivers[1] || era.drivers[0];
      state.principal = era.principals.find(p => p.name === s.principal) || era.principals[0];
      state.budget = s.budget; state.tirePhil = s.tirePhil; state.devCutoff = s.devCutoff;
      state.lobbying = s.lobbying; state.sponsor = s.sponsor;
      state.seasonDraw = s.seasonDraw; state.races = s.races;
      state.redosLeft = s.redosLeft; state.redosUsedCount = s.redosUsedCount || 0;
      state.extraRedoUsed = !!s.extraRedoUsed;
      state.tokens = s.tokens || 0; state.tokensGranted = s.tokensGranted || 0;

          <p>Submit from the debrief after a full 24-race season. Sorted by wins, then fewest redos used.</p>
        `,
      },
    };

    function helpBtn(key) {
      return `<button type="button" class="help-btn" onclick="event.stopPropagation();openHelp('${key}')" aria-label="Help: ${HELP[key]?.title || key}">?</button>`;
    }

    function openHelp(key) {
      const modal = document.getElementById('help-modal');
      let title = '';
      let body = '';

      if (key === 'signals') {
        const brief = setupDecisionBrief();
        title = 'Calendar signals';
        if (!brief.recs.length) {
          body = '<p class="text-zinc-300">Spin an era and set schedule stress to surface calendar signals.</p>';
        } else {
          body = `
            ${brief.recs.map(r => `
              <div class="mb-3 pb-3 border-b border-zinc-800 last:border-0">
                <div class="text-[10px] uppercase tracking-wider text-f1-red font-display mb-1">${r.area}</div>
                <p class="text-sm text-zinc-300 leading-relaxed">${r.note || r.why || ''}</p>
              </div>
            `).join('')}
          `;
        }
      } else {
        const item = HELP[key];
        if (!item) return;
        title = item.title;
        body = item.body;
      }

      document.getElementById('help-title').textContent = title;
      document.getElementById('help-body').innerHTML = body;
      modal.classList.remove('hidden');
      document.body.style.overflow = 'hidden';
    }

    function closeHelp() {
      document.getElementById('help-modal').classList.add('hidden');
      document.body.style.overflow = '';
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        // Don't force-close mid-ad; user must Skip/Continue
        if (!_adBusy) {
          closeLeaderboard();
          closeShare();
          closeHelp();
        }
      }
    });

    // ───────────────────────────────────────────��─
    // RENDER
    // ─────────────────────────────────────────────
    function sectionTitle(label, helpKey, rightHtml = '') {
      return `
        <div class="flex justify-between items-center mb-3 gap-2">
          <div class="flex items-center gap-2 min-w-0">
            <div class="text-xs font-display tracking-widest uppercase text-f1-red">${label}</div>
            ${helpKey ? helpBtn(helpKey): ''}
          </div>
          <div class="shrink-0">${rightHtml}</div>
        </div>
      `;
    }

    function eraTierCounts() {
      const counts = { god: 0, strong: 0, underdog: 0 };
      for (const e of ERAS) {
        if (counts[e.tier] != null) counts[e.tier]++;
      }
      return counts;
    }

    function header(sub) {
      const tc = eraTierCounts();
      return `
        <header class="mb-5 border-b border-zinc-800 pb-4">
          <div class="flex items-end justify-between gap-3">
            <div>
              <div class="text-xs text-zinc-300 tracking-widest uppercase mb-1">Roster Protocol · ${ERAS.length} Eras</div>
              <h1 class="font-display text-2xl text-white tracking-tight">24-0<span class="text-f1-red"> Perfect Season</span></h1>
              ${sub ? `<p class="text-sm text-zinc-300 mt-1">${sub}</p>`: ''}
            </div>
            <div class="text-right">
              <div class="flex items-center justify-end gap-1.5 mb-0.5">
                <div class="text-xs text-zinc-400 uppercase tracking-widest">Stakes</div>
                ${helpBtn('folklore')}
              </div>
              <div class="font-display text-lg text-white">24–0</div>
              ${ADS.enabled ? `<div class="mt-1">${helpBtn('ads')}</div>` : ''}
            </div>
          </div>
          <div class="mt-3 flex flex-wrap gap-1.5 text-[9px] uppercase tracking-wider font-display items-center">
            <span class="px-1.5 py-0.5 border" style="color:#D4AF37;border-color:#D4AF37">God Tier ×${tc.god}</span>
            <span class="px-1.5 py-0.5 border border-zinc-400 text-zinc-300">Strong ×${tc.strong}</span>
            <span class="px-1.5 py-0.5 border" style="color:#CD7F32;border-color:#CD7F32">Underdog ×${tc.underdog} · Folklore</span>
            <span class="ml-auto flex flex-col items-end gap-1">
              <button type="button" onclick="openLeaderboard()" class="lb-chip px-0 py-0.5 text-[#3B82F6] hover:text-[#60A5FA]"
                title="Season leaderboard">★ Leaderboard ★</button>
              <button type="button" onclick="openGarage()" class="lb-chip px-0 py-0.5 inline-flex items-center gap-1" style="color:#D4AF37"
                title="Eras · history · trophies">${ICON_GARAGE}<span>Garage</span>${ICON_GARAGE}</button>
            </span>
          </div>
          <div class="mt-3">
            <div class="flex items-center gap-2 mb-2">
              <div class="text-[10px] uppercase tracking-widest font-display" style="color:#D4AF37">Best Outcomes in History</div>

                <div class="bg-zinc-800 border border-zinc-700 px-1 py-1.5 text-center min-w-0">

                  <div class="text-[9px] mt-1 leading-tight" style="color:#D4AF37">${b.year}</div>
                  <div class="text-[9px] text-zinc-200 leading-tight truncate">${b.team}</div>
                  <div class="text-[8px] text-zinc-400 leading-tight mt-0.5 line-clamp-2">${b.names}</div>
                </div>
              `).join('')}
            </div>
          </div>
        </header>
      `;
    }

    function eraCardInner(era) {
      const years = era ? era.era : '–';
      const team = era ? era.team : '–';
      const color = era ? era.color: '#71717a';
      const note = era ? era.note : `Spin a constructor era. ${ERAS.length} eras · God / Strong / Underdog. Spike wins races; hole ends seasons.`;
      const tier = era ? tierInfo(era): null;
      const sh = era ? eraSpikeHole(era): null;
      const meanings = {
        power: 'Engine / hybrid power advantage',
        aero: 'Chassis, downforce, car concept',
        reliability: 'Finish rate, mechanical robustness',
        strategy: 'Race ops, pit calls, race craft',
      };
      const rows = era
        ? eraAxes(era).map(a => ({
            name: a.label,
            meaning: meanings[a.key],
            val: a.val,
            mark: sh && a.key === sh.spike.key ? 'SPIKE': sh && a.key === sh.hole.key ? 'HOLE': '',
          })): [
            { name: 'Power Unit', meaning: meanings.power, val: null, mark: '' },
            { name: 'Aerodynamics', meaning: meanings.aero, val: null, mark: '' },
            { name: 'Reliability', meaning: meanings.reliability, val: null, mark: '' },
            { name: 'Strategy', meaning: meanings.strategy, val: null, mark: '' },
          ];

      return `
        <div class="flex flex-col h-full">
          <div class="flex justify-between items-center gap-3 mb-2">
            <div class="flex items-center gap-2">
              <div class="text-xs text-white uppercase tracking-wider">Constructor Era</div>

            </div>
            <div class="text-xs text-zinc-200 font-display tracking-wide">${years}</div>
          </div>
          <div class="flex justify-between items-start mb-1.5 gap-2">
            <div class="font-display text-2xl leading-none min-w-0" style="color: ${color}">${team}</div>
            <div class="flex items-center gap-1.5 shrink-0">
              ${tier ? `<div class="text-[9px] uppercase tracking-wider font-display px-1.5 py-0.5 border" style="color: ${tier.color};border-color: ${tier.color}">${tier.label}</div>`: ''}
              <div class="w-2.5 h-2.5" style="background: ${color}"></div>
            </div>
          </div>
          ${era?.tier === 'underdog' ? `<div class="text-[10px] uppercase tracking-widest font-display mb-1" style="color: #CD7F32">Folklore path</div>`: ''}

            <div class="text-[10px] text-white uppercase tracking-wider mb-1.5">Era strengths · spike / hole</div>
            <div class="bg-zinc-950 border border-zinc-800">
              <div class="grid grid-cols-[6.25rem_1fr_2.25rem] gap-x-2 px-2 py-1.5 border-b border-zinc-800 text-[10px] text-zinc-400 uppercase tracking-wide">
                <div>Name</div>
                <div class="text-center">What it means</div>
                <div class="text-right">Score</div>
              </div>
              ${rows.map(r => `
                <div class="grid grid-cols-[6.25rem_1fr_2.25rem] gap-x-2 px-2 py-1.5 border-b border-zinc-800/80 last:border-0 items-center">
                  <div class="text-[10px] text-white font-medium leading-tight">
                    ${r.name}
                    ${r.mark === 'SPIKE' ? '<span class="text-emerald-400 text-[8px] ml-0.5">SPIKE</span>': ''}
                    ${r.mark === 'HOLE' ? '<span class="text-f1-red text-[8px] ml-0.5">HOLE</span>': ''}
                  </div>
                  <div class="text-[10px] text-zinc-300 leading-tight text-center">${r.meaning}</div>
                  <div class="font-display text-sm text-white tabular-nums text-right">${r.val != null ? Math.round(r.val * 100) : '–'}</div>
                </div>
              `).join('')}
            </div>
          </div>
        </div>
      `;
    }

    function renderSetup() {
      const era = state.era;
      const locked = !era;

      const principals = era?.principals || [];
