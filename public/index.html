    function closeShare() {
      document.getElementById('share-modal')?.classList.add('hidden');
      if (document.getElementById('help-modal')?.classList.contains('hidden')) {
        document.body.style.overflow = '';
      }
    }

    function shareCanvasBlob() {
      const canvas = document.getElementById('share-canvas');
      return new Promise((resolve, reject) => {
        canvas.toBlob(b => (b ? resolve(b) : reject(new Error('Could not export image'))), 'image/png');
      });
    }

    function shareFileName() {
      const slug = `${state.era?.team || 'team'}-${state.wins}-${state.losses}`.replace(/\s+/g, '-').toLowerCase();
      return `24-0-f1-${slug}.png`;
    }

    /** iOS / Android: prefer share sheet so user can Save Image / Photos. */
    function prefersMobileShareSheet() {
      const ua = navigator.userAgent || '';
      const touch = (navigator.maxTouchPoints || 0) > 0;
      if (/iPhone|iPad|iPod|Android/i.test(ua)) return true;
      // iPadOS desktop UA
      if (navigator.platform === 'MacIntel' && touch) return true;
      return false;
    }

    function triggerFileDownload(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.rel = 'noopener';
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 2500);
    }

    /**
     * Open OS share sheet with the PNG when supported (Save to Photos / Files / apps).
     * Returns 'shared' | 'cancelled' | 'unavailable'
     */
    async function sharePngViaSheet(blob, filename, { withCaption = false } = {}) {
      if (!navigator.share) return 'unavailable';
      const file = new File([blob], filename, { type: 'image/png' });
      const payload = withCaption
        ? { files: [file], title: '24-0 F1', text: shareCaption() }
        : { files: [file], title: '24-0 F1' };

      // Prefer canShare when available; some mobile browsers are picky
      let canFiles = false;
      try {
        canFiles = !navigator.canShare || navigator.canShare({ files: [file] });
      } catch (_) {
        canFiles = prefersMobileShareSheet();
      }
      if (!canFiles) return 'unavailable';

      try {
        await navigator.share(payload);
        return 'shared';
      } catch (e) {
        if (e?.name === 'AbortError') return 'cancelled';
        // Retry with caption only on file share failure is less useful for Save PNG
        throw e;
      }
    }

    async function downloadShareCard() {
      try {
        paintShareCard(document.getElementById('share-canvas'));
        const blob = await shareCanvasBlob();
        const filename = shareFileName();

        // Mobile: system share sheet → Save Image / Add to Photos / Files
        if (prefersMobileShareSheet() || (navigator.share && navigator.canShare)) {
          const result = await sharePngViaSheet(blob, filename, { withCaption: false });
          if (result === 'shared') {
            setShareStatus('Share sheet opened — choose Save Image / Photos / Files.');
            return;
          }
          if (result === 'cancelled') {
            setShareStatus('Share cancelled.');
            return;
          }
        }

        // Desktop / no file-share: classic download
        triggerFileDownload(blob, filename);
        setShareStatus(prefersMobileShareSheet()
          ? 'Download started. If no share sheet appeared, use Share… or long-press the card.'
          : 'PNG downloaded.');
      } catch (e) {
        if (e?.name === 'AbortError') {
          setShareStatus('Share cancelled.');
          return;
        }
        try {
          paintShareCard(document.getElementById('share-canvas'));
          const blob = await shareCanvasBlob();
          triggerFileDownload(blob, shareFileName());
          setShareStatus('PNG downloaded (fallback).');
        } catch (e2) {
          setShareStatus(e2.message || e.message || 'Save failed.', false);
        }
      }
    }

    async function copyShareImage() {
      try {
        paintShareCard(document.getElementById('share-canvas'));
        const blob = await shareCanvasBlob();
        if (!navigator.clipboard || !window.ClipboardItem) {
          setShareStatus('Copy image not supported here — use Save PNG.', false);
          return;
        }
        await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
        setShareStatus('Image copied — paste into X, Discord, Slack, etc.');
      } catch (e) {
        setShareStatus('Could not copy image. Try Save PNG.', false);
      }
    }

    async function copyShareCaption() {
      try {
        const text = shareCaption();
        if (navigator.clipboard?.writeText) await navigator.clipboard.writeText(text);
        else {
          const ta = document.createElement('textarea');
          ta.value = text;
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          ta.remove();
        }
        setShareStatus('Caption copied.');
      } catch (_) {
        setShareStatus('Could not copy caption.', false);
      }
    }

    async function nativeShareCard() {
      try {
        paintShareCard(document.getElementById('share-canvas'));
        const blob = await shareCanvasBlob();
        const filename = shareFileName();
        const result = await sharePngViaSheet(blob, filename, { withCaption: true });
        if (result === 'shared') {
          setShareStatus('Shared.');
          return;
        }
        if (result === 'cancelled') {
          setShareStatus('Share cancelled.');
          return;
        }
        // No file share: text-only sheet, then offer download
        if (navigator.share) {
          await navigator.share({ title: '24-0 F1', text: shareCaption() });
          setShareStatus('Caption shared. Use Save PNG for the image.');
          return;
        }
        triggerFileDownload(blob, filename);
        setShareStatus('PNG downloaded (share unavailable).');
      } catch (e) {
        if (e?.name === 'AbortError') setShareStatus('Share cancelled.');
        else setShareStatus('Share failed — try Save PNG.', false);
      }
    }

    async function unlockShareClean() {
      const ok = await requestShareClean();
      if (ok) render();
    }

    // ─────────────────────────────────────────────
    // LEADERBOARD (localStorage always · Supabase when configured)
    // ─────────────────────────────────────────────
    const LB_KEY = 'f1_240_leaderboard_v1';

    function lbLocalLoad() {
      try {
        const raw = localStorage.getItem(LB_KEY);
        const arr = raw ? JSON.parse(raw) : [];
        return Array.isArray(arr) ? arr : [];
      } catch (_) {
        return [];
      }
    }

    function lbLocalSave(rows) {
      try {
        localStorage.setItem(LB_KEY, JSON.stringify(rows.slice(0, 50)));
      } catch (_) { /* quota */ }
    }

    function lbSort(rows) {
      return rows.slice().sort((a, b) => {
        if (b.wins !== a.wins) return b.wins - a.wins;
        if (a.redos_used !== b.redos_used) return a.redos_used - b.redos_used;
        return (b.created_at || 0) - (a.created_at || 0);
      });
    }

    function currentSeasonEntry(nickname) {
      if (!state.era || !state.primary) return null;
      if (state.wins + state.losses !== 24) return null;
      return {
        id: `local-${Date.now()}`,
        created_at: Date.now(),
        nickname: (nickname || 'Driver').slice(0, 24),
        era_id: state.era.id,
        team: state.era.team,
        era_label: state.era.era,
        tier: state.era.tier,
        wins: state.wins,
        losses: state.losses,
        redos_used: SEASON_REDOS - state.redosLeft,
        primary_driver: state.primary.name,
        teammate: state.teammate?.name || '',
        principal: state.principal?.name || '',
        schedule: scheduleSummary(),
        is_perfect: state.wins === 24,
      };
    }

    function lbTierLabel(tier) {
      if (tier === 'god') return 'God Tier';
      if (tier === 'underdog') return 'Underdog';
      return 'Strong';
    }

    function lbTierColor(tier) {
      if (tier === 'god') return '#D4AF37';
      if (tier === 'underdog') return '#CD7F32';
      return '#C0C0C0';
    }

    /** Rare-win tiers for special presentation */
    function lbRarity(r) {
      const w = r.wins ?? 0;
      if (w >= 24 || r.is_perfect) {
        return {
          key: 'perfect',
          cardClass: 'lb-perfect',
          badge: '24–0 PERFECT!',
          badgeColor: '#F5D76E',
          blurb: 'Clean sweep · folklore territory',
        };
      }
      if (w >= 20) {
        return {
          key: 'elite',
          cardClass: 'lb-elite',
          badge: w >= 22 ? 'ELITE SWEEP!' : 'DOMINANT!',
          badgeColor: '#60A5FA',
          blurb: w >= 22 ? 'Near-perfect campaign' : 'Championship iron · 20+ wins',
        };
      }
      if (w >= 14) {
        return { key: 'solid', cardClass: '', badge: 'RACE-WINNING!', badgeColor: '#A1A1AA', blurb: '' };
      }
      return { key: 'run', cardClass: '', badge: '', badgeColor: '#71717a', blurb: '' };
    }

    function lbFormatWhen(ts) {
      if (!ts) return '';
      try {
        const d = new Date(typeof ts === 'number' ? ts : Date.parse(ts));
        if (Number.isNaN(d.getTime())) return '';
        return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
      } catch (_) {
        return '';
      }
    }

    function lbRenderRows(rows) {
      if (!rows.length) {
        return `
          <p class="text-zinc-400 text-sm leading-relaxed px-1">No seasons here yet.</p>
          <p class="text-[11px] text-zinc-600 mt-2 px-1">Finish a campaign and use Submit to leaderboard on the debrief.</p>`;
      }
      return rows.map((r, i) => {
        const tierColor = lbTierColor(r.tier);
        const tierLab = lbTierLabel(r.tier);
        const rec = `${r.wins}–${r.losses}`;
        const rare = lbRarity(r);
        const redos = r.redos_used ?? 0;
        const redoCls = redos === 0 ? 'lb-redo-gold' : 'lb-redo-muted';
        const redoTxt = redos === 0 ? `Redos 0/${SEASON_REDOS}!` : `Redos ${redos}/${SEASON_REDOS}`;
        const when = lbFormatWhen(r.created_at);
        const lineup = [r.primary_driver, r.teammate].filter(Boolean).join(' / ') || '—';
        const principal = r.principal || '';
        const sched = r.schedule || '';
        return `
          <div class="lb-card ${rare.cardClass}">
            <div class="flex gap-3 items-start">
              <div class="font-display text-zinc-600 text-sm tabular-nums w-5 shrink-0 pt-1">${i + 1}</div>
              <div class="min-w-0 flex-1">
                <div class="flex flex-wrap items-center gap-x-2 gap-y-1">
                  <span class="lb-record">${rec}</span>
                  ${rare.badge ? `<span class="lb-pill" style="color:${rare.badgeColor};border-color:${rare.badgeColor}">${rare.badge}</span>` : ''}
                </div>
                ${rare.blurb ? `<div class="text-[10px] mt-0.5" style="color:${rare.badgeColor}">${rare.blurb}</div>` : ''}
                <div class="text-xs text-zinc-200 mt-1.5 truncate font-medium">${r.nickname || 'Driver'}</div>
                <div class="text-[11px] text-zinc-400 mt-0.5 leading-snug">
                  <span class="text-zinc-300">${r.team || ''} ${r.era_label || ''}</span>
                  ${lineup !== '—' ? `<span class="text-zinc-600"> · </span>${lineup}` : ''}
                </div>
                ${principal ? `<div class="text-[11px] text-zinc-500 mt-0.5 truncate">Lead · ${principal}</div>` : ''}
                ${sched && sched !== 'Not drawn' ? `<div class="text-[10px] text-zinc-600 mt-0.5 truncate">Arc · ${sched}</div>` : ''}
                <div class="flex flex-wrap items-center gap-x-2 gap-y-0.5 mt-1.5 text-[10px]">
                  <span class="${redoCls} uppercase tracking-wider font-display">${redoTxt}</span>
                  ${when ? `<span class="text-zinc-600">· ${when}</span>` : ''}
                </div>
              </div>
              <div class="lb-pill shrink-0 text-center max-w-[4.5rem] leading-tight" style="color:${tierColor};border-color:${tierColor}">${tierLab}</div>
            </div>
          </div>`;
      }).join('');
    }

    let _lbTab = 'public';
    let _lbCache = { public: [], device: [] };

    function setLeaderboardTab(tab) {
      _lbTab = tab === 'device' ? 'device' : 'public';
      const pub = document.getElementById('lb-tab-public');
      const dev = document.getElementById('lb-tab-device');
      if (pub) {
        pub.classList.toggle('is-on', _lbTab === 'public');
        pub.setAttribute('aria-selected', _lbTab === 'public' ? 'true' : 'false');
      }
      if (dev) {
        dev.classList.toggle('is-on', _lbTab === 'device');
        dev.setAttribute('aria-selected', _lbTab === 'device' ? 'true' : 'false');
      }
      const body = document.getElementById('lb-body');
      if (!body) return;
      const rows = _lbTab === 'device' ? _lbCache.device : _lbCache.public;
      body.innerHTML = lbRenderRows(rows);
    }

    /** Normalize project URL (strip trailing / and accidental /rest/v1). */
    function supabaseBaseUrl() {
      let u = String(_cfg.supabaseUrl || '').trim().replace(/\/+$/, '');
      u = u.replace(/\/rest\/v1$/i, '');
      return u;
    }

    function supabaseHeaders(extra = {}) {
      const key = _cfg.supabaseAnonKey || '';
      // Publishable keys (sb_publishable_…) and legacy anon JWTs both go in apikey.
      // Authorization mirrors apikey for gateway compatibility.
      return {
        apikey: key,
        Authorization: `Bearer ${key}`,
        Accept: 'application/json',
        ...extra,
      };
    }

    async function lbFetchRemote() {
      const base = supabaseBaseUrl();
      const key = _cfg.supabaseAnonKey || '';
      if (!base || !key) return [];
      try {
        const res = await fetch(
          `${base}/rest/v1/season_results?select=*&order=wins.desc,redos_used.asc,created_at.desc&limit=30`,
          { headers: supabaseHeaders() }
        );
        if (!res.ok) {
          console.warn('Leaderboard fetch failed', res.status, await res.text().catch(() => ''));
          return [];
        }
        const data = await res.json();
        return (data || []).map(r => ({
          id: r.id,
          created_at: r.created_at ? new Date(r.created_at).getTime() : 0,
          nickname: r.nickname || 'Driver',
          era_id: r.era_id,
          team: r.team,
          era_label: r.era_label,
          tier: r.tier,
          wins: r.wins,
          losses: r.losses,
          redos_used: r.redos_used ?? 0,
          primary_driver: r.primary_driver || '',
          is_perfect: !!r.is_perfect || r.wins === 24,
          source: 'cloud',
        }));
      } catch (e) {
        console.warn('Leaderboard fetch error', e);
        return [];
      }
    }

    async function lbPushRemote(entry) {
      const base = supabaseBaseUrl();
      const key = _cfg.supabaseAnonKey || '';
      if (!base || !key || !entry) return false;
      try {
        const res = await fetch(`${base}/rest/v1/season_results`, {
          method: 'POST',
          headers: supabaseHeaders({
            'Content-Type': 'application/json',
            Prefer: 'return=minimal',
          }),
          body: JSON.stringify({
            nickname: entry.nickname,
            era_id: entry.era_id,
            team: entry.team,
            era_label: entry.era_label,
            tier: entry.tier,
            wins: entry.wins,
            losses: entry.losses,
            redos_used: entry.redos_used,
            primary_driver: entry.primary_driver,
            user_agent: (navigator.userAgent || '').slice(0, 180),
          }),
        });
        if (!res.ok) {
          console.warn('Leaderboard insert failed', res.status, await res.text().catch(() => ''));
        }
        return res.ok;
      } catch (e) {
        console.warn('Leaderboard insert error', e);
        return false;
      }
    }

    async function submitToLeaderboard() {
      const nick = (prompt('Nickname for leaderboard (max 24 chars):', 'Driver') || '').trim().slice(0, 24);
      if (!nick) return;
      const entry = currentSeasonEntry(nick);
      if (!entry) {
        alert('Finish all 24 races before submitting.');
        return;
      }
      const local = lbLocalLoad();
      local.unshift(entry);
      lbLocalSave(lbSort(local));
      const cloud = await lbPushRemote(entry);
      state.lbSubmitted = true;
      render();
      alert(cloud
        ? 'Saved locally and to the cloud leaderboard.'
        : 'Saved on this device. Cloud submit skipped (Supabase not configured or offline).');
    }

    async function openLeaderboard() {
      const body = document.getElementById('lb-body');
      const modal = document.getElementById('lb-modal');
      if (!body || !modal) return;
      body.innerHTML = '<p class="text-zinc-500 text-xs px-1">Loading…</p>';
      modal.classList.remove('hidden');
      document.body.style.overflow = 'hidden';

      const device = lbSort(lbLocalLoad().map(r => ({ ...r, source: 'device' }))).slice(0, 40);
      const remote = await lbFetchRemote();
      const pub = lbSort(remote.map(r => ({ ...r, source: 'cloud' }))).slice(0, 40);
      _lbCache = { public: pub, device };

      // Default tab: Public if cloud has rows, else Device
      _lbTab = pub.length ? 'public' : 'device';
      setLeaderboardTab(_lbTab);
    }

    function closeLeaderboard() {
      document.getElementById('lb-modal')?.classList.add('hidden');
      if (document.getElementById('help-modal')?.classList.contains('hidden') &&
          document.getElementById('share-modal')?.classList.contains('hidden') &&
          document.getElementById('ad-modal')?.classList.contains('hidden')) {
        document.body.style.overflow = '';
      }
    }

    function render() {
      const root = document.getElementById('app');
      if (state.phase === 'setup') root.innerHTML = renderSetup();
      else if (state.phase === 'season') root.innerHTML = renderSeason();
      else if (state.phase === 'result') root.innerHTML = renderResult();
      updateAdBanner();
      // Re-measure after layout (banner height / safe area)
      requestAnimationFrame(updateAdBanner);
    }

    Object.assign(window, {
      spinEra, spinSeason, selectDriver, selectPrincipal, setLineupOpen, onDriverChange, onPrincipalChange, setBudget, setMod, setPhase,
      startSeason, simulateSeason, redoRace, applyRedoSim, dismissRedoFeedback, resetAll,
      openHelp, closeHelp, goDebrief,
      openShare, closeShare, downloadShareCard, copyShareImage, copyShareCaption, nativeShareCard,
      unlockShareClean, requestEraSpin, ADS,
      openLeaderboard, closeLeaderboard, submitToLeaderboard, setLeaderboardTab,
      state, render, buildDebrief,
    });

    render();
  </script>
</body>
</html>
