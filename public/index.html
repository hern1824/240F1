      { id: 'normal', label: 'Standard scrutiny', lobbyRiskScale: 1, tip: 'Baseline protest/exclusion rates.' },
      { id: 'heat', label: 'Reg heat', lobbyRiskScale: 1.45, tip: 'Aggressive lobbying is much more dangerous.' },
    ];
    const BUDGET_KEYS = ['power', 'aero', 'reliability', 'strategy'];
    const BUDGET_LABELS = {
      power: 'Power Unit',
      aero: 'Aero / Chassis',
      reliability: 'Reliability',
      strategy: 'Strategy',
    };
    const BUDGET_MIN = 5;
    const BUDGET_MAX_ONE = 85; // leaves min 5 for each other

    // Season redo budget. Redos are scarce and taxed — not free re-rolls of close losses.
    const SEASON_REDOS = 3;

    // ── Ads: soft placements only. Never sell win rate, free redos, or weaker field. ──
    // Override via config.js (SITE_CONFIG.ads / adsense). Demo until AdSense is live.
    const _cfg = window.SITE_CONFIG || {};
    const _cfgAds = _cfg.ads || {};
    const ADS = {
      enabled: _cfgAds.enabled !== false,
      demo: _cfgAds.demo !== false, // true until you set ads.demo = false in config.js
      freeEraSpins: _cfgAds.freeEraSpins ?? 3,
      interstitialMs: 2200,
      rewardedMs: 3200,
      bannerOnSetup: _cfgAds.bannerOnSetup !== false,
      bannerOnSeason: _cfgAds.bannerOnSeason !== false,
      bannerOnResult: !!_cfgAds.bannerOnResult,
      interstitialOnSeasonComplete: _cfgAds.interstitialOnSeasonComplete !== false,
      rewardedEraRespin: _cfgAds.rewardedEraRespin !== false,
      rewardedShareClean: _cfgAds.rewardedShareClean !== false,
      adsenseClient: (_cfg.adsense && _cfg.adsense.client) || '',
      adsenseSlots: (_cfg.adsense && _cfg.adsense.slots) || {},
    };

    // Optional GA4
    if (_cfg.ga4Id && /^G-/.test(_cfg.ga4Id)) {
      const s = document.createElement('script');
      s.async = true;
      s.src = `https://www.googletagmanager.com/gtag/js?id=${_cfg.ga4Id}`;
      document.head.appendChild(s);
      window.dataLayer = window.dataLayer || [];
      function gtag(){ dataLayer.push(arguments); }
      window.gtag = gtag;
      gtag('js', new Date());
      gtag('config', _cfg.ga4Id);
    }

    // ─────────────────────────────────────────────
    // STATE
    // ─────────────────────────────────────────────
    const state = {
      phase: 'setup', // setup | season | result
      era: null,
      primary: null,
      teammate: null,
      principal: null,
      budget: { power: 25, aero: 25, reliability: 25, strategy: 25 },
      tirePhil: 'balanced',
      devCutoff: 'mid',
      lobbying: 'passive',
      sponsor: 'title',
      seasonDraw: null, // one-spin locked season outlook
      seasonSpinning: false,
      lineupOpen: 'primary', // accordion: primary | teammate | principal
      races: [],
      redosLeft: SEASON_REDOS, // season pool, not per race
      wins: 0,
      losses: 0,
      simulating: false,
      spinning: false,
      spinIndex: 0,
      debrief: [],
      seasonComplete: false,
      redoFeedback: null, // { n, name, outcome, margin, notes, remaining }
      lbSubmitted: false,
      // Ads session flags
      eraSpinsUsed: 0,
      ads: {
        seasonInterstitialShown: false,
        shareClean: false, // after optional rewarded
      },
    };

    // ─────────────────────────────────────────────
    // UTILS
    // ─────────────────────────────────────────────
    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
    function rand() { return Math.random(); }
    function randInt(a, b) { return Math.floor(rand() * (b - a + 1)) + a; }
    function pick(arr) { return arr[Math.floor(rand() * arr.length)]; }
    function budgetTotal() {
      return BUDGET_KEYS.reduce((s, k) => s + state.budget[k], 0);
    }
    function tireWearLabel(level) {
      if (level === 'Low') return { text: 'Low', cls: 'text-emerald-400' };
      if (level === 'High') return { text: 'High', cls: 'text-amber-400' };
      return { text: 'Medium', cls: 'text-zinc-300' };
    }
    function phaseForRace(n) {
      if (n <= 8) return 'opening';
      if (n <= 16) return 'mid';
      return 'close';
    }
    function getSeasonDraw() {
      return state.seasonDraw;
    }

    function phaseMods(n) {
      const draw = getSeasonDraw();
      const key = draw ? draw[phaseForRace(n)] : 'balanced';
      return PHASE_TYPES.find(p => p.id === key) || PHASE_TYPES[0];
    }

    function scheduleSummary() {
      const draw = getSeasonDraw();
      if (!draw) return 'Not drawn';
      const o = PHASE_TYPES.find(p => p.id === draw.opening).label;
      const m = PHASE_TYPES.find(p => p.id === draw.mid).label;
      const c = PHASE_TYPES.find(p => p.id === draw.close).label;
      return `${o} / ${m} / ${c}`;
    }

    function seasonDrawSummaryLines(draw) {
      if (!draw) return [];
      const phase = `${PHASE_TYPES.find(p => p.id === draw.opening).label} / ${PHASE_TYPES.find(p => p.id === draw.mid).label} / ${PHASE_TYPES.find(p => p.id === draw.close).label}`;
      return [
        { k: 'Arc', v: phase },
        { k: 'Wear', v: WEAR_CLIMATES.find(x => x.id === draw.wear).label },
        { k: 'SC', v: SC_CLIMATES.find(x => x.id === draw.sc).label },
        { k: 'Weather', v: WEATHER_CLIMATES.find(x => x.id === draw.weather).label },
        { k: 'Travel', v: TRAVEL_CLIMATES.find(x => x.id === draw.travel).label },
        { k: 'Regs', v: REG_CLIMATES.find(x => x.id === draw.reg).label },
      ];
    }

    function applyWearBias(tire, wearId) {
      if (wearId === 'mixed' || !wearId) return tire;
      if (wearId === 'high') {
        if (tire === 'Low') return Math.random() < 0.35 ? 'Medium' : 'Low';
        if (tire === 'Medium') return Math.random() < 0.55 ? 'High' : 'Medium';
        return 'High';
      }
      // low
      if (tire === 'High') return Math.random() < 0.35 ? 'Medium' : 'High';
      if (tire === 'Medium') return Math.random() < 0.55 ? 'Low' : 'Medium';
      return 'Low';
    }

    function rollSeasonDraw() {
      return {
        opening: pick(PHASE_TYPES).id,
        mid: pick(PHASE_TYPES).id,
        close: pick(PHASE_TYPES).id,
        wear: pick(WEAR_CLIMATES).id,
        sc: pick(SC_CLIMATES).id,
        weather: pick(WEATHER_CLIMATES).id,
        travel: pick(TRAVEL_CLIMATES).id,
        reg: pick(REG_CLIMATES).id,
        locked: true,
      };
    }

    function spinSeason() {
      if (state.seasonDraw?.locked || state.seasonSpinning) return;
      state.seasonSpinning = true;
      let ticks = 0;
      const maxTicks = 14 + randInt(0, 6);
      const iv = setInterval(() => {
        state.seasonDraw = rollSeasonDraw();
        state.seasonDraw.locked = false;
        render();
        ticks++;
        if (ticks >= maxTicks) {
          clearInterval(iv);
          state.seasonDraw = rollSeasonDraw();
          state.seasonDraw.locked = true;
          state.seasonSpinning = false;
          render();
        }
      }, 55);
    }

    // Fixed calendar facts the player can use before Enter Season
    const POWER_TRACK_NS = [1, 2, 16, 17, 22];
    const AERO_TRACK_NS = [8, 9, 13, 15, 19];

    function calendarOutlook() {
      let high = 0, med = 0, low = 0, highSC = 0, wetRisk = 0;
      const phaseWear = {
        opening: { high: 0, low: 0, wet: 0 },
        mid: { high: 0, low: 0, wet: 0 },
        close: { high: 0, low: 0, wet: 0 },
      };
      RACES.forEach(r => {
        if (r.tire === 'High') high++;
        else if (r.tire === 'Low') low++;
        else med++;
        if (r.sc >= 28) highSC++;
        if (r.baseRain >= 35) wetRisk++;
        const ph = phaseForRace(r.n);
        if (r.tire === 'High') phaseWear[ph].high++;
        if (r.tire === 'Low') phaseWear[ph].low++;
        if (r.baseRain >= 35) phaseWear[ph].wet++;
      });
      const draw = getSeasonDraw();
      const phases = draw ? [draw.opening, draw.mid, draw.close] : ['balanced', 'balanced', 'balanced'];
      const weatherBlocks = phases.filter(k => k === 'weather').length;
      const powerBlocks = phases.filter(k => k === 'power').length;
      const techBlocks = phases.filter(k => k === 'technical').length;
      const wearClimate = draw ? draw.wear : 'mixed';
      const scClimate = draw ? draw.sc : 'normal';
      const weatherClimate = draw ? draw.weather : 'normal';
      const travelClimate = draw ? draw.travel : 'compact';
      const regClimate = draw ? draw.reg : 'normal';
      return {
        high, med, low, highSC, wetRisk,
        powerTracks: POWER_TRACK_NS.length,
        aeroTracks: AERO_TRACK_NS.length,
        weatherBlocks, powerBlocks, techBlocks,
        phaseWear,
        wearClimate, scClimate, weatherClimate, travelClimate, regClimate,
        drawn: !!draw,
      };
    }

    /** Decision brief: signals for era + calendar + schedule (suggestive, not orders). */
    function setupDecisionBrief() {
      const cal = calendarOutlook();
      const era = state.era;
      const steps = [];
      const recs = []; // { area, note }
      const pathLines = [];

      if (era) {
        const { spike, hole } = eraSpikeHole(era);
        const tier = tierInfo(era);
        steps.push(`<strong class="text-white">${tier.label}</strong>: ${tier.stakes}`);
        steps.push(`Spike is <strong class="text-white">${spike.label}</strong> (${Math.round(spike.val * 100)}). Hole is <strong class="text-white">${hole.label}</strong> (${Math.round(hole.val * 100)}). Multipliers reward funding the hole and leaning into the spike.`);
        pathLines.push(era.path || tier.path);
        if (era.tier === 'underdog') {
          pathLines.push('Same rules as God Tier. No free pace, no softer field, no extra redos. Folklore is Perfect Fit, Perfect Execution, and Survival all at once.');
          recs.push({
            area: 'Underdog stakes',
            note: 'Free risk (Aggressive lobby, Attack spam, starving Reli) usually ends the run before skill can matter. Survival tools and the spike have to work together.',
          });
        }
        if (hole.key === 'reliability' || era.reliabilityBias < 0.85) {
          recs.push({
            area: 'Reliability hole',
            note: `${hole.label} is the soft wall. Heavier Reli spend and Title-style cover reduce DNF variance. A single retirement ends 24–0.`,
          });
          recs.push({
            area: 'Scrutiny risk',
            note: 'Lobbying edge comes with exclusion risk. Brittle packages feel that risk more because they cannot afford free losses.',
          });
        }
        if (spike.key === 'strategy') {
          recs.push({
            area: 'Strategy spike',
            note: `Strategy is the win generator here. High-SC weekends (${cal.highSC} on this calendar) and principals with strategy bonuses interact with that axis.`,
          });
        }
        if (spike.key === 'aero') {
          recs.push({
            area: 'Aero spike',
            note: 'Aerodynamics is the concept edge. Technical schedule blocks and aero-biased principals line up with that strength.',
          });
        }
        if (spike.key === 'power') {
          recs.push({
            area: 'Power spike',
            note: 'Power Unit is the multiplier. Power schedule blocks and engine-focused leads pull in the same direction.',
          });
        }
      } else {
        steps.push('Spin an era first. Tier, spike, and hole shape every later choice.');
      }

      steps.push(`Calendar wear: <strong class="text-white">${cal.high} High</strong> · ${cal.med} Medium · <strong class="text-white">${cal.low} Low</strong>. High-SC weekends: <strong class="text-white">${cal.highSC}</strong>. Wet-risk base tracks: <strong class="text-white">${cal.wetRisk}</strong>.`);
      if (cal.high >= cal.low + 2) {
        recs.push({
          area: 'Tire wear shape',
          note: `This calendar has more High-wear races (${cal.high}) than Low (${cal.low}). Conservative tire profiles interact better with cliff risk; Aggressive profiles pay more on the minority Low-wear set.`,
        });
      } else if (cal.low >= cal.high + 1) {
        recs.push({
          area: 'Tire wear shape',
          note: `Low-wear races (${cal.low}) outnumber High (${cal.high}). Aggressive tire profiles gain more weekends here; Conservative ones trade that pace away.`,
        });
      } else {
        recs.push({
          area: 'Tire wear shape',
          note: 'Wear is mixed across 24 races. Balanced tires avoid locking into one surface type.',
        });
      }
      
      if (cal.drawn) {
        const wearMeta = WEAR_CLIMATES.find(x => x.id === cal.wearClimate);
        const scMeta = SC_CLIMATES.find(x => x.id === cal.scClimate);
        const wxMeta = WEATHER_CLIMATES.find(x => x.id === cal.weatherClimate);
        const trMeta = TRAVEL_CLIMATES.find(x => x.id === cal.travelClimate);
        const rgMeta = REG_CLIMATES.find(x => x.id === cal.regClimate);
        recs.push({ area: 'Drawn wear climate', note: `${wearMeta.label}. ${wearMeta.tip}` });
        recs.push({ area: 'Drawn SC climate', note: `${scMeta.label}. ${scMeta.tip}` });
        recs.push({ area: 'Drawn weather climate', note: `${wxMeta.label}. ${wxMeta.tip}` });
        recs.push({ area: 'Drawn travel', note: `${trMeta.label}. ${trMeta.tip}` });
        recs.push({ area: 'Drawn regs', note: `${rgMeta.label}. ${rgMeta.tip}` });
      } else {
        recs.push({ area: 'Season hand', note: 'Season is not drawn yet. Spin Season once to lock climates before treating signals as final.' });
      }

      if (cal.highSC >= 5) {
        recs.push({
          area: 'Safety car density',
          note: `${cal.highSC} high-SC weekends reward strategy depth and flexible pit windows more than pure straight-line spend.`,
        });
      }

      const open = getSeasonDraw()?.opening || 'balanced';
      const close = getSeasonDraw()?.close || 'balanced';
      if (close === 'weather' || cal.weatherBlocks >= 1) {
        recs.push({
          area: 'Weather pressure',
          note: 'Weather blocks raise rain variance. Primary Wet rating and Regional-style activation matter more on those weekends.',
        });
      }
      if (open === 'power' || open === 'weather' || open === 'technical') {
        recs.push({
          area: 'Season arc',
          note: 'Opening is stressed on your profile. Late Push starts soft there; Early Freeze or Mid keep early weekends more stable.',
        });
      } else if (close === 'power' || close === 'technical' || close === 'weather') {
        recs.push({
          area: 'Season arc',
          note: 'Close is the hard block. Late Push and Mid put more package life into R17–24; Early Freeze can fade there.',
        });
      } else {
        recs.push({
          area: 'Season arc',
          note: 'No single block is heavily stressed. An even development curve stays coherent.',
        });
      }
      if (cal.powerBlocks >= 1 && era && era.powerBias >= 0.94) {
        recs.push({
          area: 'Power alignment',
          note: 'A Power schedule block plus a strong era PU multiplies cleanly if budget and principal lean that way.',
        });
      }
      if (cal.techBlocks >= 1 && era && era.aeroBias >= 0.94) {
        recs.push({
          area: 'Aero alignment',
          note: 'A Technical block plus strong era aero multiplies when chassis spend and tech leads agree.',
        });
      }

      const fit = [];
      if (state.tirePhil === 'aggressive' && cal.high >= 8) {
        fit.push({ tone: 'warn', text: 'Season Push bias on a high-wear calendar: prefer Manage on abrasive weekends.' });
      } else if (state.tirePhil === 'conservative' && cal.low >= 5) {
        fit.push({ tone: 'warn', text: 'Season Manage bias on a low-wear calendar: prefer Push when deg is light.' });
      } else if (state.tirePhil === 'balanced') {
        fit.push({ tone: 'ok', text: 'Season tire bias is Neutral (default).' });
      }

      if (state.devCutoff === 'late' && (open === 'power' || open === 'weather' || open === 'technical')) {
        fit.push({ tone: 'bad', text: 'Late Push with a stressed Opening: early races start soft.' });
      } else if (state.devCutoff === 'early' && (close === 'power' || close === 'weather' || close === 'technical')) {
        fit.push({ tone: 'warn', text: 'Early Freeze with a hard Close: the field can overtake you late.' });
      } else {
        fit.push({ tone: 'ok', text: 'Dev cut-off is coherent with this schedule profile.' });
      }

      if (state.lobbying === 'aggressive') {
        fit.push({ tone: 'warn', text: 'Aggressive lobby: ~7% exclusion risk per race, harsh for 24–0.' });
      } else if (state.lobbying === 'passive') {
        fit.push({ tone: 'ok', text: 'Passive lobby: no exclusion risk.' });
      }

      if (state.sponsor === 'title') {
        fit.push({ tone: 'ok', text: 'Title sponsor: lower DNF risk, slight pace tax.' });
      } else if (state.sponsor === 'tech' && (cal.powerTracks + cal.aeroTracks) >= 8) {
        fit.push({ tone: 'ok', text: 'Tech partners: stronger on power/aero venues this calendar.' });
      } else if (state.sponsor === 'regional' && (cal.wetRisk >= 5 || cal.weatherBlocks >= 1)) {
        fit.push({ tone: 'ok', text: 'Regional mix: coherent for wet-risk / weather blocks.' });
      } else if (state.sponsor === 'tech') {
        fit.push({ tone: 'warn', text: 'Tech partners trade DNF cover for dry peak pace.' });
      }

      if (state.primary && state.primary.wet < 90 && (cal.weatherBlocks >= 1 || cal.wetRisk >= 6)) {
        fit.push({ tone: 'bad', text: `Primary wet ${state.primary.wet} is soft for this weather load.` });
      }
      if (era?.tier === 'underdog' && state.lobbying === 'aggressive') {
        fit.push({ tone: 'bad', text: 'Underdog + Aggressive lobby: exclusion risk is how folklore runs die.' });
      }
      if (era?.tier === 'underdog' && state.sponsor === 'tech' && era.reliabilityBias < 0.85) {
        fit.push({ tone: 'warn', text: 'Underdog with a Reli hole on Tech sponsors: Title is the usual survival trade.' });
      }

      return { cal, steps, recs, fit, pathLines, era };
    }

    function renderSeasonOutlook() {
      const brief = setupDecisionBrief();
      const toneCls = { ok: 'text-emerald-400', warn: 'text-amber-400', bad: 'text-f1-red' };
      if (!state.seasonDraw?.locked) {
        return `
        <section class="bg-zinc-800 p-5">
          ${sectionTitle('Package Fit', 'outlook')}
          <p class="text-[11px] text-zinc-400 leading-relaxed">Spin the season hand first. Fit notes appear once the draw is locked.</p>
        </section>`;
      }
      return `
        <section class="bg-zinc-800 p-5">
          ${sectionTitle('Package Fit', 'signals')}
          <div class="space-y-1.5">
            ${brief.fit.map(f => `
              <div class="text-[11px] leading-relaxed ${toneCls[f.tone] || 'text-zinc-300'}">· ${f.text}</div>
            `).join('')}
          </div>
        </section>
      `;
    }

    // Smart weekend defaults: what most players would pick, so simulate is not a 24-click chore.
    function raceSmartDefaults({ tire, sc, predRain }) {
      let strategy = '2-stop';
      if (tire === 'Low' && sc < 24) strategy = '1-stop';
      if (tire === 'High' || sc >= 28) strategy = '2-stop';

      let tirePlan = 'standard';
      if (tire === 'High' || predRain >= 38) tirePlan = 'manage';
      else if (tire === 'Low' && predRain < 22) tirePlan = 'push';

      let pitWindow = 'standard';
      if (sc >= 30) pitWindow = 'overcut';
      else if (sc < 14 && tire === 'High') pitWindow = 'undercut';

      // Balanced engine is almost always the non-chore default
      return { strategy, tirePlan, engineMode: 'balanced', pitWindow };
    }

    function prepareRaces() {
      const draw = getSeasonDraw();
      const scBoost = SC_CLIMATES.find(x => x.id === (draw?.sc || 'normal')).scBoost;
      const wxExtra = WEATHER_CLIMATES.find(x => x.id === (draw?.weather || 'normal')).weatherMod;
      state.races = RACES.map(r => {
        const mods = phaseMods(r.n);
        const tire = applyWearBias(r.tire, draw?.wear || 'mixed');
        const sc = clamp(r.sc + scBoost + (tire === 'High' ? 2 : 0), 4, 55);
        const predRain = clamp(r.baseRain + randInt(-8, 8) + Math.floor(mods.weatherMod * 0.35) + Math.floor(wxExtra * 0.5), 0, 92);
        const smart = raceSmartDefaults({ tire, sc, predRain });
        return {
          ...r,
          tire,
          sc,
          predRain,
          actualRain: null,
          airTemp: randInt(18, 34),
          trackTemp: randInt(28, 52),
          strategy: smart.strategy,
          tirePlan: smart.tirePlan,
          engineMode: smart.engineMode,
          pitWindow: smart.pitWindow,
          result: null,
          margin: null,
          notes: [],
          locked: false,
          phaseType: mods.id,
        };
      });
    }

    // Auto-balance budget: always totals 100
    function setBudget(key, rawVal) {
      const others = BUDGET_KEYS.filter(k => k !== key);
      const minOthers = BUDGET_MIN * others.length;
      let val = clamp(parseInt(rawVal, 10) || BUDGET_MIN, BUDGET_MIN, 100 - minOthers);
      state.budget[key] = val;

      let rest = 100 - val;
      // Keep relative proportions of the other three
      const otherSum = others.reduce((s, k) => s + state.budget[k], 0) || others.length;
      const shares = others.map(k => state.budget[k] / otherSum);
      let allocated = 0;
      others.forEach((k, i) => {
        if (i === others.length - 1) {
          state.budget[k] = rest - allocated;
        } else {
          const share = Math.max(BUDGET_MIN, Math.round(rest * shares[i]));
          state.budget[k] = share;
          allocated += share;
        }
      });
      // Fix any underflow/overflow from rounding
      let total = budgetTotal();
      if (total !== 100) {
        const last = others[others.length - 1];
        state.budget[last] = clamp(state.budget[last] + (100 - total), BUDGET_MIN, 100 - minOthers);
        // If still off, nudge key
        total = budgetTotal();
        if (total !== 100) state.budget[key] = clamp(state.budget[key] + (100 - total), BUDGET_MIN, 100 - minOthers);
      }
      updateBudgetUI();
    }

    function updateBudgetUI() {
      BUDGET_KEYS.forEach(k => {
        const valEl = document.getElementById(`budget-val-${k}`);
        const slider = document.getElementById(`budget-slider-${k}`);
        const fill = document.getElementById(`budget-fill-${k}`);
        if (valEl) valEl.textContent = state.budget[k];
        if (slider && document.activeElement !== slider) slider.value = state.budget[k];
        // Always sync non-active sliders; active one is being dragged
        if (slider && document.activeElement === slider) {
          // update others only
        } else if (slider) {
          slider.value = state.budget[k];
        }
        if (fill) fill.style.width = state.budget[k] + '%';
      });
      // Force-sync sibling sliders when one is dragged
      const active = document.activeElement;
      BUDGET_KEYS.forEach(k => {
        const slider = document.getElementById(`budget-slider-${k}`);
        if (slider && slider !== active) slider.value = state.budget[k];
      });
      const totalEl = document.getElementById('budget-total');
      if (totalEl) {
        const t = budgetTotal();
        totalEl.textContent = t + ' / 100';
        totalEl.className = 'font-display text-sm ' + (t === 100 ? 'text-emerald-400': 'text-red-500');
      }
    }

    function teamStrength() {
      const era = state.era;
      const b = state.budget;
      const principal = state.principal;

      // Average phase mods as baseline package lean
      const draw = getSeasonDraw();
      const phaseIds = draw ? [draw.opening, draw.mid, draw.close] : ['balanced', 'balanced', 'balanced'];
      const phases = phaseIds.map(id => PHASE_TYPES.find(t => t.id === id));
      const avgPower = phases.reduce((s, p) => s + p.powerMod, 0) / 3;
      const avgAero = phases.reduce((s, p) => s + p.aeroMod, 0) / 3;

      const pb = principal.bonus || {};
      // Sponsors reshape departments (not free global pace)
      const sponPower = state.sponsor === 'tech' ? 3: 0;
      const sponAero = state.sponsor === 'tech' ? 3: 0;
      const sponReli = state.sponsor === 'title' ? 6: 0;

      const power = clamp((b.power + (pb.power || 0)) * era.powerBias * 2.1 + avgPower + sponPower, 0, 100);
      const aero = clamp((b.aero + (pb.aero || 0)) * era.aeroBias * 2.1 + avgAero + sponAero, 0, 100);
      const reliability = clamp((b.reliability + (pb.reliability || 0)) * era.reliabilityBias * 2.1 + sponReli, 0, 100);
      const strategy = clamp((b.strategy + (pb.strategy || 0)) * era.strategyBias * 2.1, 0, 100);
      const driver = state.primary.rating * 0.70 + state.teammate.rating * 0.15 + state.primary.consistency * 0.15;
      const packageScore = power * 0.22 + aero * 0.24 + reliability * 0.14 + strategy * 0.12 + driver * 0.28;

      // Ops effects apply per-race (see simulateRace): not flat free pace here
      return {
        power, aero, reliability, strategy, driver,
        pace: packageScore,
        consist: reliability,
        tirePhil: state.tirePhil,
        devCutoff: state.devCutoff,
        lobbying: state.lobbying,
        sponsor: state.sponsor,
      };
    }

    function raceCallFingerprint(race) {
      return [race.tirePlan || 'standard', race.strategy, race.engineMode, race.pitWindow].join('|');
    }

    function simulateRace(race, strength, opts = {}) {
      const notes = [];
      const mods = phaseMods(race.n);
      const isRedo = !!opts.isRedo;
      const sameCallRedo = !!opts.sameCallRedo;
      const redoNumber = opts.redoNumber || 1; // 1st / 2nd / 3rd charge this season
      const lossMargin = opts.lossMargin; // original attempt margin (-99 = DNF)
      const phase = phaseForRace(race.n);
      const powerTracks = [1, 2, 16, 17, 22];
      const aeroTracks = [8, 9, 13, 15, 19];
      // Long-haul / flyaway-style weekends (regional sponsor payoff)
      const flyaways = [1, 2, 3, 4, 5, 6, 17, 18, 19, 20, 21, 22, 23, 24];

      const rainRoll = rand() * 100;
      let actualRain = 0;
      if (rainRoll < race.predRain) actualRain = clamp(race.predRain + randInt(-10, 25), 10, 100);
      else if (rainRoll < race.predRain + 8) actualRain = randInt(5, 20);
      race.actualRain = actualRain;
      const isWet = actualRain >= 25;
      const isDamp = actualRain >= 10 && actualRain < 25;

      let scChance = race.sc + (isWet ? 18: 0) + (race.tire === 'High' ? 3: 0);
      const safetyCar = rand() * 100 < scChance;

      // ── Tires: light season car bias + main weekend compound plan ──
      let opsMod = 0;
      if (!race.tirePlan) race.tirePlan = 'standard';

      // Season car/org bias (small)
      if (state.tirePhil === 'aggressive') {
        if (race.tire === 'Low') opsMod += 1.2;
        else if (race.tire === 'High') opsMod -= 1.4;
        if (isWet || isDamp) opsMod -= 0.9;
      } else if (state.tirePhil === 'conservative') {
        if (race.tire === 'High') opsMod += 1.1;
        else if (race.tire === 'Low') opsMod -= 0.9;
        if (isWet || isDamp) opsMod += 0.8;
      }

      // Weekend compound plan (main lever)
      if (race.tirePlan === 'push') {
        if (race.tire === 'Low') { opsMod += 3.4; notes.push('Push compound plan: pace on low-wear circuit.'); }
        else if (race.tire === 'High') { opsMod -= 4.0; notes.push('Push compound plan cliffed on high wear.'); }
        else { opsMod += 1.2; notes.push('Push compound plan.'); }
        if (isWet || isDamp) { opsMod -= 2.6; notes.push('Push plan unstable in wet/damp.'); }
      } else if (race.tirePlan === 'manage') {
        if (race.tire === 'High') { opsMod += 3.2; notes.push('Manage compound plan: held on high wear.'); }
        else if (race.tire === 'Low') { opsMod -= 2.4; notes.push('Manage plan left pace on low wear.'); }
        else { opsMod += 0.6; notes.push('Manage compound plan.'); }
        if (isWet || isDamp) { opsMod += 2.0; notes.push('Manage plan stable in wet/damp.'); }
      } else {
        notes.push('Standard compound plan (weekend default).');
      }

      // ── Operations: development cut-off (phase-conditioned) ──
      if (state.devCutoff === 'early') {
        if (phase === 'opening') { opsMod += 3.4; notes.push('Early freeze: concept locked, Opening pace clean.'); }
        else if (phase === 'close') { opsMod -= 3.6; notes.push('Early freeze: Close field developed past the package.'); }
        else { opsMod += 0.4; }
      } else if (state.devCutoff === 'late') {
        if (phase === 'opening') { opsMod -= 3.4; notes.push('Late push: Opening car still immature.'); }
        else if (phase === 'close') { opsMod += 3.8; notes.push('Late push: Close upgrades landed.'); }
        else { opsMod += 0.6; }
      }

      // ── Operations: lobbying (edge vs exclusion risk) ──
      const regScale = REG_CLIMATES.find(x => x.id === (getSeasonDraw()?.reg || 'normal')).lobbyRiskScale;
      if (state.lobbying === 'active') {
        opsMod += 1.6;
        if (rand() < 0.03 * regScale) {
          opsMod -= 11;
          notes.push('Regulatory protest: setup compromised for this event.');
        }
      } else if (state.lobbying === 'aggressive') {
        opsMod += 3.4;
        if (rand() < 0.07 * regScale) {
          race.result = 'loss';
          race.margin = -99;
          race.notes = [...notes, 'Technical infringement: car excluded.'];
          return race;
        }
      }

      // ── Operations: sponsors (different win conditions) ──
      if (state.sponsor === 'tech') {
        opsMod += 1.2;
        if (powerTracks.includes(race.n) || aeroTracks.includes(race.n)) {
          opsMod += 1.8;
          notes.push('Tech partners: correlation edge at this venue.');
        }
      } else if (state.sponsor === 'title') {
        opsMod -= 0.9; // slight peak pace tax
      } else if (state.sponsor === 'regional') {
        if (isWet || isDamp) { opsMod += 2.8; notes.push('Regional program: wet-ops activation.'); }
        const flyBoost = TRAVEL_CLIMATES.find(x => x.id === (getSeasonDraw()?.travel || 'compact')).flyawayBoost;
        if (flyaways.includes(race.n)) opsMod += 1.1 + flyBoost;
      }

      let stratFit = 0;
      if (race.strategy === '1-stop') {
        if (race.tire === 'Low') stratFit += 3.5;
        if (race.tire === 'High') stratFit -= 4.5;
        if (safetyCar) stratFit -= 2;
        notes.push(race.tire === 'High' ? '1-stop under pressure on high-wear circuit.': '1-stop committed.');
      } else {
        if (race.tire === 'High') stratFit += 2.5;
        if (race.tire === 'Low') stratFit -= 1.5;
        if (safetyCar) stratFit += 2.5;
        notes.push('2-stop selected for flexible windows.');
      }

      let engMod = 0;
      if (race.engineMode === 'attack') {
        engMod += 2.5;
        if (rand() < clamp(0.10 - strength.reliability / 900, 0.03, 0.12)) {
          engMod -= 18;
          notes.push('PU stress event: mode too aggressive.');
        } else notes.push('Attack mode deployed.');
      } else if (race.engineMode === 'conserve') {
        engMod -= 1.5;
        notes.push('Conserve mode: reliability prioritized.');
      }

      let pitMod = 0;
      if (race.pitWindow === 'undercut') {
        pitMod += safetyCar ? -1.5: 2;
        notes.push('Undercut attempt.');
      } else if (race.pitWindow === 'overcut') {
        pitMod += safetyCar ? 2.5: 0.5;
        notes.push(safetyCar ? 'Overcut paid off around SC.': 'Overcut executed.');
      }

      let wetMod = 0;
      if (isWet) {
        wetMod = (state.primary.wet - 88) * 0.22;
        notes.push(`Wet race: primary wet rating ${state.primary.wet}.`);
      } else if (isDamp) {
        wetMod = (state.primary.wet - 88) * 0.1;
        notes.push('Damp conditions. Grip windows unstable.');
      }

      let trackMod = mods.powerMod * 0.15 + mods.aeroMod * 0.15;
      if (powerTracks.includes(race.n)) trackMod += (strength.power - 55) * 0.06;
      if (aeroTracks.includes(race.n)) trackMod += (strength.aero - 55) * 0.06;

      let forecastMod = 0;
      if (Math.abs(actualRain - race.predRain) > 30) {
        forecastMod = -2;
        notes.push('Forecast miss complicated tyre calls.');
      }

      // Package pace is typically ~58–75 (even split) to ~72–88 (strong build).
      // Field must sit in that band or every race is a structural loss.
      const execScale = strength.pace < 62 ? 1.25 : strength.pace < 70 ? 1.1 : 1.0;
      let score = strength.pace + opsMod + (stratFit + engMod + pitMod) * execScale + wetMod + trackMod + forecastMod;
      const noiseScale = clamp(1.05 - strength.consist / 180, 0.45, 1.05);
      const glass = strength.reliability < 50 ? 1.1 : 1.0;
      score += (rand() - 0.5) * 11 * noiseScale * glass;

      // DNF: present but not season-wiping by default
      let dnfRisk = 0.028 - strength.reliability / 2800;
      if (race.engineMode === 'attack') dnfRisk += 0.02;
      if (state.tirePhil === 'aggressive') dnfRisk += 0.003;
      if (state.tirePhil === 'conservative') dnfRisk -= 0.002;
      if (race.tirePlan === 'push') dnfRisk += 0.008;
      if (race.tirePlan === 'manage') dnfRisk -= 0.005;
      if (state.sponsor === 'title') dnfRisk -= 0.012;
      // Redoing a DNF does not wipe mechanical risk; slight hangover
      if (isRedo && lossMargin === -99) dnfRisk += 0.018;
      dnfRisk = clamp(dnfRisk, 0.006, 0.09);

      if (rand() < dnfRisk) {
        race.result = 'loss';
        race.margin = -99;
        race.notes = [...notes, isRedo ? 'Retirement on redo: mechanical or incident.' : 'Retirement: mechanical or incident.'];
        return race;
      }

      // Relative field: package-scaled, slightly above baseline.
      // Redos always pay a tax — not free re-rolls of close losses.
      const pressure = state.wins >= 18 ? 2.0 : state.wins >= 14 ? 1.1 : state.wins >= 10 ? 0.5 : 0;
      let redoTax = 0;
      if (isRedo) {
        // Escalating season cost: later charges are harder (fixes 1–2 maybe, not 4)
        redoTax = 3.4 + (redoNumber - 1) * 1.9; // ~3.4 / 5.3 / 7.2
        if (sameCallRedo) {
          redoTax += 4.5;
          notes.push('Same weekend call as the loss: field already had your number.');
        } else {
          notes.push('Redo tax: prior result still shapes the field.');
        }
        if (lossMargin != null && lossMargin !== -99) {
          if (lossMargin <= -7) {
            redoTax += 4.2;
            notes.push('Structural deficit from the first attempt still shows.');
          } else if (lossMargin <= -4) {
            redoTax += 2.4;
            notes.push('Clear first-attempt deficit carries into the redo.');
          } else if (lossMargin <= -2.5) {
            redoTax += 1.1;
          }
        }
        if (lossMargin === -99) {
          redoTax += 1.6;
          notes.push('DNF redo: recovery is possible, not free.');
        }
        if (redoNumber >= 2) notes.push(`Season redo #${redoNumber}: field hardens with each charge.`);
      }
      // Slightly less lottery on redos (compress free coin-flip variance)
      const fieldNoise = isRedo ? (rand() - 0.5) * 9 : (rand() - 0.5) * 12;
      const field = strength.pace + 1.4 + fieldNoise + pressure + redoTax;
      const won = score >= field;
      race.result = won ? 'win' : 'loss';
      race.margin = Math.round((score - field) * 10) / 10;

      if (safetyCar) notes.push('Safety car deployed.');
      if (won && race.margin < 1.5) notes.push('Narrow victory. Margins thin.');
      if (!won && race.margin > -2.5) notes.push('Lost in the details: pace was close.');
      if (!won && race.margin <= -7) notes.push('Pace deficit was structural today.');
      if (pressure > 0 && !won) notes.push('Late-season pressure visible in execution.');
      if (isRedo && sameCallRedo && !won) notes.push('Unchanged call failed the redo.');
      if (isRedo && sameCallRedo && won) notes.push('Same call converted despite the tax.');
      if (isRedo && !sameCallRedo && won) notes.push('Changed call cleared the redo tax.');
      if (isRedo && !sameCallRedo && !won) notes.push('Changed call still lost under redo pressure.');
      race.notes = notes;
      return race;
    }

    function buildDebrief() {
      const s = teamStrength();
      const observations = [];
      const tier = tierInfo(state.era);
      if (state.wins === 24) {
        if (state.era.tier === 'underdog') {
          observations.push('Underdog 24–0. Perfect Fit, Perfect Execution, Survival. Same rules. Screenshot then delete app territory.');
        } else {
          observations.push(`Perfect season achieved (${tier.label}). Operational and sporting execution aligned across all 24 events.`);
        }
      } else if (state.wins >= 20) observations.push('Championship-dominant campaign. The losses were isolated, not structural.');
      else if (state.wins >= 14) observations.push('Race-winning package, but consistency gaps prevented a clean sweep.');
      else if (state.wins >= 8) observations.push('Competitive in windows. Package lacked multi-condition coverage for 24-0.');
      else observations.push('Performance baseline sat below the field average on too many weekends.');

      if (state.era.tier === 'underdog' && state.wins < 24) {
        const { spike, hole } = eraSpikeHole(state.era);
        observations.push(`Underdog path check: spike ${spike.label}, hole ${hole.label}. Folklore 24–0 needs fit on both, then zero free risk.`);
      }

      if (s.power < 50) observations.push('Power unit allocation looked light on power-sensitive venues.');
      if (s.aero < 50) observations.push('Aero/chassis budget limited performance at high-downforce circuits.');
      if (s.reliability < 50) observations.push('Reliability spend left residual DNF and mode risk.');
      if (s.strategy < 50) observations.push('Strategy department under-resourced relative to SC-heavy races.');

      const highWearLosses = state.races.filter(r => r.tire === 'High' && r.result === 'loss').length;
      const lowWearLosses = state.races.filter(r => r.tire === 'Low' && r.result === 'loss').length;
      if (state.tirePhil === 'aggressive' && highWearLosses >= 3) {
        observations.push('Aggressive tyre philosophy struggled on high-wear circuits: conservative or balanced may have held more.');
      }
      if (state.tirePhil === 'conservative' && lowWearLosses >= 3) {
        observations.push('Conservative tyres left pace on low-wear weekends where aggression usually pays.');
      }
      if (state.devCutoff === 'late') {
        const openLoss = state.races.filter(r => r.n <= 8 && r.result === 'loss').length;
        const closeWin = state.races.filter(r => r.n >= 17 && r.result === 'win').length;
        if (openLoss >= 3) observations.push('Late development push cost Opening weekends; Early Freeze or Mid may fit mixed schedules better.');
        if (closeWin >= 6) observations.push('Late push showed in the Close: upgrades landed when it mattered.');
      }
      if (state.devCutoff === 'early') {
        const closeLoss = state.races.filter(r => r.n >= 17 && r.result === 'loss').length;
        if (closeLoss >= 3) observations.push('Early freeze left the package soft in the Close as the field developed past you.');
      }
      const exclusions = state.races.filter(r => r.notes?.some(n => n.includes('excluded') || n.includes('protest'))).length;
      if (state.lobbying === 'aggressive' && exclusions > 0) {
        observations.push('Aggressive lobbying bought pace but paid scrutiny costs: Passive is the 24–0 insurance play.');
      }
      if (state.sponsor === 'title') {
        const dnfs = state.races.filter(r => r.margin === -99).length;
        if (dnfs === 0) observations.push('Title sponsorship reliability cover held: no mechanical wipeouts on record.');
      }
      if (state.primary.wet < 85 && state.races.filter(r => r.actualRain >= 25 && r.result === 'loss').length >= 2) {
        observations.push('Wet-weather weekends exposed a gap in primary driver wet performance.');
      }
      const closeLosses = state.races.filter(r => r.result === 'loss' && r.margin > -4 && r.margin !== -99).length;
      if (closeLosses >= 3) observations.push(`${closeLosses} defeats were decided inside a narrow performance band: redo targets.`);
      const dnfs = state.races.filter(r => r.margin === -99).length;
      if (dnfs > 0) observations.push(`${dnfs} retirement(s) on record. Mechanical risk remains a perfect-season killer.`);
      if (state.redosLeft === 0 && state.wins < 24) observations.push('All redos exhausted. Final classification is locked.');
      observations.push(`Schedule profile: ${scheduleSummary()}.`);
      observations.push(`Team reference: ${state.era.team} ${state.era.era} · ${state.primary.name} / ${state.teammate.name} · ${state.principal.name}.`);
      state.debrief = observations;
    }

    // ─────────────────────────────────────────────
    // ADS ENGINE (demo now · network later)
    // ─────────────────────────────────────────────
    let _adTimer = null;
    let _adProgressTimer = null;
    let _adBusy = false;

    function freeEraSpinsLeft() {
      return Math.max(0, ADS.freeEraSpins - state.eraSpinsUsed);
    }

    function ensureAdsenseScript() {
      if (!ADS.adsenseClient || document.getElementById('adsense-script')) return;
      const s = document.createElement('script');
      s.id = 'adsense-script';
      s.async = true;
      s.src = `https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=${encodeURIComponent(ADS.adsenseClient)}`;
      s.crossOrigin = 'anonymous';
      document.head.appendChild(s);
    }

    function updateAdBanner() {
      const slot = document.getElementById('ad-banner-slot');
      if (!slot) return;
      const show = ADS.enabled && (
        (state.phase === 'setup' && ADS.bannerOnSetup) ||
        (state.phase === 'season' && ADS.bannerOnSeason) ||
        (state.phase === 'result' && ADS.bannerOnResult)
      );
      slot.classList.toggle('is-on', !!show);
      const inner = document.getElementById('ad-banner-inner');
      const label = document.getElementById('ad-banner-label');

      // Live AdSense display unit when demo is off and slots are configured
      if (show && !ADS.demo && ADS.adsenseClient && ADS.adsenseSlots.banner && inner && !inner.dataset.adsenseMounted) {
        ensureAdsenseScript();
        inner.innerHTML = '';
        inner.className = 'w-full max-w-md flex justify-center';
        const ins = document.createElement('ins');
        ins.className = 'adsbygoogle';
        ins.style.display = 'inline-block';
        ins.style.width = '320px';
        ins.style.height = '50px';
        ins.setAttribute('data-ad-client', ADS.adsenseClient);
        ins.setAttribute('data-ad-slot', ADS.adsenseSlots.banner);
        inner.appendChild(ins);
        inner.dataset.adsenseMounted = '1';
        try { (window.adsbygoogle = window.adsbygoogle || []).push({}); } catch (_) { /* ignore */ }
      } else if (label && (ADS.demo || !ADS.adsenseSlots.banner)) {
        label.textContent = ADS.demo
          ? `Banner · ${state.phase} · demo`
          : 'Sponsored';
      }

      const h = show ? Math.ceil(slot.getBoundingClientRect().height) : 0;
      document.documentElement.style.setProperty('--ad-banner-h', `${h}px`);
      const app = document.getElementById('app');
      const foot = document.getElementById('site-footer');
      if (app) app.style.paddingBottom = show ? `${h + 72}px` : '';
      if (foot) foot.style.marginBottom = show ? `${h + 8}px` : '';
    }

    function closeAdModal() {
      if (_adTimer) { clearTimeout(_adTimer); _adTimer = null; }
      if (_adProgressTimer) { clearInterval(_adProgressTimer); _adProgressTimer = null; }
      _adBusy = false;
      document.getElementById('ad-modal')?.classList.add('hidden');
      if (document.getElementById('help-modal')?.classList.contains('hidden') &&
          document.getElementById('share-modal')?.classList.contains('hidden')) {
        document.body.style.overflow = '';
      }
    }

    /**
     * Demo interstitial / rewarded player.
     * Replace body with real SDK load (AdMob, AdSense, etc.) when ADS.demo = false.
     * @param {'interstitial'|'rewarded'} kind
     * @param {{ placement: string, title?: string, rewardText?: string }} opts
     * @returns {Promise<'completed'|'skipped'|'failed'>}
     */
    function playAd(kind, opts = {}) {
      if (!ADS.enabled) return Promise.resolve('completed');
      // Recover from a stuck previous ad so re-spin never hard-locks
      if (_adBusy) {
        closeAdModal();
      }

      const duration = kind === 'rewarded' ? ADS.rewardedMs : ADS.interstitialMs;
      const modal = document.getElementById('ad-modal');
      const kindEl = document.getElementById('ad-modal-kind');
      const titleEl = document.getElementById('ad-modal-title');
      const copyEl = document.getElementById('ad-modal-copy');
      const rewardEl = document.getElementById('ad-modal-reward');
      const progress = document.getElementById('ad-progress');
      const btnSkip = document.getElementById('ad-btn-skip');
      const btnGo = document.getElementById('ad-btn-continue');
      if (!modal || !btnGo || !btnSkip) return Promise.resolve('failed');

      _adBusy = true;

      return new Promise((resolve) => {
        let settled = false;
        const finish = (result) => {
          if (settled) return;
          settled = true;
          closeAdModal();
          // Next tick so click handlers / busy flag fully clear before callers run spin
          setTimeout(() => resolve(result), 0);
        };

        try {
          kindEl.textContent = kind === 'rewarded' ? 'Rewarded ad' : 'Interstitial';
          titleEl.textContent = opts.title || (kind === 'rewarded' ? 'Watch for reward' : 'Short break');
          copyEl.textContent = ADS.demo
            ? (kind === 'rewarded'
              ? 'Demo rewarded unit. Finish to unlock re-spin — no effect on race win rate.'
              : 'Demo interstitial. Soft break after the season — never mid-race.')
            : 'Loading advertisement…';
          if (opts.rewardText) {
            rewardEl.textContent = opts.rewardText;
            rewardEl.classList.remove('hidden');
          } else {
            rewardEl.classList.add('hidden');
          }

          progress.style.width = '0%';
          btnSkip.disabled = true;
          btnGo.disabled = true;
          btnSkip.textContent = kind === 'rewarded' ? 'No thanks' : 'Skip';
          btnGo.textContent = 'Continue';

          btnSkip.onclick = (e) => {
            e.preventDefault();
            e.stopPropagation();
            finish('skipped');
          };
          btnGo.onclick = (e) => {
            e.preventDefault();
            e.stopPropagation();
            finish('completed');
          };
          document.getElementById('ad-modal-backdrop').onclick = (e) => {
            e.preventDefault();
            /* block dismiss by backdrop during play */
          };

          modal.classList.remove('hidden');
          document.body.style.overflow = 'hidden';

          if (!ADS.demo) {
            copyEl.textContent = `Placement: ${opts.placement || 'default'} · wire SDK here`;
          }

          const t0 = Date.now();
          _adProgressTimer = setInterval(() => {
            const p = Math.min(100, ((Date.now() - t0) / duration) * 100);
            progress.style.width = `${p}%`;
          }, 50);

          _adTimer = setTimeout(() => {
            if (_adProgressTimer) { clearInterval(_adProgressTimer); _adProgressTimer = null; }
            progress.style.width = '100%';
            btnGo.disabled = false;
            btnSkip.disabled = false;
            if (kind === 'rewarded') {
              copyEl.textContent = ADS.demo ? 'Reward unlocked — spinning era…' : 'Ad complete.';
              btnGo.textContent = 'Spin era';
              // Auto-claim so re-spin always fires after a completed watch
              _adTimer = setTimeout(() => finish('completed'), 450);
            } else {
              copyEl.textContent = ADS.demo ? 'Ad complete.' : 'Ad complete.';
              btnGo.textContent = 'Continue';
              _adTimer = setTimeout(() => finish('completed'), 600);
            }
          }, duration);
        } catch (err) {
          console.error('playAd error', err);
          finish('failed');
        }
      });
    }

    async function showSeasonCompleteInterstitial() {
      if (!ADS.enabled || !ADS.interstitialOnSeasonComplete) return;
      if (state.ads.seasonInterstitialShown) return;
      state.ads.seasonInterstitialShown = true;
      try {
        await playAd('interstitial', {
          placement: 'season_complete',
          title: 'Season complete',
        });
      } catch (_) {
        closeAdModal();
      }
    }

    async function requestEraSpin() {
      if (state.spinning) return;
      try {
        // Free quota still available
        if (freeEraSpinsLeft() > 0) {
          runEraSpin();
          return;
        }
        // Ads off or rewarded disabled: still allow re-spin
        if (!ADS.enabled || !ADS.rewardedEraRespin) {
          runEraSpin();
          return;
        }
        const result = await playAd('rewarded', {
          placement: 'era_respin',
          title: 'Re-spin constructor era',
          rewardText: 'Reward: one era re-spin · does not change win odds',
        });
        if (result === 'completed') {

      try {
        const result = await playAd('rewarded', {
          placement: 'share_clean',
          title: 'Clean share caption',
          rewardText: 'Reward: share without sponsor line this session',
        });
        if (result === 'completed') {

    function runEraSpin() {
      if (state.spinning) return;
      state.spinning = true;
      state.eraSpinsUsed++;
      // Disable spin button immediately if present
      const spinBtn = document.getElementById('spin-btn');
      if (spinBtn) spinBtn.disabled = true;

      let ticks = 0;
      const maxTicks = 18 + randInt(0, 8);
      const iv = setInterval(() => {
        state.spinIndex = (state.spinIndex + 1) % ERAS.length;
        state.era = ERAS[state.spinIndex];
        const card = document.getElementById('era-card');
        if (card) {
          card.classList.add('spin-active');
          card.innerHTML = eraCardInner(state.era);
        }
        ticks++;
        if (ticks >= maxTicks) {
          clearInterval(iv);
          state.era = pick(ERAS);
          state.primary = null;
          state.teammate = null;
          state.principal = null;
          state.lineupOpen = 'primary';
          state.spinning = false;
          render();
        }
      }, 70);
    }

    function weatherKindForRace(race) {
      const rain = race.actualRain != null ? race.actualRain : race.predRain;
      if (rain >= 35 || (race.actualRain != null && race.actualRain >= 25)) return 'rain';
      if (rain >= 15) return 'cloud';
      return 'sun';
    }

    function onDriverChange(role, name) {
      if (!state.era || !name) {
        if (role === 'primary') state.primary = null;
        else state.teammate = null;
        return;
      }
      const d = state.era.drivers.find(x => x.name === name);
      if (!d) return;
      if (role === 'primary') {
        state.primary = d;
        if (state.teammate?.name === d.name) state.teammate = null;
      } else {
        state.teammate = d;
        if (state.primary?.name === d.name) state.primary = null;
      }
    }

      if (!state.era || !name) {

      const btn = document.getElementById('start-btn');

      const ok = !!(state.era && state.primary && state.teammate && state.principal && budgetTotal() === 100 && state.seasonDraw?.locked);
      btn.disabled = !ok;

        ? 'w-full py-4 bg-f1-red text-white font-display text-sm tracking-widest uppercase hover:bg-red-700 transition': 'w-full py-4 bg-zinc-800 text-zinc-600 font-display text-sm tracking-widest uppercase cursor-not-allowed';
    }

    function startSeason() {
      if (!state.era || !state.primary || !state.teammate || !state.principal) return;
      if (budgetTotal() !== 100) return;
      if (!state.seasonDraw?.locked) return;
      prepareRaces();
      state.phase = 'season';
      state.wins = 0;
      state.losses = 0;
      state.redosLeft = SEASON_REDOS;
      state.seasonComplete = false;
      state.debrief = [];
      state.redoFeedback = null;
      state.lbSubmitted = false;
      state.ads.seasonInterstitialShown = false;
      render();
      window.scrollTo(0, 0);
    }

    async function simulateSeason() {
      if (state.simulating) return;
      state.simulating = true;
      state.wins = 0;
      state.losses = 0;
      const strength = teamStrength();
      for (let i = 0; i < state.races.length; i++) {
        const race = state.races[i];
        if (race.locked && race.result) {
          if (race.result === 'win') state.wins++;
          else state.losses++;
          continue;
        }
        simulateRace(race, strength);
        if (race.result === 'win') state.wins++;
        else state.losses++;
        render();
        const el = document.getElementById(`race-${race.n}`);
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        await new Promise(r => setTimeout(r, 120));
      }
      state.simulating = false;
      state.seasonComplete = true;
      buildDebrief();
      await showSeasonCompleteInterstitial();
      state.phase = 'result';
      render();
      window.scrollTo(0, 0);
    }

    function redoRace(n) {
      if (state.redosLeft <= 0) return;
      const race = state.races.find(r => r.n === n);
      if (!race || race.result !== 'loss') return;
      // One attempt per race — a failed redo locks that weekend
      if (race.redoAttempted) return;
      // One charge from the season pool when you open a redo re-plan
      state.redosLeft--;
      race.lossCall = raceCallFingerprint(race);
      race.lossMargin = race.margin; // for structural redo tax
      race.redoNumber = SEASON_REDOS - state.redosLeft; // 1..SEASON_REDOS
      race.locked = false;
      race.result = null;
      race.notes = [];
      race.margin = null;
      race.actualRain = null;
      race.redoOpen = true;
      state.redoFeedback = null;
      state.wins = state.races.filter(r => r.result === 'win').length;
      state.losses = state.races.filter(r => r.result === 'loss').length;
      state.seasonComplete = false;
      state.phase = 'season';
      render();
      setTimeout(() => document.getElementById(`race-${n}`)?.scrollIntoView({ behavior: 'smooth', block: 'center' }), 50);
    }

    function applyRedoSim(n) {
      const race = state.races.find(r => r.n === n);
      if (!race || race.result) return;
      const sameCall = race.lossCall && race.lossCall === raceCallFingerprint(race);
      simulateRace(race, teamStrength(), {
        isRedo: true,
        sameCallRedo: sameCall,
        redoNumber: race.redoNumber || (SEASON_REDOS - state.redosLeft),
        lossMargin: race.lossMargin,
      });
      race.locked = true;
      race.redoOpen = false;
      race.redoAttempted = true;
      state.wins = state.races.filter(r => r.result === 'win').length;
      state.losses = state.races.filter(r => r.result === 'loss').length;

      const outcome = race.margin === -99 ? 'dnf' : race.result;
      state.redoFeedback = {
        n: race.n,
        name: race.name,
        outcome, // win | loss | dnf
        margin: race.margin,
        sameCall,
        notes: (race.notes || []).slice(0, 5),
        remaining: state.redosLeft,
        record: `${state.wins}–${state.losses}`,
      };

      if (state.races.every(r => r.result)) {
        state.seasonComplete = true;
        buildDebrief();
        // Stay on season so redo feedback is visible; user opens debrief manually
      }
      render();
      setTimeout(() => {
        document.getElementById('redo-feedback')?.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 40);
    }

    function helpBtn(key) {
      return `<button type="button" class="help-btn" onclick="event.stopPropagation();openHelp('${key}')" aria-label="Help: ${HELP[key]?.title || key}">?</button>`;
    }

    function openHelp(key) {
      const modal = document.getElementById('help-modal');
      let title = '';
      let body = '';

      if (key === 'signals') {
        const brief = setupDecisionBrief();
        title = 'Calendar signals';
        if (!brief.recs.length) {
          body = '<p class="text-zinc-300">Spin an era and set schedule stress to surface calendar signals.</p>';
        } else {
          body = `
            ${brief.recs.map(r => `
              <div class="mb-3 pb-3 border-b border-zinc-800 last:border-0">
                <div class="text-[10px] uppercase tracking-wider text-f1-red font-display mb-1">${r.area}</div>
                <p class="text-sm text-zinc-300 leading-relaxed">${r.note || r.why || ''}</p>
              </div>
            `).join('')}
          `;
        }
      } else {
        const item = HELP[key];
        if (!item) return;
        title = item.title;
        body = item.body;
      }

      document.getElementById('help-title').textContent = title;
      document.getElementById('help-body').innerHTML = body;
      modal.classList.remove('hidden');
      document.body.style.overflow = 'hidden';
    }

    function closeHelp() {
      document.getElementById('help-modal').classList.add('hidden');
      document.body.style.overflow = '';
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        // Don't force-close mid-ad; user must Skip/Continue
        if (!_adBusy) {
          closeLeaderboard();
          closeShare();
          closeHelp();
        }
      }
    });

      const rows = era
        ? eraAxes(era).map(a => ({
            name: a.label,
            meaning: meanings[a.key],
            val: a.val,
            mark: sh && a.key === sh.spike.key ? 'SPIKE': sh && a.key === sh.hole.key ? 'HOLE': '',
          })): [
            { name: 'Power Unit', meaning: meanings.power, val: null, mark: '' },
            { name: 'Aerodynamics', meaning: meanings.aero, val: null, mark: '' },
            { name: 'Reliability', meaning: meanings.reliability, val: null, mark: '' },
            { name: 'Strategy', meaning: meanings.strategy, val: null, mark: '' },

    function wrapCanvasText(ctx, text, maxWidth) {
      const words = String(text || '').split(/\s+/).filter(Boolean);
      const lines = [];
      let line = '';
      for (const w of words) {
        const test = line ? `${line} ${w}` : w;
        if (ctx.measureText(test).width > maxWidth && line) {
          lines.push(line);
          line = w;
        } else line = test;
      }
      if (line) lines.push(line);
      return lines;
    }

    function brandRgb(hex) {
      const h = String(hex || '#E10600').replace('#', '');
      const full = h.length === 3 ? h.split('').map(c => c + c).join('') : h.padEnd(6, '0').slice(0, 6);
      const n = parseInt(full, 16);
      if (Number.isNaN(n)) return { r: 225, g: 6, b: 0 };
      return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
    }

    function brandRgba(hex, a) {
      const { r, g, b } = brandRgb(hex);
      return `rgba(${r},${g},${b},${a})`;
    }

    function brandIsLight(hex) {
      const { r, g, b } = brandRgb(hex);
      return (r * 0.299 + g * 0.587 + b * 0.114) > 175;
    }

    function paintShareCard(canvas) {
      const W = 1080;
      const H = 1080;
      canvas.width = W;
      canvas.height = H;
      const ctx = canvas.getContext('2d');
      const era = state.era;
      const tier = tierInfo(era);
      const badge = resultBadgeMeta();
      const perfect = state.wins === 24;
      const brand = era.color || '#E10600';
      const brandOnDark = brandIsLight(brand) ? '#E4E4E7' : brand; // readable on black
      const redosUsed = SEASON_REDOS - state.redosLeft;
      const zeroRedos = redosUsed === 0;
      const gold = '#D4AF37';
      const f1Red = '#E10600';
      const display = '"Space Grotesk", "Segoe UI", system-ui, sans-serif';
      const body = '"Inter", "Segoe UI", system-ui, sans-serif';
      const pad = 44;
      const right = W - pad;

      // Background
      ctx.fillStyle = '#09090b';
      ctx.fillRect(0, 0, W, H);

      // Era brand wash only (never gold for zero redos)
      const glow = ctx.createRadialGradient(W * 0.55, 200, 40, W * 0.5, 380, 780);
      glow.addColorStop(0, brandRgba(brand, 0.38));
      glow.addColorStop(0.35, brandRgba(brand, 0.16));
      glow.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = glow;
      ctx.fillRect(0, 0, W, H);
      const glow2 = ctx.createRadialGradient(80, 100, 10, 200, 240, 420);
      glow2.addColorStop(0, brandRgba(brand, 0.2));
      glow2.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = glow2;
      ctx.fillRect(0, 0, W, H);

      // Top + left brand rails
      ctx.fillStyle = brand;
      ctx.fillRect(0, 0, W, 8);
      ctx.fillRect(0, 0, 8, H);

      // ── Race map: green wins · red losses ──
      const mapLabel = 'YOUR RACE MAP';
      ctx.font = `600 22px ${display}`;
      ctx.fillStyle = '#FAFAFA';
      ctx.textAlign = 'right';
      ctx.fillText(mapLabel, right, 52);

      const mapPadL = 300;
      const mapAvail = right - mapPadL;
      const mapN = 24;
      const mapGap = 3;
      const cell = Math.floor((mapAvail - mapGap * (mapN - 1)) / mapN);
      const mapW = cell * mapN + mapGap * (mapN - 1);
      const mapX = right - mapW;
      const mapY = 62;
      state.races.forEach((r, i) => {
        const x = mapX + i * (cell + mapGap);
        const win = r.result === 'win';
        ctx.fillStyle = win ? 'rgba(16,185,129,0.42)' : 'rgba(225,6,0,0.42)';
        ctx.fillRect(x, mapY, cell, cell);
        ctx.strokeStyle = win ? '#34D399' : '#E10600';
        ctx.lineWidth = 1.5;
        ctx.strokeRect(x + 0.5, mapY + 0.5, cell - 1, cell - 1);
        ctx.fillStyle = win ? '#6EE7B7' : '#FCA5A5';
        ctx.font = `600 ${Math.max(13, Math.floor(cell * 0.5))}px ${display}`;
        ctx.textAlign = 'center';
        ctx.fillText(String(r.n), x + cell / 2, mapY + cell / 2 + Math.floor(cell * 0.18));
      });
      ctx.textAlign = 'left';

      // ── Logo: 24-0 white · F1 red ──
      ctx.fillStyle = '#A1A1AA';
      ctx.font = `600 24px ${display}`;
      ctx.fillText('F1 ROSTER PROTOCOL', pad, 52);

      ctx.fillStyle = '#FAFAFA';
      ctx.font = `700 54px ${display}`;
      const mark = '24-0';
      ctx.fillText(mark, pad, 108);
      const markW = ctx.measureText(mark).width;
      ctx.fillStyle = f1Red;
      ctx.fillText(' F1', pad + markW, 108);

      ctx.fillStyle = '#A1A1AA';
      ctx.font = `500 26px ${body}`;
      ctx.fillText('Perfect Season Builder', pad, 142);

      // Tier chip — gold / silver / bronze
      const chipLabel = (era.tier === 'underdog' ? 'UNDERDOG · FOLKLORE' : tier.label).toUpperCase();
      const chipColor = tier.color || '#C0C0C0';
      ctx.font = `600 22px ${display}`;
      const chipW = ctx.measureText(chipLabel).width + 36;
      const chipH = 42;
      const chipX = pad;
      const chipY = 158;
      ctx.strokeStyle = chipColor;
      ctx.lineWidth = 2;
      ctx.strokeRect(chipX + 0.5, chipY + 0.5, chipW - 1, chipH - 1);
      ctx.fillStyle = chipColor;
      ctx.fillText(chipLabel, chipX + 18, chipY + 29);

      // ── Record (white; gold only for 24–0 score) ──
      ctx.textAlign = 'center';
      ctx.fillStyle = perfect ? '#F5D76E' : '#FAFAFA';
      ctx.font = `700 141px ${display}`;
      ctx.fillText(`${state.wins}–${state.losses}`, W / 2, 355);

      ctx.fillStyle = badge.color || '#FAFAFA';
      ctx.font = `600 40px ${display}`;
      ctx.fillText(badge.label, W / 2, 415);

      ctx.fillStyle = '#C4C4C8';
      ctx.font = `600 30px ${body}`;
      ctx.fillText(badge.sub, W / 2, 456);

      // ── Package ──
      ctx.textAlign = 'left';
      ctx.fillStyle = brand;
      ctx.fillRect(pad, 484, 36, 5);

      ctx.fillStyle = '#FAFAFA';
      ctx.font = `700 44px ${display}`;
      ctx.fillText(`${era.team}  ${era.era}`, pad, 536);

      ctx.fillStyle = '#D4D4D8';
      ctx.font = `500 28px ${body}`;
      ctx.fillText(`${state.primary.name}  /  ${state.teammate.name}`, pad, 576);

      // ONLY "Redos 0/3!" is gold when zero
      ctx.font = `500 26px ${body}`;
      const principalPart = `${state.principal.name}  ·  `;
      const redoPart = `Redos ${redosUsed}/${SEASON_REDOS}${zeroRedos ? '!' : ''}`;
      ctx.fillStyle = '#A1A1AA';
      ctx.fillText(principalPart, pad, 612);
      const principalW = ctx.measureText(principalPart).width;
      ctx.fillStyle = zeroRedos ? gold : '#A1A1AA';
      ctx.fillText(redoPart, pad + principalW, 612);
      const redoW = ctx.measureText(redoPart).width;
      const sched = scheduleSummary();
      if (sched && sched !== 'Not drawn') {
        ctx.fillStyle = '#A1A1AA';
        ctx.fillText(`  ·  ${sched}`, pad + principalW + redoW, 612);
      }

      // ── Debrief: 3 rows ──
      ctx.fillStyle = brandOnDark;
      ctx.font = `600 22px ${display}`;
      ctx.fillText('DEBRIEF', pad, 650);

      const items = (state.debrief && state.debrief.length)
        ? state.debrief.slice(0, 3)
        : ['Season classification locked.'];
      while (items.length < 3) items.push('');

      const rowH = 66;
      const rowTop = 666;
      const rowW = W - pad * 2;
      items.forEach((text, i) => {
        if (!text) return;
        const y = rowTop + i * (rowH + 6);
        ctx.fillStyle = 'rgba(24,24,27,0.92)';
        ctx.fillRect(pad, y, rowW, rowH);
        ctx.fillStyle = brand;
        ctx.fillRect(pad, y, 4, rowH);

        ctx.fillStyle = '#D4D4D8';
        ctx.font = `400 24px ${body}`;
        const lines = wrapCanvasText(ctx, text, rowW - 32).slice(0, 2);
        lines.forEach((ln, li) => {
          ctx.fillText(ln, pad + 18, y + 28 + li * 28);
        });
      });

      // ── Footer: CTA left, URL center, logo right ──
      const siteUrl = String(_cfg.siteUrl || 'https://240-f1.vercel.app').replace(/\/+$/, '');
      const footH = 88;
      ctx.fillStyle = '#18181b';
      ctx.fillRect(0, H - footH, W, footH);
      ctx.fillStyle = brand;
      ctx.fillRect(0, H - footH, W, 4);

      ctx.textAlign = 'left';
      ctx.fillStyle = '#FAFAFA';
      ctx.font = `600 26px ${display}`;
      ctx.fillText('Can you go 24–0?', pad, H - 42);

      ctx.fillStyle = '#A1A1AA';
      ctx.font = `500 22px ${body}`;
      ctx.fillText('Spin an era · Draft the line-up · Hunt the perfect season', pad, H - 14);

      // URL bottom-center of card
      ctx.textAlign = 'center';
      ctx.fillStyle = '#FAFAFA';
      ctx.font = `600 24px ${display}`;
      ctx.fillText(siteUrl.replace(/^https?:\/\//, ''), W / 2, H - 18);

      ctx.textAlign = 'right';
      ctx.font = `700 30px ${display}`;
      const footMark = '24-0';
      const footF1 = ' F1';
      const footF1W = ctx.measureText(footF1).width;
      ctx.fillStyle = f1Red;
      ctx.fillText(footF1, right, H - 36);
      ctx.fillStyle = '#FAFAFA';
      ctx.fillText(footMark, right - footF1W, H - 36);
      ctx.textAlign = 'left';
    }

    async function openShare() {
      if (!state.era || !state.races.length) return;
      if (!state.debrief?.length) buildDebrief();
      const modal = document.getElementById('share-modal');
      const canvas = document.getElementById('share-canvas');

        if (document.fonts?.ready) await document.fonts.ready;
      } catch (_) { /* ignore */ }
