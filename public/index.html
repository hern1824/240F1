      const lockCls = locked ? 'pointer-events-none': '';
      const lockNote = locked
        ? '<div class="text-[10px] text-zinc-300">Spin era to unlock</div>': '';

      return `
        ${header('Spin an era. Draft the line-up. Hunt 24–0.')}
        <div class="space-y-5 fade-in">

          <!-- DAILY CHALLENGE -->
          <section class="border p-3 flex items-center justify-between gap-3 ${state.mode === 'daily' ? 'border-sky-500/60 bg-sky-500/10' : 'border-zinc-700 bg-zinc-900'}">
            <div class="min-w-0">
              <div class="font-display text-[10px] tracking-widest uppercase text-sky-400">Daily Challenge</div>
              <div class="text-[11px] text-zinc-300 mt-0.5">${state.mode === 'daily'
                ? `Locked hand · seed #${dailySeed()} · one attempt<br>same for all`
                : dailyUsed() ? 'Today\'s attempt used · new seed at midnight UTC' : 'Same era + season for everyone · one attempt · daily board'}</div>
            </div>
            ${state.mode === 'daily'
              ? `<button type="button" onclick="exitDaily()" class="shrink-0 px-3 py-2 border border-zinc-600 text-zinc-300 text-[10px] tracking-widest uppercase font-display">Exit</button>`
              : `<button type="button" onclick="startDaily()" ${dailyUsed() ? 'disabled' : ''} class="shrink-0 px-3 py-2 text-[10px] tracking-widest uppercase font-display ${dailyUsed() ? 'bg-zinc-800 text-zinc-500' : 'bg-sky-600 text-white'}">Play</button>`}
          </section>

          <!-- ERA SPIN -->
          <section class="bg-zinc-800 p-5">
            <div id="era-card" class="min-h-[320px]">${eraCardInner(era)}</div>
            ${state.mode === 'daily' ? '<div class="mt-2 text-center text-[10px] text-sky-400 uppercase tracking-wider font-display py-2 border border-sky-500/40">Era locked by daily seed</div>' : `<button id="spin-btn" onclick="spinEra()" ${state.spinning ? 'disabled': ''}
              class="w-full mt-2 py-3.5 bg-f1-red text-white font-display text-xs tracking-widest uppercase hover:bg-red-700 transition disabled:opacity-50">
              ${(() => {
                if (!era) return 'Spin Era';
                if (freeEraSpinsLeft() > 0) return 'Re-spin Era';

                return 'Re-spin Era';

            ${state.mode !== 'daily' && era && freeEraSpinsLeft() === 0 && ADS.enabled && ADS.rewardedEraRespin ? `

            ` : ''}
          </section>

          <!-- LINE-UP accordion -->
          <section class="bg-zinc-800 p-5 ${lockCls}">
            ${sectionTitle('Line-up', 'lineup', lockNote)}
            ${(() => {
              const open = state.lineupOpen; // null = all collapsed
              const panels = [
                {
                  id: 'primary',
                  title: 'Driver 1',
                  filled: !!state.primary,
                  summary: lineupDriverSummary(state.primary),
                  body: locked
                    ? `<div class="text-[11px] text-zinc-500 py-2">Spin era to load drivers.</div>`
                    : `<div class="pick-stack py-2">${drivers.map((d, i) => {
                        const on = state.primary?.name === d.name;
                        const off = state.teammate?.name === d.name;
                        return `<button type="button" class="pick-card ${on ? 'is-on' : ''} ${off ? 'is-off' : ''}"
                          ${off ? 'disabled' : ''} onclick="selectDriver('primary', ${i})">
                          ${personRowHtml(d.name,
                            `<div class="pick-name">${d.name}</div>`,
                            `<div class="pick-meta">RTG ${d.rating} · CON ${d.consistency} · WET ${d.wet}</div>`)}
                        </button>`;
                      }).join('')}</div>`,
                },
                {
                  id: 'teammate',
                  title: 'Driver 2',
                  filled: !!state.teammate,
                  summary: lineupDriverSummary(state.teammate),
                  body: locked
                    ? ''
                    : `<div class="pick-stack py-2">${drivers.map((d, i) => {
                        const on = state.teammate?.name === d.name;
                        const off = state.primary?.name === d.name;
                        return `<button type="button" class="pick-card ${on ? 'is-on' : ''} ${off ? 'is-off' : ''}"
                          ${off ? 'disabled' : ''} onclick="selectDriver('teammate', ${i})">
                          ${personRowHtml(d.name,
                            `<div class="pick-name">${d.name}</div>`,
                            `<div class="pick-meta">RTG ${d.rating} · CON ${d.consistency} · WET ${d.wet}</div>`)}
                        </button>`;
                      }).join('')}</div>`,
                },
                {
                  id: 'principal',
                  title: 'Principal',
                  filled: !!state.principal,
                  summary: lineupPrincipalSummary(state.principal),
                  body: locked
                    ? ''
                    : `<div class="pick-stack py-2">${principals.map((p, i) => {
                        const on = state.principal?.name === p.name;
                        const bonus = Object.entries(p.bonus).map(([k, v]) => `${k} +${v}`).join(' · ');
                        return `<button type="button" class="pick-card ${on ? 'is-on' : ''}" onclick="selectPrincipal(${i})">
                          ${personRowHtml(p.name,
                            `<div class="pick-name">${p.name}</div>`,
                            `<div class="pick-meta">${p.role}</div><div class="pick-meta" style="color:#D4AF37">${bonus}</div>`)}
                        </button>`;
                      }).join('')}</div>`,
                },
              ];
              return panels.map(panel => `
                <div class="acc-panel">
                  <button type="button" class="acc-head ${panel.filled ? 'is-filled' : ''}" onclick="setLineupOpen('${panel.id}')">
                    <div class="min-w-0 flex-1">
                      <div class="label-gold">${panel.title}</div>
                      ${panel.summary}
                    </div>
                    <span class="acc-chevron">${open === panel.id ? '▾' : '▸'}</span>
                  </button>
                  ${open === panel.id ? panel.body : ''}
                </div>
              `).join('');
            })()}
          </section>

          <!-- BUDGET -->
          <section class="bg-zinc-800 p-5 ${lockCls}" id="budget-section">
            ${sectionTitle('Budget', 'budget', `<div id="budget-total" class="font-display text-sm ${budgetTotal() === 100 ? 'text-emerald-400': 'text-f1-red'}">${budgetTotal()} / 100</div>`)}
            <div>
              ${BUDGET_KEYS.map(key => `
                <div class="budget-row">
                  <div class="flex justify-between items-baseline mb-1">
                    <span class="text-[11px] text-zinc-300">${BUDGET_LABELS[key]}</span>
                    <span id="budget-val-${key}" class="font-display text-sm text-white tabular-nums">${state.budget[key]}</span>

                  <div class="budget-track-wrap">

                      id="budget-slider-${key}"
                      type="range"
                      class="budget-slider"
                      min="${BUDGET_MIN}"
                      max="${BUDGET_MAX_ONE}"
                      step="1"
                      value="${state.budget[key]}"
                      ${locked ? 'disabled' : ''}
                      oninput="setBudget('${key}', this.value)"
                    />
                  </div>
                </div>
              `).join('')}
            </div>
            <p class="text-[11px] text-zinc-500 mt-1">Auto-balances to 100.</p>

            ${sectionTitle('Season Draw', 'schedule', state.seasonDraw?.locked ? '<div class="text-[10px] text-emerald-400 uppercase tracking-wider">Locked</div>' : '')}
            ${!state.seasonDraw?.locked || state.seasonSpinning ? `
              <p class="text-[11px] text-zinc-300 mb-3 leading-relaxed">One spin locks in the race schedule of the season.</p>
              <button type="button" onclick="spinSeason()" ${state.seasonSpinning || !state.era ? 'disabled' : ''}
                class="w-full py-3.5 font-display text-xs tracking-widest uppercase transition ${
                  state.seasonSpinning || !state.era
                    ? 'bg-zinc-700 text-zinc-500 cursor-not-allowed'
                    : 'bg-f1-red text-white hover:bg-red-700'
                }">
                ${state.seasonSpinning ? 'Drawing season…' : (!state.era ? 'Spin an era first' : 'Spin Season (once)')}
              </button>
            ` : `
              <p class="text-[11px] text-zinc-300 mb-3 leading-relaxed">Season locked. Arc, wear, SC, weather, travel, and reg heat are the hand you build against. Good luck.</p>
              <div class="grid grid-cols-2 gap-2">
                ${seasonDrawSummaryLines(state.seasonDraw).map(row => `
                  <div class="bg-zinc-950 px-2.5 py-2">
                    <div class="text-[10px] text-zinc-400 uppercase tracking-wider">${row.k}</div>
                    <div class="text-xs ${row.html ? '' : 'text-white'} font-medium mt-0.5 leading-snug">${row.v}</div>
                  </div>
                `).join('')}
              </div>
            `}
          </section>

          <!-- OUTLOOK: decide with calendar facts before ops -->
          ${renderSeasonOutlook()}

          <!-- OPERATIONS -->
          <section class="bg-zinc-800 p-5 ${lockCls}">
            ${sectionTitle('Operations', 'operations')}
            <p class="text-[11px] text-zinc-500 mb-4">Season settings. Defaults are a safe baseline. Tune to your era to raise your odds.</p>
            <div class="space-y-4">
              <div>
                <div class="label-gold mb-2">Tire bias</div>
                <div class="seg-grid cols-3">
                  ${TIRE_PHILOSOPHIES.map(o => `
                    <button type="button" class="seg-btn ${state.tirePhil === o.id ? 'is-on' : ''}"
                      onclick="setMod('tirePhil', '${o.id}')">${o.label}<small>${o.sub}</small></button>
                  `).join('')}
                </div>
              </div>
              <div>
                <div class="label-gold mb-2">Development</div>
                <div class="seg-grid cols-3">
                  ${DEV_CUTOFFS.map(o => `
                    <button type="button" class="seg-btn ${state.devCutoff === o.id ? 'is-on' : ''}"
                      onclick="setMod('devCutoff', '${o.id}')">${o.label}<small>${o.id === 'early' ? 'R1-8' : o.id === 'late' ? 'R17-24' : 'Even'}</small></button>
                  `).join('')}

              </div>
              <div>
                <div class="label-gold mb-2">Lobbying</div>
                <div class="seg-grid cols-3">
                  ${LOBBYING.map(o => `
                    <button type="button" class="seg-btn ${state.lobbying === o.id ? 'is-on' : ''}"
                      onclick="setMod('lobbying', '${o.id}')">${o.label}<small>${o.id === 'passive' ? 'Safe' : o.id === 'active' ? 'Edge' : 'Risk'}</small></button>

                <div class="label-gold mb-2">Sponsor</div>
                <div class="seg-grid cols-3">
                  ${SPONSORS.map(o => `
                    <button type="button" class="seg-btn ${state.sponsor === o.id ? 'is-on' : ''}"
                      onclick="setMod('sponsor', '${o.id}')">${o.label.split(' ')[0]}<small>${o.id === 'title' ? 'DNF cover' : o.id === 'tech' ? 'Dry pace' : 'Wet / fly'}</small></button>

          <button id="start-btn" onclick="startSeason()" ${canStart ? '': 'disabled'}

    function renderRaceCard(race) {
      const wear = tireWearLabel(race.tire);
      const resultCls = race.result === 'win' ? 'race-win' : race.result === 'loss' ? 'race-loss' : 'race-pending';
      const phase = PHASE_TYPES.find(p => p.id === race.phaseType) || null;
      const phaseLab = phase?.label || '';
      const phaseColor = phase?.color || '#a1a1aa';
      const showDecisions = !race.result;
      const i = race.n - 1;

      const optRow = (key, options, current) => `
        <div class="opt-row">
          ${options.map(([id, lab]) => `
            <button type="button" class="${current === id ? 'is-on' : ''}"
              onclick="state.races[${i}].${key}='${id}';render()">${lab}</button>
          `).join('')}
        </div>`;
      // The caret on the header row toggles ALL explainers on THIS card (per card, independent of other cards).
      const cardHintsOpen = !!(state.hints && state.hints[race.n]);
      const optLab = (label) => `<div class="opt-lab">${label}</div>`;
      const optHint = (txt) => cardHintsOpen ? `<div style="grid-column:1/-1;font-size:11px;color:#c4c4cc;line-height:1.35;margin:-2px 0 5px">${txt}</div>` : '';
      const anyCall = race.tirePlan || race.strategy || race.engineMode || race.pitWindow || race.quali || race.wetCall || race.lead;

      return `
        <article id="race-${race.n}" class="race-card bg-zinc-800 p-4 ${resultCls} fade-in">
          ${trackOutlineImg(race.n)}
          <div class="race-card-head flex justify-between items-start gap-3 mb-3">
            <div class="min-w-0">
              <div class="font-display text-sm text-white tracking-wide tabular-nums">R${String(race.n).padStart(2, '0')} / 24${phaseLab ? ` <span class="font-normal text-[12px]" style="color:${phaseColor}">· ${phaseLab}</span>` : ''}${race.isSprint ? ' <span class="font-normal text-[12px] text-amber-400">· SPRINT</span>' : ''}</div>
              <div class="font-display text-lg text-white leading-tight mt-0.5 flex items-center gap-0">
                ${flagImg(race.flag)}<span>${race.name}</span>
              </div>
              <div class="text-[12px] text-zinc-400">${race.loc}</div>

    function shareCaption() {

      const lines = [
        `${state.wins}–${state.losses} in 24-0: Perfect Season`,

      if (state.debrief?.[0]) lines.push(debriefText(state.debrief[0]));
      lines.push('');

      if (state.rival) lines.push(`Rival: ${state.rival.driver} took ${state.rival.wins} of the losses.`);
      lines.push('#240PerfectSeason #PerfectSeason #Motorsport');

    function wrapCanvasText(ctx, text, maxWidth) {
      const words = String(text || '').split(/\s+/).filter(Boolean);
      const lines = [];
      let line = '';
      for (const w of words) {
        const test = line ? `${line} ${w}` : w;
        if (ctx.measureText(test).width > maxWidth && line) {
          lines.push(line);
          line = w;
        } else line = test;
      }
      if (line) lines.push(line);
      return lines;
    }

    function brandRgb(hex) {
      const h = String(hex || '#E10600').replace('#', '');
      const full = h.length === 3 ? h.split('').map(c => c + c).join('') : h.padEnd(6, '0').slice(0, 6);
      const n = parseInt(full, 16);
      if (Number.isNaN(n)) return { r: 225, g: 6, b: 0 };
      return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
    }

    function brandRgba(hex, a) {
      const { r, g, b } = brandRgb(hex);
      return `rgba(${r},${g},${b},${a})`;
    }

    function brandIsLight(hex) {
      const { r, g, b } = brandRgb(hex);
      return (r * 0.299 + g * 0.587 + b * 0.114) > 175;
    }

    function paintShareCard(canvas) {
      const W = 1080;
      const H = 1080;
      canvas.width = W;
      canvas.height = H;
      const ctx = canvas.getContext('2d');
      const era = state.era;
      const tier = tierInfo(era);
      const badge = resultBadgeMeta();
      const perfect = state.wins === 24;
      const brand = era.color || '#E10600';
      const redosUsed = SEASON_REDOS - state.redosLeft;
      const zeroRedos = redosUsed === 0;
      const gold = '#D4AF37';
      const f1Red = '#E10600';
      const display = '"Space Grotesk", "Segoe UI", system-ui, sans-serif';
      const body = '"Inter", "Segoe UI", system-ui, sans-serif';
      const pad = 44;
      const right = W - pad;

      // Background (theme-aware: Classic / Carbon / Gold)
      const theme = SHARE_THEMES[state.shareTheme] || SHARE_THEMES.classic;
      const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
      bgGrad.addColorStop(0, theme.bg1);
      bgGrad.addColorStop(1, theme.bg2);
      ctx.fillStyle = bgGrad;
      ctx.fillRect(0, 0, W, H);
      if (state.shareTheme === 'carbon') {
        ctx.save();
        ctx.globalAlpha = 0.05;
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 1;
        for (let x = -H; x < W; x += 14) {
          ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x + H, H); ctx.stroke();
        }
        ctx.restore();
      }
      if (state.shareTheme === 'gold') {
        ctx.fillStyle = 'rgba(212,175,55,0.05)';
        ctx.fillRect(0, 0, W, H);
      }

      // Era brand wash only (never gold for zero redos)
      const glow = ctx.createRadialGradient(W * 0.55, 200, 40, W * 0.5, 380, 780);
      glow.addColorStop(0, brandRgba(brand, 0.38));
      glow.addColorStop(0.35, brandRgba(brand, 0.16));
      glow.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = glow;
      ctx.fillRect(0, 0, W, H);
      const glow2 = ctx.createRadialGradient(80, 100, 10, 200, 240, 420);
      glow2.addColorStop(0, brandRgba(brand, 0.2));
      glow2.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = glow2;
      ctx.fillRect(0, 0, W, H);

      // Top + left brand rails
      ctx.fillStyle = brand;
      ctx.fillRect(0, 0, W, 8);
      ctx.fillRect(0, 0, 8, H);

      // ── Race map: green wins · red losses ──
      const mapLabel = 'YOUR RACE MAP';
      ctx.font = `600 22px ${display}`;
      ctx.fillStyle = '#FAFAFA';
      ctx.textAlign = 'right';
      ctx.fillText(mapLabel, right, 52);

      const mapPadL = 300;
      const mapAvail = right - mapPadL;
      const mapN = 24;
      const mapGap = 3;
      const cell = Math.floor((mapAvail - mapGap * (mapN - 1)) / mapN);
      const mapW = cell * mapN + mapGap * (mapN - 1);
      const mapX = right - mapW;
      const mapY = 62;
      state.races.forEach((r, i) => {
        const x = mapX + i * (cell + mapGap);
        const win = r.result === 'win';
        ctx.fillStyle = win ? 'rgba(16,185,129,0.42)' : 'rgba(225,6,0,0.42)';
        ctx.fillRect(x, mapY, cell, cell);
        ctx.strokeStyle = win ? '#34D399' : '#E10600';
        ctx.lineWidth = 1.5;
        ctx.strokeRect(x + 0.5, mapY + 0.5, cell - 1, cell - 1);
        ctx.fillStyle = win ? '#6EE7B7' : '#FCA5A5';
        ctx.font = `600 ${Math.max(13, Math.floor(cell * 0.5))}px ${display}`;
        ctx.textAlign = 'center';
        ctx.fillText(String(r.n), x + cell / 2, mapY + cell / 2 + Math.floor(cell * 0.18));
      });
      ctx.textAlign = 'left';

      // ── Logo: 24-0 white · PERFECT SEASON red ──
      ctx.fillStyle = '#A1A1AA';
      ctx.font = `600 24px ${display}`;
      ctx.fillText('ROSTER PROTOCOL', pad, 52);

      ctx.fillStyle = '#FAFAFA';
      ctx.font = `700 54px ${display}`;
      const mark = '24-0';
      ctx.fillText(mark, pad, 108);

      ctx.fillStyle = f1Red;
      ctx.font = `600 26px ${display}`;
      ctx.fillText('PERFECT SEASON', pad, 142);

      // Tier chip — gold / silver / bronze
      const chipLabel = (era.tier === 'underdog' ? 'UNDERDOG · FOLKLORE' : tier.label).toUpperCase();
      const chipColor = tier.color || '#C0C0C0';
      ctx.font = `600 22px ${display}`;
      const chipW = ctx.measureText(chipLabel).width + 36;
      const chipH = 42;
      const chipX = pad;
      const chipY = 158;
      ctx.strokeStyle = chipColor;
      ctx.lineWidth = 2;
      ctx.strokeRect(chipX + 0.5, chipY + 0.5, chipW - 1, chipH - 1);
      ctx.fillStyle = chipColor;
      ctx.fillText(chipLabel, chipX + 18, chipY + 29);

      // ── Record: wins white/gold · dash muted · losses red ──
      ctx.textAlign = 'center';
      ctx.font = `700 141px ${display}`;
      const winStr = String(state.wins);
      const dashStr = '–';
      const lossStr = String(state.losses);
      const winW = ctx.measureText(winStr).width;
      const dashW = ctx.measureText(dashStr).width;
      const lossW = ctx.measureText(lossStr).width;
      const recTotal = winW + dashW + lossW;
      let recX = W / 2 - recTotal / 2;
      const recY = 355;
      ctx.textAlign = 'left';
      ctx.fillStyle = perfect ? '#F5D76E' : '#FAFAFA';
      ctx.fillText(winStr, recX, recY);
      recX += winW;
      ctx.fillStyle = '#FAFAFA';
      ctx.fillText(dashStr, recX, recY);
      recX += dashW;
      ctx.fillStyle = f1Red;
      ctx.fillText(lossStr, recX, recY);

      ctx.textAlign = 'center';
      ctx.fillStyle = badge.color || '#FAFAFA';
      ctx.font = `600 40px ${display}`;
      ctx.fillText(badge.label, W / 2, 415);

      ctx.fillStyle = '#FAFAFA';
      ctx.font = `600 30px ${body}`;
      ctx.fillText(badge.sub, W / 2, 456);

      // ── Package ──
      ctx.textAlign = 'left';
      ctx.fillStyle = brand;
      ctx.fillRect(pad, 484, 36, 5);

      ctx.fillStyle = '#FAFAFA';
      ctx.font = `700 44px ${display}`;
      ctx.fillText(`${era.team}  ${era.era}`, pad, 536);

      // Gold "Legend" nameplate on the driver line for supporters / all-14 collectors
      const legendPlate = hasGoldNameplate();
      ctx.fillStyle = legendPlate ? '#F5D76E' : '#D4D4D8';
      ctx.font = legendPlate ? `600 28px ${body}` : `500 28px ${body}`;
      ctx.fillText(`${state.primary.name}  /  ${state.teammate.name}${legendPlate ? '   ★ LEGEND' : ''}`, pad, 576);

      // ONLY "Redos 0/3!" is gold when zero
      ctx.font = `500 26px ${body}`;
      const principalPart = `${state.principal.name}  ·  `;
      const redoPart = `Redos ${redosUsed}/${SEASON_REDOS}${zeroRedos ? '!' : ''}`;
      ctx.fillStyle = '#A1A1AA';
      ctx.fillText(principalPart, pad, 612);
      const principalW = ctx.measureText(principalPart).width;
      ctx.fillStyle = zeroRedos ? gold : '#A1A1AA';
      ctx.fillText(redoPart, pad + principalW, 612);
      const redoW = ctx.measureText(redoPart).width;
      const sched = scheduleSummary();
      if (sched && sched !== 'Not drawn') {
        ctx.fillStyle = '#A1A1AA';
        ctx.fillText(`  ·  ${sched}`, pad + principalW + redoW, 612);
      }

      // ── Debrief: 3 rows (label white) ──
      ctx.fillStyle = '#FAFAFA';
      ctx.font = `600 22px ${display}`;
      ctx.fillText('DEBRIEF', pad, 650);

      const rawItems = (state.debrief && state.debrief.length)
        ? state.debrief.slice(0, 3)
        : [{ text: 'Season classification locked.', tone: 'neutral' }];
      while (rawItems.length < 3) rawItems.push({ text: '', tone: 'neutral' });

      const rowH = 60;
      const rowTop = 666;
      const rowW = W - pad * 2;
      rawItems.forEach((item, i) => {
        const text = debriefText(item);
        if (!text) return;
        const tone = debriefTone(item);
        const y = rowTop + i * (rowH + 5);
        ctx.fillStyle = 'rgba(24,24,27,0.92)';
        ctx.fillRect(pad, y, rowW, rowH);
        ctx.fillStyle = brand;
        ctx.fillRect(pad, y, 4, rowH);

        ctx.fillStyle = tone === 'gold' ? '#D4AF37' : tone === 'red' ? '#E10600' : '#D4D4D8';
        ctx.font = `400 22px ${body}`;
        const lines = wrapCanvasText(ctx, text, rowW - 32).slice(0, 2);
        lines.forEach((ln, li) => {
          ctx.fillText(ln, pad + 18, y + 26 + li * 26);
        });
      });

      // ── Footer: CTA left · logo right · URL plain bottom-center (no box) ──
      const siteUrl = String(_cfg.siteUrl || 'https://240-f1.vercel.app').replace(/\/+$/, '');
      const urlDisplay = siteUrl.replace(/^https?:\/\//, '');
      const footH = 100;
      ctx.fillStyle = '#18181b';
      ctx.fillRect(0, H - footH, W, footH);
      ctx.fillStyle = brand;
      ctx.fillRect(0, H - footH, W, 4);

      ctx.textAlign = 'left';
      ctx.fillStyle = '#FAFAFA';
      ctx.font = `600 26px ${display}`;
      ctx.fillText('Can you go 24–0?', pad, H - 58);

      ctx.fillStyle = '#A1A1AA';
      ctx.font = `500 22px ${body}`;
      ctx.fillText('Spin an era · Draft the line-up · Hunt the perfect season', pad, H - 32);

      ctx.textAlign = 'right';
      ctx.font = `700 30px ${display}`;
      const footMark = '24-0';
      const footF1 = ' PERFECT SEASON';
      const footF1W = ctx.measureText(footF1).width;
      ctx.fillStyle = f1Red;
      ctx.fillText(footF1, right, H - 50);
      ctx.fillStyle = '#FAFAFA';
      ctx.fillText(footMark, right - footF1W, H - 50);

      // URL bottom-aligned, no box — plain text inside card footer
      ctx.textAlign = 'center';
      ctx.fillStyle = '#FAFAFA';
      ctx.font = `600 24px ${display}`;
      ctx.fillText(urlDisplay, W / 2, H - 14);
      ctx.textAlign = 'left';
    }

    function shareCanvasBlob() {

    function shareFileName() {

    /** iOS / Android: prefer share sheet so user can Save Image / Photos. */
    function prefersMobileShareSheet() {
      const ua = navigator.userAgent || '';
      const touch = (navigator.maxTouchPoints || 0) > 0;
      if (/iPhone|iPad|iPod|Android/i.test(ua)) return true;
      // iPadOS desktop UA
      if (navigator.platform === 'MacIntel' && touch) return true;
      return false;
    }

    function triggerFileDownload(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.rel = 'noopener';
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 2500);
    }

    /**
     * Open OS share sheet with the PNG when supported (Save to Photos / Files / apps).
     * Returns 'shared' | 'cancelled' | 'unavailable'
     */
    async function sharePngViaSheet(blob, filename, { withCaption = false } = {}) {
      if (!navigator.share) return 'unavailable';
      const file = new File([blob], filename, { type: 'image/png' });
      const payload = withCaption
        ? { files: [file], title: '24-0: Perfect Season', text: shareCaption() }
        : { files: [file], title: '24-0: Perfect Season' };

      // Prefer canShare when available; some mobile browsers are picky
      let canFiles = false;
      try {
        canFiles = !navigator.canShare || navigator.canShare({ files: [file] });
      } catch (_) {
        canFiles = prefersMobileShareSheet();
      }
      if (!canFiles) return 'unavailable';

      try {
        await navigator.share(payload);
        return 'shared';
      } catch (e) {
        if (e?.name === 'AbortError') return 'cancelled';
        // Retry with caption only on file share failure is less useful for Save PNG
        throw e;
      }
    }

    async function downloadShareCard() {
      try {
        paintShareCard(document.getElementById('share-canvas'));
        const blob = await shareCanvasBlob();
        const filename = shareFileName();

        // Mobile: system share sheet → Save Image / Add to Photos / Files
        if (prefersMobileShareSheet() || (navigator.share && navigator.canShare)) {
          const result = await sharePngViaSheet(blob, filename, { withCaption: false });
          if (result === 'shared') {
            setShareStatus('Share sheet opened. Choose Save Image / Photos / Files.');
            return;
          }
          if (result === 'cancelled') {
            setShareStatus('Share cancelled.');
            return;
          }
        }

        // Desktop / no file-share: classic download
        triggerFileDownload(blob, filename);
        setShareStatus(prefersMobileShareSheet()
          ? 'Download started. If no share sheet appeared, use Share… or long-press the card.'
          : 'PNG downloaded.');
      } catch (e) {
        if (e?.name === 'AbortError') {
          setShareStatus('Share cancelled.');
          return;
        }
        try {
          paintShareCard(document.getElementById('share-canvas'));
          const blob = await shareCanvasBlob();
          triggerFileDownload(blob, shareFileName());
          setShareStatus('PNG downloaded (fallback).');
        } catch (e2) {
          setShareStatus(e2.message || e.message || 'Save failed.', false);
        }
      }
    }

    async function copyShareImage() {
      try {
        paintShareCard(document.getElementById('share-canvas'));
        const blob = await shareCanvasBlob();
        if (!navigator.clipboard || !window.ClipboardItem) {
          setShareStatus('Copy image not supported here. Use Save PNG.', false);
          return;
        }
        await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
        setShareStatus('Image copied. Paste into X, Discord, Slack, etc.');
      } catch (e) {
        setShareStatus('Could not copy image. Try Save PNG.', false);
      }
    }

    async function copyShareCaption() {
      try {
        const text = shareCaption();
        if (navigator.clipboard?.writeText) await navigator.clipboard.writeText(text);
        else {
          const ta = document.createElement('textarea');
          ta.value = text;
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          ta.remove();
        }
        setShareStatus('Caption copied.');
      } catch (_) {
        setShareStatus('Could not copy caption.', false);
      }
    }

    async function nativeShareCard() {
      try {
        paintShareCard(document.getElementById('share-canvas'));
        const blob = await shareCanvasBlob();
        const filename = shareFileName();
        const result = await sharePngViaSheet(blob, filename, { withCaption: true });
        if (result === 'shared') {
          setShareStatus('Shared.');
          return;
        }
        if (result === 'cancelled') {
          setShareStatus('Share cancelled.');
          return;
        }
        // No file share: text-only sheet, then offer download
        if (navigator.share) {
          await navigator.share({ title: '24-0: Perfect Season', text: shareCaption() });
          setShareStatus('Caption shared. Use Save PNG for the image.');
          return;
        }
        triggerFileDownload(blob, filename);
        setShareStatus('PNG downloaded (share unavailable).');
      } catch (e) {
        if (e?.name === 'AbortError') setShareStatus('Share cancelled.');
        else setShareStatus('Share failed. Try Save PNG.', false);
      }
    }

    /** Rare-win tiers for special presentation */
    function lbRarity(r) {
      const w = r.wins ?? 0;
      if (w >= 24 || r.is_perfect) {
        return {
          key: 'perfect',
          cardClass: 'lb-perfect',
          badge: '24–0 PERFECT!',
          badgeColor: '#F5D76E',
          blurb: 'Clean sweep · folklore territory',

      if (w >= 20) {
        return {
          key: 'elite',
          cardClass: 'lb-elite',
          badge: w >= 22 ? 'ELITE SWEEP!' : 'DOMINANT!',
          badgeColor: '#60A5FA',
          blurb: w >= 22 ? 'Near-perfect campaign' : 'Championship iron · 20+ wins',
        };

      if (w >= 14) {
        return { key: 'solid', cardClass: '', badge: 'RACE-WINNING!', badgeColor: '#FFFFFF', blurb: '' };

      return { key: 'run', cardClass: '', badge: '', badgeColor: '#71717a', blurb: '' };

    function lbFormatWhen(ts) {
      if (!ts) return '';
      try {
        const d = new Date(typeof ts === 'number' ? ts : Date.parse(ts));
        if (Number.isNaN(d.getTime())) return '';
        return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
      } catch (_) {
        return '';
      }
    }

                  ${r.mode === 'daily' ? '<span class="lb-pill" style="color:#38BDF8;border-color:#38BDF8">DAILY</span>' : ''}
                </div>
                ${rare.blurb ? `<div class="text-[10px] mt-0.5" style="color:${rare.badgeColor}">${rare.blurb}</div>` : ''}
                <div class="text-xs mt-1.5 truncate font-medium ${/[★♥]/.test(r.nickname || '') ? '' : 'text-zinc-200'}" ${/[★♥]/.test(r.nickname || '') ? 'style="color:#F5D76E"' : ''}>${r.nickname || 'Driver'}</div>
                <div class="text-[11px] text-zinc-400 mt-0.5 leading-snug">
                  <span class="text-zinc-300">${r.team || ''} ${r.era_label || ''}</span>
                  ${lineup !== '—' ? `<span class="text-zinc-600"> · </span>${lineup}` : ''}
                </div>
                ${principal ? `<div class="text-[11px] text-zinc-500 mt-0.5 truncate">Lead · ${principal}</div>` : ''}
                ${sched && sched !== 'Not drawn' ? `<div class="text-[10px] text-zinc-600 mt-0.5 truncate">Arc · ${sched}</div>` : ''}
                <div class="flex flex-wrap items-center gap-x-2 gap-y-0.5 mt-1.5 text-[10px]">
                  <span class="${redoCls} uppercase tracking-wider font-display">${redoTxt}</span>
                  ${when ? `<span class="text-zinc-600">· ${when}</span>` : ''}
                </div>
              </div>
              <div class="lb-pill shrink-0 text-center max-w-[4.5rem] leading-tight" style="color:${tierColor};border-color:${tierColor}">${tierLab}</div>
            </div>
          </div>`;
      }).join('');
    }

    let _lbTab = 'public';
    let _lbCache = { public: [], daily: [], device: [] };

    function setLeaderboardTab(tab) {
      _lbTab = tab === 'device' ? 'device' : tab === 'daily' ? 'daily' : 'public';
      for (const id of ['public', 'daily', 'device']) {
        const el = document.getElementById(`lb-tab-${id}`);
        if (el) {
          el.classList.toggle('is-on', _lbTab === id);
          el.setAttribute('aria-selected', _lbTab === id ? 'true' : 'false');
        }
      }
      const body = document.getElementById('lb-body');
      if (!body) return;
      const rows = _lbCache[_lbTab] || [];
      if (_lbTab === 'daily' && !rows.length) {
        body.innerHTML = `<p class="text-zinc-400 text-sm px-1">No results for today's seed (#${dailySeed()}) yet.</p><p class="text-[11px] text-zinc-600 mt-2 px-1">Play the Daily Challenge from the setup screen. One attempt, same hand for everyone, resets at midnight UTC.</p>`;
        return;
      }
      body.innerHTML = lbRenderRows(rows);
    }

    /** Normalize project URL (strip trailing / and accidental /rest/v1). */
    function supabaseBaseUrl() {
      let u = String(_cfg.supabaseUrl || '').trim().replace(/\/+$/, '');
      u = u.replace(/\/rest\/v1$/i, '');
      return u;
    }

    function supabaseHeaders(extra = {}) {
      const key = _cfg.supabaseAnonKey || '';
      // Publishable keys (sb_publishable_…) and legacy anon JWTs both go in apikey.
      // Authorization mirrors apikey for gateway compatibility.
      return {
        apikey: key,
        Authorization: `Bearer ${key}`,
        Accept: 'application/json',
        ...extra,
      };
    }

    async function lbFetchRemote(filter) {
      const base = supabaseBaseUrl();
      const key = _cfg.supabaseAnonKey || '';
      if (!base || !key) return [];
      try {
        const res = await fetch(
          `${base}/rest/v1/season_results?select=*${filter || ''}&order=wins.desc,redos_used.asc,created_at.desc&limit=30`,
          { headers: supabaseHeaders() }
        );
        if (!res.ok) {
          console.warn('Leaderboard fetch failed', res.status, await res.text().catch(() => ''));
          return [];
        }
        const data = await res.json();
        return (data || []).map(r => ({
          id: r.id,
          created_at: r.created_at ? new Date(r.created_at).getTime() : 0,
          nickname: r.nickname || 'Driver',
          era_id: r.era_id,
          team: r.team,
          era_label: r.era_label,
          tier: r.tier,
          wins: r.wins,
          losses: r.losses,
          redos_used: r.redos_used ?? 0,
          primary_driver: r.primary_driver || '',
          is_perfect: !!r.is_perfect || r.wins === 24,
          mode: r.mode || 'free',
          seed: r.seed ?? null,
          source: 'cloud',
        }));
      } catch (e) {
        console.warn('Leaderboard fetch error', e);
        return [];
      }
    }

    async function lbPushRemote(entry) {
      const base = supabaseBaseUrl();
      const key = _cfg.supabaseAnonKey || '';
      if (!base || !key || !entry) return false;
      try {
        const payload = {
          nickname: entry.nickname,
          era_id: entry.era_id,
          team: entry.team,
          era_label: entry.era_label,
          tier: entry.tier,
          wins: entry.wins,
          losses: entry.losses,
          redos_used: entry.redos_used,
          primary_driver: entry.primary_driver,
          mode: entry.mode || 'free',
          seed: entry.seed != null ? String(entry.seed) : null,
          user_agent: (navigator.userAgent || '').slice(0, 180),
        };
        let res = await fetch(`${base}/rest/v1/season_results`, {
          method: 'POST',
          headers: supabaseHeaders({
            'Content-Type': 'application/json',
            Prefer: 'return=minimal',
          }),
          body: JSON.stringify(payload),
        });
        // Pre-migration schema (no mode/seed columns): retry with the legacy shape
        if (!res.ok && res.status === 400 && payload.mode !== undefined) {
          const { mode, seed, ...legacy } = payload;
          res = await fetch(`${base}/rest/v1/season_results`, {
            method: 'POST',
            headers: supabaseHeaders({ 'Content-Type': 'application/json', Prefer: 'return=minimal' }),
            body: JSON.stringify(legacy),
          });
        }
        if (!res.ok) {
          console.warn('Leaderboard insert failed', res.status, await res.text().catch(() => ''));
        }
        return res.ok;
      } catch (e) {
        console.warn('Leaderboard insert error', e);
        return false;
      }
    }

    async function submitToLeaderboard() {
      let nick = (prompt('Nickname for leaderboard (max 24 chars):', 'Driver') || '').trim().slice(0, 24);
      if (!nick) return;
      // Gold "Legend" nameplate marker: supporters and all-14 collectors submit with a ★
      if (hasGoldNameplate() && !nick.includes('★')) nick = `${nick.slice(0, 22)} ★`;
      const entry = currentSeasonEntry(nick);
      if (!entry) {
        alert('Finish all 24 races before submitting.');
        return;
      }
      const local = lbLocalLoad();
      local.unshift(entry);
      lbLocalSave(lbSort(local));
      const cloud = await lbPushRemote(entry);
      state.lbSubmitted = true;
      trackEvent('leaderboard_submit', {
        wins: entry.wins,
        redos_used: entry.redos_used,
        cloud: cloud ? 1 : 0,
        era_id: entry.era_id || '',
      });
      render();
      alert(cloud
        ? 'Saved locally and to the cloud leaderboard.'
        : 'Saved on this device. Cloud submit skipped (Supabase not configured or offline).');
    }

    async function openLeaderboard() {
      const body = document.getElementById('lb-body');
      const modal = document.getElementById('lb-modal');
      if (!body || !modal) return;
      body.innerHTML = '<p class="text-zinc-500 text-xs px-1">Loading…</p>';
      modal.classList.remove('hidden');
      document.body.style.overflow = 'hidden';

      const device = lbSort(lbLocalLoad().map(r => ({ ...r, source: 'device' }))).slice(0, 40);
      const remote = await lbFetchRemote();
      const pub = lbSort(remote.map(r => ({ ...r, source: 'cloud' }))).slice(0, 40);
      // Daily: today's seed only. Server-side filter; falls back to client filter
      // if the columns don't exist yet (pre-migration schema).
      let daily = await lbFetchRemote(`&mode=eq.daily&seed=eq.${dailySeed()}`);
      if (!daily.length) daily = remote.filter(r => r.mode === 'daily' && Number(r.seed) === dailySeed());
      _lbCache = { public: pub, daily: lbSort(daily).slice(0, 40), device };

      // Default tab: Public if cloud has rows, else Device
      _lbTab = pub.length ? 'public' : 'device';
      setLeaderboardTab(_lbTab);
    }

    function closeLeaderboard() {
      document.getElementById('lb-modal')?.classList.add('hidden');
      if (document.getElementById('help-modal')?.classList.contains('hidden') &&
          document.getElementById('share-modal')?.classList.contains('hidden') &&
          document.getElementById('ad-modal')?.classList.contains('hidden')) {
        document.body.style.overflow = '';
      }
    }

    function openGarage() { state.garageTab = state.garageTab || 'eras'; state.prevPhase = state.phase; state.phase = 'garage'; render(); window.scrollTo(0, 0); }
    function closeGarage() { state.phase = state.prevPhase && state.prevPhase !== 'garage' ? state.prevPhase : 'setup'; render(); }
    function setGarageTab(t) { state.garageTab = t; render(); }

    function renderGarage() {
      const tab = state.garageTab || 'eras';
      const hs = historyLoad();
      const best = bestByEra();
      const trophies = earnedTrophies();
      const earnedN = trophies.filter(t => t.earned).length;
      const played = new Set(hs.map(h => h.era_id)).size;
      const tabBtn = (id, label) => `<button type="button" class="lb-tab ${tab === id ? 'is-on' : ''}" onclick="setGarageTab('${id}')">${label}</button>`;
      let body = '';
      if (tab === 'eras') {
        body = `
          <p class="text-[11px] text-zinc-500 mb-3">${played}/${ERAS.length} eras raced. Best record per era. Collect them all.</p>
          <div class="grid grid-cols-3 gap-1.5">
            ${ERAS.map(e => {
              const b = best[e.id];
              const tc = tierInfo(e).color;
              return `
                <div class="bg-zinc-800 px-2 py-2 border-l-2 ${b ? '' : 'opacity-50'}" style="border-color:${e.color}">
                  <div class="text-[11px] text-zinc-100 font-medium leading-tight">${e.team}</div>
                  <div class="text-[10px] text-zinc-400 leading-tight mt-0.5">${e.era}</div>
                  <div class="flex items-center justify-between gap-1 mt-1">
                    <span class="text-[9px] uppercase tracking-wider" style="color:${tc}">${tierInfo(e).label}</span>
                    ${b ? `<span class="font-display text-[11px] ${b.wins === 24 ? 'text-[#F5D76E]' : b.wins >= 20 ? 'text-[#60A5FA]' : 'text-zinc-200'}">${b.wins}–${b.losses}</span>`
                        : '<span class="text-[8px] text-zinc-600 uppercase tracking-wider">—</span>'}
                  </div>
                </div>`;
            }).join('')}
          </div>`;
      } else if (tab === 'history') {
        body = !hs.length
          ? '<p class="text-zinc-400 text-sm px-1">No completed seasons yet. Finish a campaign and it lands here with its race map.</p>'
          : `<div class="space-y-2">${hs.slice(0, 40).map(h => `
              <div class="bg-zinc-800 p-3">
                <div class="flex items-center justify-between gap-2">
                  <div class="min-w-0">
                    <span class="font-display text-base ${h.wins === 24 ? 'text-[#F5D76E]' : h.wins >= 20 ? 'text-[#60A5FA]' : 'text-zinc-100'}">${h.wins}–${h.losses}</span>
                    <span class="text-[11px] text-zinc-400 ml-2">${h.team} ${h.era_label}</span>
                    ${h.mode === 'daily' ? '<span class="ml-1.5 text-[8px] uppercase tracking-wider px-1 py-0.5 border border-sky-500/60 text-sky-400 font-display">Daily</span>' : ''}
                  </div>
                  <div class="text-[10px] text-zinc-500 shrink-0">${lbFormatWhen(h.ts)} · Redos ${h.redos}</div>
                </div>
                <div class="grid grid-cols-24 gap-px mt-2" style="grid-template-columns:repeat(24,1fr)">
                  ${(h.map || '').split('').map((c, i) => `<span class="h-2" title="R${i + 1}" style="background:${c === '1' ? 'rgba(16,185,129,0.75)' : 'rgba(225,6,0,0.75)'}"></span>`).join('')}
                </div>
                ${h.rival ? `<div class="text-[10px] text-zinc-500 mt-1.5">Rival · ${h.rival}</div>` : ''}
              </div>`).join('')}</div>`;
      } else {
        const rarityColor = { 1: '#a1a1aa', 2: '#CD7F32', 3: '#C0C0C0', 4: '#60A5FA', 5: '#F5D76E' };
        const iconSize = { 1: '18px', 2: '22px', 3: '26px', 4: '30px', 5: '36px' };
        const legend = earnedN === trophies.length;
        body = `
          <div class="mb-3 px-3 py-2.5 ${legend ? 'border border-[#F5D76E] bg-[#F5D76E]/10' : 'border border-zinc-700 bg-zinc-800/60'}">
            <div class="font-display tracking-widest uppercase text-[9px]" style="color:${legend ? '#F5D76E' : '#a1a1aa'}">${legend ? 'Legend nameplate unlocked' : 'Collect-all reward'}</div>
            <div class="text-[11px] mt-0.5 leading-snug" style="color:${legend ? '#F5D76E' : '#71717a'}">${legend
              ? 'All 14 earned. Your name now carries the gold Legend nameplate on results, share cards, and the leaderboard.'
              : `Collect all ${trophies.length} to unlock the gold Legend nameplate.`}</div>
          </div>
          <p class="text-[11px] text-zinc-500 mb-3">${earnedN}/${trophies.length} trophies.</p>
          <div class="grid grid-cols-2 gap-1.5">
            ${trophies.map((t, ti) => {
              const col = rarityColor[t.rarity] || '#a1a1aa';
              // The last 4 trophies (the elite / mythic set) get a full colored border ring so they stand out.
              const isElite = ti >= trophies.length - 4;
              const frame = isElite
                ? (t.earned ? `border:1px solid ${col};box-shadow:0 0 0 1px ${col} inset` : 'border:1px solid #52525b')
                : (t.earned ? `border-left:2px solid ${col}` : 'border-left:2px solid #3f3f46');
              return `
              <div class="flex items-center gap-2.5 bg-zinc-800 px-2.5 py-2.5" style="${frame}">
                <span class="shrink-0 leading-none" style="font-size:${iconSize[t.rarity] || '18px'};${t.earned ? '' : 'filter:grayscale(1);opacity:0.4'}">${t.icon || '🏁'}</span>
                <div class="min-w-0">
                  <div class="text-[11px] font-display tracking-wide leading-tight" style="color:${t.earned ? col : '#71717a'}">${t.label}</div>
                  <div class="text-[11px] leading-snug mt-0.5 ${t.earned ? 'text-zinc-400' : 'text-zinc-500'}">${t.desc}</div>
                </div>
              </div>`;
            }).join('')}
          </div>`;
      }
      return `
        ${header('Garage · eras, history, trophies')}
        <section class="fade-in">
          <div class="flex justify-end mb-2">
            <button type="button" onclick="closeGarage()" class="text-zinc-400 hover:text-white text-sm px-2 py-1 border border-zinc-700" aria-label="Close garage">✕</button>
          </div>
          <div class="lb-tabs mb-4">${tabBtn('eras', `Eras ${played}/${ERAS.length}`)}${tabBtn('history', 'History')}${tabBtn('trophies', `Trophies ${earnedN}`)}</div>
          ${body}
          <button type="button" onclick="closeGarage()" class="w-full mt-5 py-3 border border-zinc-600 text-xs tracking-widest uppercase text-zinc-300 font-display">Back</button>
        </section>`;
    }

    function render() {
      const root = document.getElementById('app');
      if (state.phase === 'setup') root.innerHTML = renderSetup();
      else if (state.phase === 'season') root.innerHTML = renderSeason();
      else if (state.phase === 'result') root.innerHTML = renderResult();
      else if (state.phase === 'garage') root.innerHTML = renderGarage();
      updateAdBanner();
      // Re-measure after layout (banner height / safe area)
      requestAnimationFrame(updateAdBanner);
    }

    Object.assign(window, {
      spinEra, spinSeason, selectDriver, selectPrincipal, setLineupOpen, onDriverChange, onPrincipalChange, setBudget, setMod, setPhase,
      startSeason, simulateSeason, raceNext, raceToFlashpoint, toggleHint, redoRace, applyRedoSim, dismissRedoFeedback, resetAll,
      startDaily, exitDaily, spendToken, requestExtraRedo,
      openGarage, closeGarage, setGarageTab,
      setShareTheme, openSupport, redeemSupporter,
      openHelp, closeHelp, goDebrief,
      openShare, closeShare, downloadShareCard, copyShareImage, copyShareCaption, nativeShareCard,
      unlockShareClean, requestEraSpin, ADS,
      openLeaderboard, closeLeaderboard, submitToLeaderboard, setLeaderboardTab,
      state, render, buildDebrief,
    });

    restoreGame(); // refresh-proof: resume an in-progress season
    render();
  </script>
</body>
</html>
